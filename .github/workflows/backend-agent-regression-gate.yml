name: backend-agent-regression-gate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - "biome.json"
      - "knip.json"
      - "start.sh"
      - "scripts/**"
      - "backend/**"
      - "frontend/**"
      - "rust/**"
      - "Dockerfile"
      - ".dockerignore"
      - "docker-compose*.yml"
      - "scripts/trace-processor-pin.env"
      - "test-traces/**"
      - ".github/dependabot.yml"
      - ".github/workflows/**"
  push:
    branches:
      - main
    paths:
      - "package.json"
      - "package-lock.json"
      - "biome.json"
      - "knip.json"
      - "start.sh"
      - "scripts/**"
      - "backend/**"
      - "frontend/**"
      - "rust/**"
      - "Dockerfile"
      - ".dockerignore"
      - "docker-compose*.yml"
      - "scripts/trace-processor-pin.env"
      - "test-traces/**"
      - ".github/dependabot.yml"
      - ".github/workflows/**"

permissions:
  contents: read

# Perfetto version + per-platform SHA256 are pinned in
# scripts/trace-processor-pin.env (single source of truth shared with
# scripts/start-dev.sh, Dockerfile, and backend/scripts/ensure-trace-processor.cjs).

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install root dependencies
        run: npm ci

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run quality checks
        run: npm run quality

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust analyzer checks
        run: npm run rust:verify

  gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "backend/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Run PR verification gate
        run: npm run verify:pr

  docker-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build Docker runtime image
        run: docker build -t smartperfetto-runtime-smoke .
