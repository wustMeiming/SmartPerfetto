name: backend-agent-regression-gate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - "biome.json"
      - "knip.json"
      - "start.sh"
      - "scripts/**"
      - "backend/**"
      - "frontend/**"
      - "rust/**"
      - "Dockerfile"
      - ".dockerignore"
      - "docker-compose*.yml"
      - "scripts/trace-processor-pin.env"
      - "Trace/**"
      - ".github/dependabot.yml"
      - ".github/workflows/**"
  push:
    branches:
      - main
    paths:
      - "package.json"
      - "package-lock.json"
      - "biome.json"
      - "knip.json"
      - "start.sh"
      - "scripts/**"
      - "backend/**"
      - "frontend/**"
      - "rust/**"
      - "Dockerfile"
      - ".dockerignore"
      - "docker-compose*.yml"
      - "scripts/trace-processor-pin.env"
      - "Trace/**"
      - ".github/dependabot.yml"
      - ".github/workflows/**"

permissions:
  contents: read

# Perfetto version + per-platform SHA256 are pinned in
# scripts/trace-processor-pin.env (single source of truth shared with
# scripts/start-dev.sh, Dockerfile, and backend/scripts/ensure-trace-processor.cjs).

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install root dependencies
        run: npm ci

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run quality checks
        run: npm run quality

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust analyzer checks
        run: npm run rust:verify

  gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install root and backend dependencies
        run: npm ci && npm --prefix backend ci

      - name: Run PR verification gate
        run: npm --prefix backend run verify:pr

  cross-platform-contracts:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install root and backend dependencies
        run: npm ci && npm --prefix backend ci

      - name: Verify cross-platform runtime contracts
        run: npm run test:governance && npm --prefix backend run typecheck

  trace-corpus:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout with Perfetto schema sources
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install root and backend dependencies
        run: npm ci && npm --prefix backend ci

      - name: Run trace corpus semantic regression
        run: npm run trace:regression

  docker-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build Docker runtime image
        run: docker build -t smartperfetto-runtime-smoke .

      - name: Smoke Docker runtime assets
        run: |
          docker run -d --name smartperfetto-runtime-smoke smartperfetto-runtime-smoke
          trap 'docker rm -f smartperfetto-runtime-smoke >/dev/null 2>&1 || true' EXIT
          for attempt in $(seq 1 30); do
            if docker exec smartperfetto-runtime-smoke curl -fsS http://127.0.0.1:3000/health >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              docker logs smartperfetto-runtime-smoke
              exit 1
            fi
            sleep 2
          done
          docker exec smartperfetto-runtime-smoke curl -fsS http://127.0.0.1:3000/assistant-shell | grep -qi '<html'
          docker exec smartperfetto-runtime-smoke curl -fsS http://127.0.0.1:3000/admin-control-plane | grep -qi '<html'
          docker exec smartperfetto-runtime-smoke /app/backend/node_modules/opencode-ai/bin/opencode.exe --version
