name: Agent Deepseek E2E

on:
  workflow_dispatch:
    inputs:
      suite:
        description: Deepseek Agent SSE E2E suite to run
        required: true
        default: all
        type: choice
        options:
          - all
          - startup
          - scrolling

permissions:
  contents: read

jobs:
  agent-deepseek-e2e:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check Deepseek secret
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          if [ -z "$DEEPSEEK_API_KEY" ]; then
            echo "DEEPSEEK_API_KEY secret is required for this manual E2E workflow."
            exit 1
          fi

      - name: Run Deepseek Agent SSE E2E
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          case "${{ inputs.suite }}" in
            all)
              npm run verify:e2e:deepseek
              ;;
            startup)
              npm run verify:e2e:deepseek-startup
              ;;
            scrolling)
              npm run verify:e2e:deepseek-scrolling
              ;;
            *)
              echo "Unsupported suite: ${{ inputs.suite }}"
              exit 2
              ;;
          esac

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deepseek-agent-e2e-${{ inputs.suite }}
          if-no-files-found: warn
          path: |
            backend/test-output/e2e-deepseek-*.json
            backend/logs/sessions/session_*.jsonl
