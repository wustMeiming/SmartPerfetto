name: Docker Build and Publish

on:
  push:
    tags: [ 'v*.*.*' ]
  schedule:
    # Nightly publish from main at 02:30 Asia/Shanghai.
    - cron: '30 18 * * *'
  workflow_dispatch:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run root quality checks
        run: npm run quality

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust analyzer checks
        run: npm run rust:verify

      - name: Run PR verification gate
        run: cd backend && npm run verify:pr

      - name: Build Docker runtime image
        run: docker build -t smartperfetto-runtime-smoke .

      - name: Build Docker Hub compose config
        run: docker compose -f docker-compose.hub.yml config >/tmp/smartperfetto-compose.yml

  build:
    needs: quality-gate
    uses: docker/github-builder/.github/workflows/build.yml@v1
    permissions:
      contents: read
      id-token: write
    with:
      output: image
      push: true
      platforms: linux/amd64,linux/arm64
      cache: true
      cache-scope: smartperfetto-runtime
      meta-images: docker.io/w553000664/smartperfetto
      meta-tags: |
        type=raw,value=latest,enable=${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
        type=raw,value=nightly,enable=${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        type=semver,pattern={{version}}
        type=sha,prefix=sha-
      set-meta-labels: true
    secrets:
      registry-auths: |
        - registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
