  - id: network
    terms: [network, tcp, dns, tls, wifi, cellular, 网络, 蜂窝]
    skill_tags: [network, tcp, dns, packet]
  - id: media_camera_audio
    terms: [camera, audio, video, codec, media, 相机, 音频, 视频, 编解码]
