  - id: webview_compose_frameworks
    terms: [webview, compose, flutter, react native, recyclerview]
    skill_tags: [webview, compose, flutter, framework]
  - id: system_boot
    terms: [system boot, boot process, bootanimation, init.rc, systemserver, system server, 系统启动, 开机]
