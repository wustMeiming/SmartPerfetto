version: 1

# This policy maps article metadata to candidate trace capabilities. It does
# not copy wiki prose and it does not prove coverage. A validated disposition
# additionally requires one of the real-fixture assertion refs below.
domains:
  - id: handler_callback_execution
    terms: [handler, looper, messagequeue, message queue, 消息队列, 消息分发, 主线程消息]
    skill_tags: [handler, looper, message_queue]
    validations:
      - skill_id: main_thread_handler_callback_slices
        observable_claim: The real trace exposes observed main-thread Handler callback execution slices; it does not prove queue wait.
        assertion_ref: backend/skills/public-fixtures.yaml#smart-launch-heavy-api36:main_thread_handler_callback_slices/callback_slices
        article_paths: [src/part1-fundamentals/ch01-architecture/13-messagequeue-deliqueue.md]
  - id: app_startup
    terms: [startup, app launch, cold start, warm start, hot start, zygote, 应用启动, 冷启动, 热启动, 温启动]
    skill_tags: [startup, app_startup, launch]
    validations:
      - skill_id: startup_slow_reasons
        observable_claim: Perfetto exposes an Android startup row and type for the fixture.
        assertion_ref: backend/skills/public-fixtures.yaml#smart-launch-light-api36:startup_slow_reasons/startup_overview
        article_paths: [src/part2-performance/ch08-responsiveness/02-app-launch.md]
      - skill_id: startup_slow_reasons
        observable_claim: Perfetto exposes an Android startup row for the upstream API 24 fixture.
        assertion_ref: backend/skills/public-fixtures.yaml#upstream-startup-api24-cold:startup_slow_reasons/startup_overview
        article_paths: [src/part2-performance/ch08-responsiveness/02-app-launch.md]
  - id: frame_timeline_jank
    terms: [frametimeline, frame timeline, jank, choreographer, vsync, 掉帧, 卡顿, 帧时间, 流畅度]
    skill_tags: [scrolling, jank, frame_timeline, choreographer, vsync]
    validations:
      - skill_id: scrolling_analysis
        observable_claim: FrameTimeline is present on the real Android scrolling fixture.
        assertion_ref: backend/skills/public-fixtures.yaml#smart-aosp-scroll-api35:scrolling_analysis/frame_timeline_check
        article_paths: [src/part2-performance/ch07-smoothness/01-jank-definition.md]
  - id: rendering_pipeline
    terms: [surfaceflinger, bufferqueue, renderthread, hwui, hwc, gpu, composition, 渲染, 合成, 图形]
    skill_tags: [rendering, gpu, surfaceflinger, bufferqueue, renderthread]
  - id: binder_ipc
    terms: [binder, ipc, oneway, transaction, 跨进程, 进程间通信]
    skill_tags: [binder, ipc, blocking]
  - id: input_latency
    terms: [inputdispatcher, inputreader, inputflinger, touch, motion event, input latency, 输入延迟, 触摸]
    skill_tags: [input, latency, interaction]
  - id: anr_blocking
    terms: [anr, deadlock, lock contention, monitor contention, 主线程阻塞, 死锁, 锁竞争]
    skill_tags: [anr, blocking, lock, contention]
  - id: memory_gc_lmk
    terms: [memory, heap, gc, lmk, lmkd, zram, reclaim, bitmap, 内存, 垃圾回收, 泄漏]
    skill_tags: [memory, gc, heap, lmk, reclaim]
  - id: storage_database_io
    terms: [sqlite, room, sharedpreferences, datastore, filesystem, storage, io scheduling, 数据库, 文件系统, 存储, 磁盘]
    skill_tags: [io, database, sqlite, storage, filesystem]
  - id: cpu_scheduling
