# =============================================================================
# Video Overlay HWC Pipeline
# =============================================================================
# HWC video layer overlay for hardware-accelerated video.
# Direct video decode to display with minimal CPU involvement.
# =============================================================================

name: pipeline_video_overlay_hwc
version: "1.0"
type: pipeline_definition
category: rendering

meta:
  pipeline_id: VIDEO_OVERLAY_HWC
  display_name: "视频 Overlay (HWC)"
  description: "HWC 视频层硬件加速叠加"
  icon: "video"
  family: specialized
  doc_path: rendering_pipelines/S12_video_overlay_hwc_type.md
  # ----- Article-grounded signature (S12) -----
  s_article_ref: "S12"
  four_features:
    producer_threads: ["media.codec", "media.swcodec", "MediaCodec*", "Codec2 vendor service", "OMX-worker"]
    expected_layer_count: 1   # 视频独立 layer（HWC sideband for tunneled）
    bufferqueue_path: "MEDIACODEC_TO_VIDEO_SURFACE_OR_HWC_SIDEBAND"
    extra_rhythm_sources: ["video_codec_pacing", "av_sync_clock"]
  deviation_anchors: "tunneled_skips_anchor_10_or_overlay_anchor_8_to_9"
  # 锚点偏离：① 视频播放由解码 + A/V sync 驱动，不等 vsync-app；
  # ②③ 宿主 UI Choreographer 只管控制层；
  # ④⑤⑥ 由 MediaCodec / HAL 完成；
  # Tunneled 模式：完全跳过 ⑩ client composition，直接 ⑨ HWC device composition + sideband。
  non_primary_note: |
    此 pipeline_id 已在 NON_PRIMARY_PIPELINE_IDS（renderingPipelineDetectionSkillGenerator.ts:23），
    detection 改动只影响 features list。它属于"实现细节/正交特征"。
  subvariants_note: |
    文章 S12 把 Video Overlay 拆为 3 个子变种：
    - VIDEO_DECODER_SURFACE（非 Tunneled，MediaCodec → Surface → SurfaceView 或 TextureView）
    - VIDEO_DECODER_TEXTUREVIEW（MediaCodec → TextureView，宿主采样）
    - VIDEO_TUNNELED_PLAYBACK（硬件 A/V 同步，sideband stream，App 进程看不到中间过程）
    当前 variant 对应 S12；decoder、TextureView 与 tunneled playback 作为同一类型下的检测子路径输出。
  hwc_overlay_decision_factors: |
    HWC 5 步谈判（S01）针对视频时关注：
    - buffer 格式（YUV NV12/P010 vs RGBA）
    - DRM/HDCP（必须 secure overlay）
    - overlay plane 数量上限
    - 缩放比例与旋转
    - 色彩空间与 HDR 元数据

detection:
  scoring_signals:
    - signal: has_hwc
      slice_pattern: "*HWC*"
      weight: 20
    - signal: has_hardware_composer
      slice_pattern: "*HardwareComposer*"
      weight: 15
    - signal: has_video
      slice_pattern: "*Video*"
      weight: 15
    - signal: has_mediacodec
      slice_pattern: "*MediaCodec*"
      weight: 20

teaching:
  source: "rendering_pipelines/S12_video_overlay_hwc_type.md"
auto_pin:
  instructions:
    # Time-ordered pinning (production -> transfer -> consume -> display)
    - pattern: "^VSYNC-app$"
      match_by: name
      priority: 1
      reason: "VSync (开始生产帧)"

    - pattern: "MediaCodec"
      match_by: name
      priority: 2
      reason: "视频解码 (生产)"

    - pattern: "HWC|HardwareComposer"
      match_by: name
      priority: 3
      reason: "硬件合成器 (传输/合成)"

    - pattern: "^VSYNC-sf$"
      match_by: name
      priority: 5.5
      reason: "VSync (SurfaceFlinger 消费/合成)"

    - pattern: "^BufferTX"
      match_by: name
      priority: 6
      reason: "BufferTX (SurfaceFlinger 事务)"

    - pattern: "^[sS]urface[fF]linger"
      match_by: name
      priority: 7
      reason: "HWC 合成/显示"
      main_thread_only: true

analysis:
  common_issues:
    - id: decode_stall
      name: "解码延迟"
      description: "视频解码器处理延迟"
      detection_skill: cpu_analysis

    # ----- Article-grounded issues (S12) -----
    - id: codec_underflow_release_fence
      name: "Codec output buffer 不足（release fence 晚回）"
      description: |
        MediaCodec output pool 用完 → dequeueOutputBuffer 阻塞。
        根因：HWC 没把上一帧 buffer 真正消费（release fence 晚），常因 HWC 降级 client composition 增加延迟。
      detection_skill: present_fence_timing

    - id: hwc_overlay_fallback_for_video
      name: "HWC 视频层回退 client composition"
      description: |
        视频 overlay 条件不满足（DRM/旋转/缩放/HDR/plane 数量）时回退 client composition。
        SF Duration 抬升 + GPU 带宽吃紧 + 功耗上升 — 这些都是 HWC 决策切换的信号。
      detection_skill: sf_layer_count_in_range

    - id: tunneled_invisible_in_app_process
      name: "Tunneled 模式 App 进程看不到中间过程"
      description: |
        Tunneled 下 MediaCodec → HAL sideband stream → HWC，App 进程看不到 releaseOutputBuffer 这种 slice。
        排查问题需要 HAL trace tag + HWC trace tag，App 侧 trace 不完整是正常的。
      detection_skill: cpu_analysis

    - id: video_fps_vs_display_fps_mismatch
      name: "视频帧率 vs 显示帧率不匹配"
      description: |
        视频通常 24/30/60 fps，屏幕通常 60/90/120Hz。setFrameRate() API 让 SF 调整 VRR 档位匹配。
        端到端延迟用 present fence 而非 releaseOutputBuffer。
      detection_skill: vsync_alignment_in_range

  recommended_skills:
    - sf_frame_consumption
    - cpu_analysis
    - present_fence_timing
    - sf_layer_count_in_range
