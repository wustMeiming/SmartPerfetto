# =============================================================================
# Jetpack Compose Standard Pipeline
# =============================================================================
# Jetpack Compose apps using HWUI RenderThread under the hood.
# Compose has unique recomposition patterns visible in trace markers.
# =============================================================================

name: pipeline_compose_standard
version: "1.0"
type: pipeline_definition
category: rendering

meta:
  pipeline_id: COMPOSE_STANDARD
  display_name: "Jetpack Compose (Standard)"
  description: "Jetpack Compose + HWUI RenderThread, Recomposition driven"
  icon: "android"
  family: hwui
  doc_path: rendering_pipelines/S02_aosp_standard_type.md
  # ----- Article-grounded signature (S02 Compose 章节) -----
  s_article_ref: "S02"   # Compose 走相同 HWUI 路径，仅 main thread 工作形态不同
  four_features:
    producer_threads: ["RenderThread"]
    expected_layer_count: 1
    bufferqueue_path: "BBQ_TRANSACTION_INPROC"
    extra_rhythm_sources: []
  deviation_anchors: "baseline_compose_main_thread_form_only"
  # 12 锚点完整覆盖（与 ANDROID_VIEW_STANDARD_BLAST 一致），仅 ② 内 main thread 工作形态不同：
  # View 系统走 measure/layout/draw 命令式 API；Compose 走声明式三阶段（Composition/Layout/Drawing）+ 重组机制。
  # ⑤ RenderThread 之后的所有锚点完全相同——RenderThread / BLASTBufferQueue / SurfaceFlinger / HWC / present fence 路径与 View 系统共用 HWUI 底层。
  compose_specific: true
  compose_tracing_dependency_note: |
    Compose 特有 slice 需要启用 androidx.compose.runtime:runtime-tracing
    （Compose UI 1.3.0+, Studio Flamingo+, API 30+）。
    未启用 tracing 时只能看到笼统的 ComposeView#onMeasure / onLayout / onDraw 这种宿主 View 回调 slice，
    看不到 Composable 函数级细节。排查 Compose 性能问题前先确认 tracing 已开启。

detection:
  required_signals:
    - thread: RenderThread
      min_count: 1
    - thread: main
      min_count: 1

  scoring_signals:
    - signal: has_recomposition
      slice_pattern: "Recompos*"
      weight: 80
    - signal: has_compose_prefix
      slice_pattern: "Compose:*"
      weight: 40
    - signal: has_composition_local
      slice_pattern: "*CompositionLocal*"
      weight: 30
    - signal: has_measure_layout
      slice_pattern: "*measure*"
      weight: 10
    - signal: has_draw_frame
      slice_pattern: "DrawFrame*"
      weight: 15

  exclude_if:
    - thread: "1.ui"           # Flutter
    - thread: CrRendererMain   # WebView

teaching:
  source: "rendering_pipelines/S02_aosp_standard_type.md"
auto_pin:
  instructions:
    - pattern: "^VSYNC-app$"
      match_by: name
      priority: 1
      reason: "VSync (App 开始生产帧)"

    - pattern: "^main(\\s+\\d+)?$"
      match_by: name
      priority: 2
      reason: "Composition + Layout + Draw (生产)"
      expand: true
      smart_filter:
        enabled: true
        description: "仅 Pin 有 Compose 重组活动的进程"
        detection_sql: |
          SELECT DISTINCT p.name as process_name, COUNT(*) as recomp_count
          FROM slice s
          JOIN thread_track tt ON s.track_id = tt.id
          JOIN thread t ON tt.utid = t.utid
          JOIN process p ON t.upid = p.upid
          WHERE t.name = 'main'
            AND s.name GLOB 'Recompos*'
            AND p.name IS NOT NULL
          GROUP BY p.upid
          HAVING recomp_count > 3
          ORDER BY recomp_count DESC
          LIMIT 10

    - pattern: "^RenderThread(\\s+\\d+)?$"
      match_by: name
      priority: 3
      reason: "GPU 渲染 (传输)"
      expand: true
      smart_filter:
        enabled: true
        detection_sql: |
          SELECT DISTINCT p.name as process_name, COUNT(*) as frame_count
          FROM slice s
          JOIN thread_track tt ON s.track_id = tt.id
          JOIN thread t ON tt.utid = t.utid
          JOIN process p ON t.upid = p.upid
          WHERE t.name = 'RenderThread'
            AND s.name GLOB 'DrawFrame*'
            AND p.name IS NOT NULL
          GROUP BY p.upid
          HAVING frame_count > 5

    - pattern: "^VSYNC-sf$"
      match_by: name
      priority: 5.5
      reason: "VSync (SurfaceFlinger 消费/合成)"

    - pattern: "^BufferTX"
      match_by: name
      priority: 6
      reason: "BufferTX (SurfaceFlinger 事务)"

    - pattern: "^[sS]urface[fF]linger"
      match_by: name
      priority: 7
      reason: "SurfaceFlinger (最终合成/显示)"
      main_thread_only: true

analysis:
  common_issues:
    - id: recomposition_storm
      name: "Recomposition 风暴"
      description: "不必要的频繁重组, 通常由 State 读取范围过宽导致"
      detection_skill: scrolling_analysis
    - id: heavy_composition
      name: "重量级 Composition"
      description: "单帧 Composition 阶段耗时过长"
      detection_skill: jank_frame_detail

    # ----- Article-grounded issues (S02 Compose 章节) -----
    - id: non_skippable_recomposition
      name: "非 skippable Composable 频繁重组"
      description: |
        Composable 参数不 stable（如普通 List<T>、未加注解的 data class、捕获不稳定状态的 lambda），
        Compose 编译器无法将其标记为 skippable。即使参数内容没变，每次 state change 都会重组。
        定位手段：Compose Compiler stability report 或 Layout Inspector 重组计数。
      detection_skill: app_frame_production

    - id: subcompose_layout_multipass
      name: "SubcomposeLayout / intrinsic measurements 多 pass"
      description: |
        Compose 默认是一次 measure/layout 遍历（single-pass），但 SubcomposeLayout / intrinsic measurements
        / Lookahead 这些机制会带来额外 pass。深嵌套使用时主线程 Layout 阶段时间会被放大。
      detection_skill: app_frame_production

    - id: state_read_scope_too_wide
      name: "State 读取范围过宽"
      description: |
        State 读取范围过宽，触发过多 Composable 重组——典型如顶层 ViewModel 字段被多个 Composable 读取，
        某个字段变化引发整页重组。修复：用 derivedStateOf / 拆分 State 缩小读取作用域。
      detection_skill: app_frame_production

  recommended_skills:
    - scrolling_analysis
    - jank_frame_detail
    - render_pipeline_latency