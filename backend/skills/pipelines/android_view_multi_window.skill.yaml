# =============================================================================
# Android View Multi-Window Pipeline
# =============================================================================
# Same-process multi-window rendering (Dialog, PopupWindow).
# RenderThread serialization may cause jank.
# =============================================================================

name: pipeline_android_view_multi_window
version: "1.0"
type: pipeline_definition
category: rendering

meta:
  pipeline_id: ANDROID_VIEW_MULTI_WINDOW
  display_name: "Android View 多窗口"
  description: "同进程多窗口渲染 (Dialog/PopupWindow)，RenderThread 串行化"
  icon: "window"
  family: hwui
  doc_path: rendering_pipelines/S06_multi_window_type.md
  # ----- Article-grounded signature (S06) -----
  s_article_ref: "S06"
  four_features:
    producer_threads: ["main", "RenderThread"]   # 同进程多窗口共享单 RenderThread（进程级单例）
    expected_layer_count: 2   # 主窗口 + 1+ 辅助（Dialog/PopupWindow/Activity Embedding 等）
    bufferqueue_path: "BBQ_TRANSACTION_INPROC_MULTIPLE"   # 各窗口各自 BBQ
    extra_rhythm_sources: []   # 同进程共享一条 vsync-app
  deviation_anchors: "serialized_multi_viewroot_anchor_2_3_4_5"
  # 锚点偏离：同一 doFrame 内多个 ViewRootImpl 的 ②③④⑤ 串行执行（callback 注册顺序决定）。
  # 跨进程多窗口形态（split-screen/PiP/freeform）则是各进程独立 ①-⑥，⑧ SF 多 layer latch。
  non_primary_note: |
    此 pipeline ID 已在代码 NON_PRIMARY_PIPELINE_IDS（renderingPipelineDetectionSkillGenerator.ts:23）
    中注册，不会被选为 primary，只会出现在 features list。
  subvariants_note: |
    文章 S06 严格区分（按窗口形态 + 进程拓扑两条轴）：
    - MULTI_WINDOW_SAME_PROCESS（Dialog/PopupWindow/同 App 多 Activity/Activity Embedding）— 当前 ID 主要覆盖
    - MULTI_WINDOW_SPLIT_SCREEN（分屏，通常跨进程）
    - MULTI_WINDOW_PIP（Picture in Picture）
    - MULTI_WINDOW_FREEFORM（自由窗口/桌面模式）
    当前条目在 catalog 中作为 S06 feature；多窗口形态不会覆盖各窗口自己的主渲染类型。
    决定性信号（同进程）：trace 同一 main thread 看到多次 performTraversals。
    YAML 当前不支持"同 doFrame 内多次出现"语义，留 Phase B 主决策树用 SQL 时间窗口分组实现。

detection:
  required_signals:
    - thread: RenderThread
      min_count: 1
    - thread: main
      min_count: 1

  scoring_signals:
    - signal: has_dialog
      slice_pattern: "*Dialog*"
      weight: 20
    - signal: has_popup_window
      slice_pattern: "*PopupWindow*"
      weight: 20
    - signal: has_draw_frame
      slice_pattern: "DrawFrame*"
      weight: 20
    - signal: has_perform_traversals_multi
      slice_pattern: "*performTraversals*"
      weight: 12
      min_count: 2   # 至少 2 次以区分单窗口与多窗口（同 doFrame 多次的精确判断留 Phase B）

teaching:
  source: "rendering_pipelines/S06_multi_window_type.md"
auto_pin:
  instructions:
    # Time-ordered pinning (production -> transfer -> consume -> display)
    - pattern: "^VSYNC-app$"
      match_by: name
      priority: 1
      reason: "VSync (App 开始生产帧)"

    - pattern: "^main(\\s+\\d+)?$"
      match_by: name
      priority: 2
      reason: "App 主线程 (生产帧)"
      expand: true  # 展开显示 Running 状态和 callstack
      smart_filter:
        enabled: true
        description: "仅 Pin 活跃渲染进程的 main 线程"
        detection_sql: |
          SELECT DISTINCT p.name as process_name, COUNT(*) as frame_count
          FROM slice s
          JOIN thread_track tt ON s.track_id = tt.id
          JOIN thread t ON tt.utid = t.utid
          JOIN process p ON t.upid = p.upid
          WHERE t.name = 'RenderThread'
            AND s.name GLOB 'DrawFrame*'
            AND p.name IS NOT NULL
            AND p.name NOT LIKE 'com.android.systemui%'
            AND p.name NOT LIKE 'system_server%'
            AND p.name NOT LIKE '/system/%'
          GROUP BY p.upid
          HAVING frame_count > 5
          ORDER BY frame_count DESC
          LIMIT 10
        fallback_sql: |
          SELECT DISTINCT p.name as process_name, COUNT(*) as slice_count
          FROM slice s
          JOIN thread_track tt ON s.track_id = tt.id
          JOIN thread t ON tt.utid = t.utid
          JOIN process p ON t.upid = p.upid
          WHERE t.name = 'main'
          GROUP BY p.upid
          HAVING slice_count > 10
          ORDER BY slice_count DESC
          LIMIT 10

    - pattern: "^RenderThread(\\s+\\d+)?$"
      match_by: name
      priority: 3
      reason: "App 渲染线程 (RenderThread)"
      expand: true  # 展开显示 Running 状态和 callstack
      smart_filter:
        enabled: true
        description: "仅 Pin 有活跃渲染的进程的 RenderThread"
        detection_sql: |
          SELECT DISTINCT p.name as process_name, COUNT(*) as frame_count
          FROM slice s
          JOIN thread_track tt ON s.track_id = tt.id
          JOIN thread t ON tt.utid = t.utid
          JOIN process p ON t.upid = p.upid
          WHERE t.name = 'RenderThread'
            AND s.name GLOB 'DrawFrame*'
            AND p.name IS NOT NULL
            AND p.name NOT LIKE 'com.android.systemui%'
            AND p.name NOT LIKE 'system_server%'
            AND p.name NOT LIKE '/system/%'
          GROUP BY p.upid
          HAVING frame_count > 5
          ORDER BY frame_count DESC
          LIMIT 10
        fallback_sql: |
          SELECT DISTINCT p.name as process_name, COUNT(*) as slice_count
          FROM slice s
          JOIN thread_track tt ON s.track_id = tt.id
          JOIN thread t ON tt.utid = t.utid
          JOIN process p ON t.upid = p.upid
          WHERE t.name = 'RenderThread'
            AND s.name GLOB 'DrawFrame*'
          GROUP BY p.upid
          HAVING slice_count > 10
          ORDER BY slice_count DESC
          LIMIT 10

    - pattern: "^VSYNC-sf$"
      match_by: name
      priority: 5.5
      reason: "VSync (SurfaceFlinger 消费/合成)"

    - pattern: "^BufferTX"
      match_by: name
      priority: 6
      reason: "BufferTX (SurfaceFlinger 事务)"

    - pattern: "^[sS]urface[fF]linger"
      match_by: name
      priority: 7
      reason: "SurfaceFlinger (最终合成/显示)"
      main_thread_only: true

analysis:
  common_issues:
    - id: rt_serialization
      name: "RenderThread 串行化"
      description: "多窗口导致 RenderThread 工作量翻倍"
      detection_skill: render_thread_slices

    # ----- Article-grounded issues (S06) -----
    - id: traversal_callback_serialization
      name: "performTraversals callback 串行竞争"
      description: |
        同一 doFrame 内多个 ViewRootImpl 的 performTraversals 在 main thread 串行执行
        （注册顺序决定先后）。一个窗口 TRAVERSAL 变长会直接挤掉另一个窗口本帧的预算。
        S06 §"同进程场景：多个 ViewRootImpl 在同一个 doFrame() 里串行执行"。
      detection_skill: app_frame_production

    - id: drawframe_serialization_on_renderthread
      name: "RenderThread 进程级单例下 DrawFrame 串行排队"
      description: |
        HWUI RenderThread 是进程级单例（RenderThread::getInstance()），
        同一进程所有窗口的 HardwareRenderer 都向同一个 RenderThread 投递任务。
        多窗口 DrawFrame slice 在 RenderThread 上串行排队，主窗口滚动 + Dialog 动画同时发生时
        哪一个先开始画对这一帧结果有影响。
      detection_skill: render_thread_slices

    - id: geometry_visibility_change_late
      name: "窗口几何/可见性变化与 buffer 更新不同帧生效"
      description: |
        窗口大小/位置/可见性/裁剪通过 SurfaceControl.Transaction 进入系统。
        SurfaceSyncGroup（API 34+）/ sync transaction 能让几何与 buffer 同帧生效，
        但应用还没 draw / fence 未 ready / 跨进程 Producer 节奏不可控时，目标帧仍可能错过。
      detection_skill: sf_composition_in_range

    - id: same_process_callback_order_dependency
      name: "callback 注册顺序决定窗口先后"
      description: |
        Choreographer.doFrame() 按 callback 注册顺序依次执行 pending callbacks——
        先注册的窗口先执行，后注册的被挤后。Dialog 弹出时机不同会改变后续帧的 callback 顺序。
      detection_skill: app_frame_production

  recommended_skills:
    - render_thread_slices
    - jank_frame_detail
