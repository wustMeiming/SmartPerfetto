# =============================================================================
# Android View Standard (Legacy) Pipeline
# =============================================================================
# Pre-Android 12 rendering pipeline using HWUI + Legacy BufferQueue.
# Uses Binder-based buffer submission without BLAST atomic transactions.
# =============================================================================

name: pipeline_android_view_standard_legacy
version: "1.0"
type: pipeline_definition
category: rendering

meta:
  pipeline_id: ANDROID_VIEW_STANDARD_LEGACY
  display_name: "标准 Android View (Legacy)"
  description: "Android 12 之前的 HWUI + Legacy BufferQueue 渲染管线"
  icon: "android"
  family: hwui
  doc_path: rendering_pipelines/S02_aosp_standard_type.md
  # ----- Article-grounded signature (S02) -----
  s_article_ref: "S02"
  four_features:
    producer_threads: ["RenderThread"]
    expected_layer_count: 1
    bufferqueue_path: "BUFFERQUEUE_INPROC"   # 老 BufferQueue，无 Transaction 原子性
    extra_rhythm_sources: []
  deviation_anchors: "baseline_legacy_no_blast_anchor_6"
  # 锚点 ⑥ 偏离基线：buffer 通过 Binder 调用提交给 SF，无 BLAST Transaction 原子性绑定。
  # 其余 ①-⑤、⑦-⑫ 与 S02 baseline 完全一致。

detection:
  required_signals:
    - thread: RenderThread
      min_count: 1
    - thread: main
      min_count: 1

  scoring_signals:
    - signal: has_queue_buffer
      slice_pattern: "*queueBuffer*"
      weight: 30
    - signal: has_dequeue_buffer
      slice_pattern: "*dequeueBuffer*"
      weight: 20
    - signal: has_draw_frame
      slice_pattern: "DrawFrame*"
      weight: 25

  exclude_if:
    - slice_pattern: "*BLASTBufferQueue*"
    - slice_pattern: "*applyTransaction*"
    - thread: "1.ui"
    - thread: CrRendererMain
    - thread: UnityMain        # Game Engine
    - thread: UnityGfx         # Game Engine

teaching:
  source: "rendering_pipelines/S02_aosp_standard_type.md"
auto_pin:
  instructions:
    # Time-ordered pinning (production -> transfer -> consume -> display)
    - pattern: "^VSYNC-app$"
      match_by: name
      priority: 1
      reason: "VSync (App 开始生产帧)"

    - pattern: "^main(\\s+\\d+)?$"
      match_by: name
      priority: 2
      reason: "App 主线程 (生产帧)"
      expand: true  # 展开显示 Running 状态和 callstack
      smart_filter:
        enabled: true
        description: "仅 Pin 活跃渲染进程的 main 线程"
        detection_sql: |
          SELECT DISTINCT p.name as process_name, COUNT(*) as frame_count
          FROM slice s
          JOIN thread_track tt ON s.track_id = tt.id
          JOIN thread t ON tt.utid = t.utid
          JOIN process p ON t.upid = p.upid
          WHERE t.name = 'RenderThread'
            AND s.name GLOB 'DrawFrame*'
            AND p.name IS NOT NULL
            AND p.name NOT LIKE 'com.android.systemui%'
            AND p.name NOT LIKE 'system_server%'
            AND p.name NOT LIKE '/system/%'
          GROUP BY p.upid
          HAVING frame_count > 5
          ORDER BY frame_count DESC
          LIMIT 10
        fallback_sql: |
          SELECT DISTINCT p.name as process_name, COUNT(*) as slice_count
          FROM slice s
          JOIN thread_track tt ON s.track_id = tt.id
          JOIN thread t ON tt.utid = t.utid
          JOIN process p ON t.upid = p.upid
          WHERE t.name = 'main'
          GROUP BY p.upid
          HAVING slice_count > 10
          ORDER BY slice_count DESC
          LIMIT 10

    - pattern: "^RenderThread(\\s+\\d+)?$"
      match_by: name
      priority: 3
      reason: "App 渲染线程 (RenderThread)"
      expand: true  # 展开显示 Running 状态和 callstack
      smart_filter:
        enabled: true
        detection_sql: |
          SELECT DISTINCT p.name as process_name, COUNT(*) as slice_count
          FROM slice s
          JOIN thread_track tt ON s.track_id = tt.id
          JOIN thread t ON tt.utid = t.utid
          JOIN process p ON t.upid = p.upid
          WHERE t.name = 'RenderThread' AND s.name GLOB 'DrawFrame*'
          GROUP BY p.upid HAVING slice_count > 10

    - pattern: "BufferQueue"
      match_by: name
      priority: 4
      reason: "BufferQueue (传输)"
      smart_filter:
        enabled: true
        description: "仅 Pin 活跃渲染进程相关的 BufferQueue 轨道"

    - pattern: "^VSYNC-sf$"
      match_by: name
      priority: 5.5
      reason: "VSync (SurfaceFlinger 消费/合成)"

    - pattern: "^BufferTX"
      match_by: name
      priority: 6
      reason: "BufferTX (SurfaceFlinger 事务)"

    - pattern: "^[sS]urface[fF]linger"
      match_by: name
      priority: 7
      reason: "SurfaceFlinger (最终合成/显示)"
      main_thread_only: true

analysis:
  common_issues:
    - id: buffer_stall
      name: "Buffer 等待"
      description: "等待 BufferQueue 可用 Buffer"
      detection_skill: render_thread_slices

    # ----- Article-grounded issues (S02) -----
    - id: tearing_or_size_desync
      name: "撕裂或尺寸错位"
      description: |
        Legacy BufferQueue 缺乏 BLAST 的原子事务保证——几何变化（位置/尺寸/裁剪）
        与 buffer 更新不在同一帧生效时，用户能看到撕裂或尺寸错位一帧。
        升级到 Android 12+/BLAST 路径可显著改善此类问题。
      detection_skill: sf_composition_in_range

    - id: binder_submit_overhead
      name: "Binder 提交开销"
      description: |
        Legacy 路径下 buffer 通过 Binder 调用从 App 进程提交给 SurfaceFlinger，
        相比 BLAST in-process Transaction 多一次跨进程通信开销，对短帧预算敏感。
      detection_skill: render_thread_slices

  recommended_skills:
    - scrolling_analysis
    - jank_frame_detail
    - render_thread_slices