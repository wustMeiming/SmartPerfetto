# =============================================================================
# Android View Mixed Pipeline
# =============================================================================
# Hybrid rendering with View + SurfaceView.
# Common for video players, games embedded in native UI.
# =============================================================================

name: pipeline_android_view_mixed
version: "1.0"
type: pipeline_definition
category: rendering

meta:
  pipeline_id: ANDROID_VIEW_MIXED
  display_name: "Android View 混合渲染"
  description: "View + SurfaceView 混合渲染，常见于视频播放器、内嵌游戏"
  icon: "layers"
  family: hwui
  doc_path: rendering_pipelines/S05_mixed_rendering_type.md
  # ----- Article-grounded signature (S05) -----
  s_article_ref: "S05"
  four_features:
    producer_threads: ["main", "RenderThread"]
    optional_producer_threads: ["GLThread", "MediaCodec*", "*Decoder*", "EGLThread"]
    expected_layer_count: 2     # 宿主 + 独立 SurfaceView layer（最少）；TextureView 路径仍是 1 层
    bufferqueue_path: "BBQ_TRANSACTION_INPROC + INDEPENDENT_LAYER"   # 多条并行
    extra_rhythm_sources: ["video_codec_pacing", "camera_request_activity"]   # 视情况；Camera 名称仅为 request activity candidate
  deviation_anchors: "multi_path_anchor_4_5_6_8"
  # 锚点偏离：宿主走完整 ④⑤⑥；独立 Producer 也各自走 ④⑤⑥（独立节奏）；
  # ⑧ SF latch 这一轮处理多 layer——文章 §"多 Layer 场景里，SF 会对没有新 buffer 的 Layer 沿用旧内容"。
  subvariants_note: |
    文章 S05 区分 3 个子变种：
    - MIXED_RENDERING_HWUI_SURFACEVIEW（独立 layer 进 SF，SF 看到 ≥2 个 layer）
    - MIXED_RENDERING_HWUI_TEXTUREVIEW（外部内容回宿主 RT 通过 updateTexImage 吸收，仍单 layer）
    - MIXED_RENDERING_HYBRID（两者都有）
    三种形态统一属于 S05；检测结果保留具体子路径，但主类型仍为混合渲染。
    关键判别：在 SF 进程下查 layer 数量（>1 → SurfaceView，=1 → TextureView/纯宿主）。

detection:
  required_signals:
    - thread: RenderThread
      min_count: 1
    - thread: main
      min_count: 1

  scoring_signals:
    - signal: has_surfaceview
      slice_pattern: "*SurfaceView*"
      weight: 50
    - signal: has_draw_frame
      slice_pattern: "DrawFrame*"
      weight: 20
    - signal: has_mediacodec_thread
      thread_pattern: "*MediaCodec*"
      weight: 12
    - signal: has_decoder_thread
      thread_pattern: "*Decoder*"
      weight: 8
    - signal: has_update_tex_image_active
      slice_pattern: "*updateTexImage*"
      weight: 8
      min_count: 2   # min_count=2 避免偶发触发；weight 低于 TEXTUREVIEW_STANDARD 自身权重以避免竞争

  exclude_if:
    - thread: "1.ui"
    - thread: CrRendererMain
    - thread: UnityMain        # Game Engine → GAME_ENGINE

teaching:
  source: "rendering_pipelines/S05_mixed_rendering_type.md"
auto_pin:
  instructions:
    # Time-ordered pinning (production -> transfer -> consume -> display)
    - pattern: "^VSYNC-app$"
      match_by: name
      priority: 1
      reason: "VSync (App 开始生产帧)"

    - pattern: "^main(\\s+\\d+)?$"
      match_by: name
      priority: 2
      reason: "App 主线程 (生产帧)"
      expand: true  # 展开显示 Running 状态和 callstack
      smart_filter:
        enabled: true
        description: "仅 Pin 活跃渲染进程的 main 线程"
        detection_sql: |
          SELECT DISTINCT p.name as process_name, COUNT(*) as frame_count
          FROM slice s
          JOIN thread_track tt ON s.track_id = tt.id
          JOIN thread t ON tt.utid = t.utid
          JOIN process p ON t.upid = p.upid
          WHERE t.name = 'RenderThread'
            AND s.name GLOB 'DrawFrame*'
            AND p.name IS NOT NULL
            AND p.name NOT LIKE 'com.android.systemui%'
            AND p.name NOT LIKE 'system_server%'
            AND p.name NOT LIKE '/system/%'
          GROUP BY p.upid
          HAVING frame_count > 5
          ORDER BY frame_count DESC
          LIMIT 10
        fallback_sql: |
          SELECT DISTINCT p.name as process_name, COUNT(*) as slice_count
          FROM slice s
          JOIN thread_track tt ON s.track_id = tt.id
          JOIN thread t ON tt.utid = t.utid
          JOIN process p ON t.upid = p.upid
          WHERE t.name = 'main'
          GROUP BY p.upid
          HAVING slice_count > 10
          ORDER BY slice_count DESC
          LIMIT 10

    - pattern: "^RenderThread(\\s+\\d+)?$"
      match_by: name
      priority: 3
      reason: "App 渲染线程 (RenderThread)"
      expand: true  # 展开显示 Running 状态和 callstack
      smart_filter:
        enabled: true
        detection_sql: |
          SELECT DISTINCT p.name as process_name, COUNT(*) as frame_count
          FROM slice s
          JOIN thread_track tt ON s.track_id = tt.id
          JOIN thread t ON tt.utid = t.utid
          JOIN process p ON t.upid = p.upid
          WHERE t.name = 'RenderThread'
            AND s.name GLOB 'DrawFrame*'
            AND p.name IS NOT NULL
            AND p.name NOT LIKE 'com.android.systemui%'
            AND p.name NOT LIKE 'system_server%'
            AND p.name NOT LIKE '/system/%'
          GROUP BY p.upid
          HAVING frame_count > 5
          ORDER BY frame_count DESC
          LIMIT 10
        fallback_sql: |
          SELECT DISTINCT p.name as process_name, COUNT(*) as frame_count
          FROM slice s
          JOIN thread_track tt ON s.track_id = tt.id
          JOIN thread t ON tt.utid = t.utid
          JOIN process p ON t.upid = p.upid
          WHERE t.name = 'RenderThread'
            AND s.name GLOB 'DrawFrame*'
            AND p.name IS NOT NULL
          GROUP BY p.upid
          HAVING frame_count > 5

    - pattern: "GLThread"
      match_by: name
      priority: 3.5
      reason: "SurfaceView 渲染"
      smart_filter:
        enabled: true
        description: "仅 Pin 活跃渲染进程的 SurfaceView 渲染线程"

    - pattern: "MediaCodec"
      match_by: name
      priority: 4
      reason: "视频解码"

    - pattern: "^VSYNC-sf$"
      match_by: name
      priority: 5.5
      reason: "VSync (SurfaceFlinger 消费/合成)"

    - pattern: "^BufferTX"
      match_by: name
      priority: 6
      reason: "BufferTX (SurfaceFlinger 事务)"

    - pattern: "^[sS]urface[fF]linger"
      match_by: name
      priority: 7
      reason: "SurfaceFlinger (最终合成/显示)"
      main_thread_only: true

analysis:
  common_issues:
    - id: layer_sync
      name: "Layer 同步问题"
      description: "View 和 SurfaceView 帧率不同步"
      detection_skill: sf_frame_consumption

    # ----- Article-grounded issues (S05) -----
    - id: new_old_buffer_mismatch
      name: "新旧 buffer 混合（同帧不同步）"
      description: |
        SF 本轮 latch 时主窗口用新 buffer 但 SurfaceView 用旧（或反之），用户看到"新旧混合"。
        例：外层 UI 已是新状态了，视频还是旧帧；视频已经到了，遮罩还是旧位置。
        S05 §"SF 会对没有新 buffer 的 Layer 沿用旧内容"。
      detection_skill: sf_frame_consumption

    - id: texture_resample_overhead
      name: "TextureView 采样开销"
      description: |
        TextureView 路径下宿主 RenderThread 通过 updateTexImage acquire 外部内容，
        再做 GPU 重采样进宿主 buffer。这一步吃宿主 RT 预算 + GPU 带宽。
        若外部内容是 YUV 还需 YUV→RGB 色彩转换，额外开销固定存在（不算 jank）。
      detection_skill: render_thread_slices

    - id: geometry_transaction_desync
      name: "几何 transaction 与 buffer 更新不同帧生效"
      description: |
        SurfaceView 的几何变化 transaction 与宿主 ViewRoot hole-punch 没在同一帧生效，
        引发位置错位一帧。可通过 SurfaceSyncGroup（API 34+）/ TransactionCommittedListener 缓解。
        S05 §"系统提供的多 Surface 同步机制"。
      detection_skill: sf_composition_in_range

    - id: hwc_overlay_fallback_more_layers
      name: "多 layer 触发 HWC 降级"
      description: |
        多 layer 场景下 HWC overlay plane 数量上限被超出 / 透明混合 / 旋转缩放约束，
        导致更多 layer 被打回 client composition，GPU 合成带宽和功耗上升。
        S05 §"HWC 面对的是更复杂的 layer 组合题"。
      detection_skill: sf_layer_count_in_range

    - id: acquire_fence_late_blocks_layer
      name: "某条独立 layer acquire fence 晚 signal"
      description: |
        某条独立 layer 的 acquire fence 晚 signal，SF 这一轮选择沿用该 layer 旧内容。
        典型如 MediaCodec 输出 buffer 的 GPU 写入晚于本轮 vsync-sf。
      detection_skill: present_fence_timing

  recommended_skills:
    - scrolling_analysis
    - sf_frame_consumption
    - gpu_analysis
