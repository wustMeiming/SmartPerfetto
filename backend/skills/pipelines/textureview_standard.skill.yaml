# =============================================================================
# TextureView Standard Pipeline
# =============================================================================
# SurfaceTexture-based rendering integrated into View hierarchy.
# Higher integration but more overhead than SurfaceView.
# =============================================================================

name: pipeline_textureview_standard
version: "1.0"
type: pipeline_definition
category: rendering

meta:
  pipeline_id: TEXTUREVIEW_STANDARD
  display_name: "TextureView 标准"
  description: "SurfaceTexture 纹理采样/合成模式，与 View 层次集成"
  icon: "texture"
  family: surface
  doc_path: rendering_pipelines/S04_textureview_type.md
  # ----- Article-grounded signature (S04) -----
  s_article_ref: "S04"
  four_features:
    producer_threads: ["RenderThread"]   # 宿主 RT 既消费外部纹理，又生产宿主 buffer
    optional_external_producer_threads: ["media.codec*", "media.swcodec", "cameraserver", "engine threads"]
    expected_layer_count: 1   # 永远是单宿主 layer——SF 看不到 TextureView 独立 layer
    bufferqueue_path: "HOST_RESAMPLE"   # 外部 → SurfaceTexture(应用进程内 consumer) → 宿主 RT GPU 重采样 → 宿主 BBQ
    extra_rhythm_sources: ["external_producer_onFrameAvailable"]   # 外部到达反向触发宿主帧
  deviation_anchors: "host_resample_anchor_4_5_anchor_5_anchor_6"
  # 锚点偏离：外部 Producer 走自己的 ④⑤⑥ 落到 SurfaceTexture；
  # 宿主 ⑤ 在 syncFrameState 阶段做 updateTexImage acquire + GPU 重采样（双次 ⑤）；
  # 宿主 ⑥ 通过自己的 BBQ 提交合并后窗口结果。⑦→⑫ 与基线一致但宿主层已含外部内容。
  hard_constraint: |
    强制依赖 hardwareAccelerated=true（HWUI Hardware/Texture Layer）。
    宿主 Window 没开硬件加速时 TextureView 不工作——这是它和 SurfaceView 的架构区别之一。
  known_limitation: |
    无法显示 DRM 受保护内容——HWUI 通用渲染 context 不在 protected 模式下，读 secure buffer 只能拿到黑屏。
    需 DRM 视频时必须改用 SurfaceView。
  consumer_strategy_note: |
    现代 HWUI 路径通过 ASurfaceTexture_dequeueBuffer 取最新 pending buffer，丢弃中间帧。
    Producer 比宿主消费快时 trace 上预期 dropped/skipped frames，不是逐帧消费。
    若业务需要逐帧消费（视频编辑/分析）应改用 ImageReader 自管 BufferQueue。

detection:
  scoring_signals:
    - signal: has_surface_texture
      slice_pattern: "*SurfaceTexture*"
      min_count: 5
      weight: 25
    - signal: has_update_tex_image
      slice_pattern: "*updateTexImage*"
      min_count: 1
      weight: 15
    - signal: has_on_frame_available
      slice_pattern: "*onFrameAvailable*"
      weight: 8
    - signal: has_render_thread
      thread_pattern: "RenderThread*"
      weight: 20
    - signal: has_deferred_layer_updater
      slice_pattern: "*DeferredLayerUpdater*"
      weight: 8   # article-precise signal: DeferredLayerUpdater::apply() 触发 updateTexImage（S04）

  exclude_if:
    - thread: "1.ui"           # Flutter TextureView → FLUTTER_TEXTUREVIEW
    - thread: "1.raster"       # Flutter raster thread
    - thread: CrRendererMain   # WebView TextureView → WEBVIEW_TEXTUREVIEW_CUSTOM
    - slice_pattern: "*TBS*"   # X5 WebView
    - slice_pattern: "*X5*"    # X5 WebView
    - slice_pattern: "*UCCore*"  # UC WebView

teaching:
  source: "rendering_pipelines/S04_textureview_type.md"
auto_pin:
  instructions:
    # Time-ordered pinning (production -> transfer -> consume -> display)
    - pattern: "^VSYNC-app$"
      match_by: name
      priority: 1
      reason: "VSync (App 开始生产帧)"

    - pattern: "^main(\\s+\\d+)?$"
      match_by: name
      priority: 2
      reason: "App 主线程 (生产帧)"
      expand: true  # 展开显示 Running 状态和 callstack
      smart_filter:
        enabled: true
        description: "仅 Pin 活跃渲染进程的 main 线程"
        detection_sql: |
          SELECT DISTINCT p.name as process_name, COUNT(*) as frame_count
          FROM slice s
          JOIN thread_track tt ON s.track_id = tt.id
          JOIN thread t ON tt.utid = t.utid
          JOIN process p ON t.upid = p.upid
          WHERE t.name = 'RenderThread'
            AND s.name GLOB 'DrawFrame*'
            AND p.name IS NOT NULL
            AND p.name NOT LIKE 'com.android.systemui%'
            AND p.name NOT LIKE 'system_server%'
            AND p.name NOT LIKE '/system/%'
          GROUP BY p.upid
          HAVING frame_count > 5
          ORDER BY frame_count DESC
          LIMIT 10
        fallback_sql: |
          SELECT DISTINCT p.name as process_name, COUNT(*) as slice_count
          FROM slice s
          JOIN thread_track tt ON s.track_id = tt.id
          JOIN thread t ON tt.utid = t.utid
          JOIN process p ON t.upid = p.upid
          WHERE t.name = 'main'
          GROUP BY p.upid
          HAVING slice_count > 10
          ORDER BY slice_count DESC
          LIMIT 10

    - pattern: "SurfaceTexture|updateTexImage|onFrameAvailable"
      match_by: name
      priority: 2.5
      reason: "SurfaceTexture (纹理生产-消费/出图关键)"

    - pattern: "^RenderThread(\\s+\\d+)?$"
      match_by: name
      priority: 3
      reason: "App 渲染线程 (RenderThread)"
      expand: true  # 展开显示 Running 状态和 callstack
      smart_filter:
        enabled: true
        description: "仅 Pin 有活跃渲染的进程的 RenderThread"
        detection_sql: |
          SELECT DISTINCT p.name as process_name, COUNT(*) as frame_count
          FROM slice s
          JOIN thread_track tt ON s.track_id = tt.id
          JOIN thread t ON tt.utid = t.utid
          JOIN process p ON t.upid = p.upid
          WHERE t.name = 'RenderThread'
            AND s.name GLOB 'DrawFrame*'
            AND p.name IS NOT NULL
            AND p.name NOT LIKE 'com.android.systemui%'
            AND p.name NOT LIKE 'system_server%'
            AND p.name NOT LIKE '/system/%'
          GROUP BY p.upid
          HAVING frame_count > 5
          ORDER BY frame_count DESC
          LIMIT 10
        fallback_sql: |
          SELECT DISTINCT p.name as process_name, COUNT(*) as slice_count
          FROM slice s
          JOIN thread_track tt ON s.track_id = tt.id
          JOIN thread t ON tt.utid = t.utid
          JOIN process p ON t.upid = p.upid
          WHERE t.name = 'RenderThread'
            AND s.name GLOB 'DrawFrame*'
          GROUP BY p.upid
          HAVING slice_count > 10
          ORDER BY slice_count DESC
          LIMIT 10

    - pattern: "^VSYNC-sf$"
      match_by: name
      priority: 5.5
      reason: "VSync (SurfaceFlinger 消费/合成)"

    - pattern: "^BufferTX"
      match_by: name
      priority: 6
      reason: "BufferTX (SurfaceFlinger 事务)"

    - pattern: "^[sS]urface[fF]linger"
      match_by: name
      priority: 7
      reason: "SurfaceFlinger (最终合成/显示)"
      main_thread_only: true

analysis:
  common_issues:
    - id: texture_upload_slow
      name: "纹理更新/采样慢"
      description: "宿主侧纹理更新、采样或合成耗时过长"
      detection_skill: render_thread_slices

    # ----- Article-grounded issues (S04) -----
    - id: yuv_rgb_resampling_overhead
      name: "GPU 重采样 + YUV→RGB 色彩转换开销"
      description: |
        宿主 RenderThread 在执行 TextureView 所在的 DisplayList 时 GPU 要采样外部纹理进宿主窗口 buffer。
        GL 路径：samplerExternalOES（YUV→RGB 由 EGL/GL 扩展或硬件采样路径处理）。
        Vulkan 路径：AHardwareBuffer → VkImage + VkSamplerYcbcrConversion（不要写死 VK_FORMAT_*）。
        外部 buffer 尺寸常与显示尺寸不一致还要做缩放，alpha/圆角/旋转一并结算。S04 §"宿主 GPU 的重采样与 YUV→RGB 代价"。
      detection_skill: gpu_render_in_range

    - id: external_producer_late_arrival
      name: "外部 Producer 晚到导致宿主收口失败"
      description: |
        外部内容晚到 SurfaceTexture，宿主下一次 doFrame 还没到，或宿主 syncFrameState 阶段没消费到最新 buffer。
        看 trace 时要往上游追外部 Producer 的 queueBuffer 和 onFrameAvailable 时刻；
        Producer 可能跨进程（media.codec/cameraserver/Codec2 vendor service）。S04 §"外部 Producer 把内容送到 SurfaceTexture"。
      detection_skill: render_thread_slices

    - id: frame_drop_strategy_takes_latest
      name: "TextureView consumer 倾向取最新（丢中间帧）"
      description: |
        现代 HWUI 路径通过 ASurfaceTexture_dequeueBuffer 取最新 pending buffer，丢弃中间帧。
        Producer 比宿主消费快时 trace 上预期 dropped/skipped frames。需逐帧消费（视频编辑/分析）应改 ImageReader。
        S04 §"updateTexImage() 在 syncFrameState 阶段的 acquire 时机"。
      detection_skill: app_frame_production

    - id: requires_hardware_acceleration
      name: "TextureView 不支持 hardwareAccelerated=false"
      description: |
        TextureView 强制依赖 HWUI Hardware/Texture Layer 机制——宿主 Window 没开硬件加速时直接不工作。
        和 SurfaceView 不同（独立 Surface 与硬件加速无关）。
      detection_skill: render_thread_slices

    - id: cannot_display_drm_protected_content
      name: "无法显示 DRM 受保护内容"
      description: |
        受保护 buffer (GRALLOC_USAGE_PROTECTED) 只能通过 secure composition / secure overlay 路径读取。
        TextureView 走宿主 GPU 重采样而 HWUI 通用 context 不在 protected 模式 → 黑屏。需要 DRM 视频时改用 SurfaceView。
      detection_skill: sf_composition_in_range

    - id: dual_fence_layers
      name: "TextureView 实际有两套 fence"
      description: |
        外部 Producer 侧 fence 保护"宿主 updateTexImage 时不读到 GPU 没写完的外部内容"；
        宿主侧 fence 保护"SF latch 时不读到宿主 GPU 没合成完的最终窗口结果"。两层不能混淆。
      detection_skill: present_fence_timing

  recommended_skills:
    - render_thread_slices
    - gpu_analysis
    - present_fence_timing
