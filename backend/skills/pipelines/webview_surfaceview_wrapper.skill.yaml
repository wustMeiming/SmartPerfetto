# =============================================================================
# WebView SurfaceView Wrapper Pipeline
# =============================================================================
# Full-screen video wrapper mode for WebView.
# Used for video playback in WebView.
# =============================================================================

name: pipeline_webview_surfaceview_wrapper
version: "1.0"
type: pipeline_definition
category: rendering

meta:
  pipeline_id: WEBVIEW_SURFACEVIEW_WRAPPER
  display_name: "WebView SurfaceView Wrapper"
  description: "WebView 全屏视频包装模式"
  icon: "video"
  family: webview
  doc_path: rendering_pipelines/S09_webview_type.md
  # ----- Article-grounded signature (S09 + S12) -----
  s_article_ref: "S09"
  four_features:
    producer_threads: ["MediaCodec*", "media.codec", "media.swcodec", "CrRendererMain"]
    expected_layer_count: 1   # 视频独立 SurfaceView layer
    bufferqueue_path: "MEDIACODEC_TO_INDEPENDENT_SURFACE"   # 视频解码 → 独立 Surface BufferQueue → SF
    extra_rhythm_sources: ["video_codec_pacing"]
  deviation_anchors: "video_independent_surface_anchor_4_5_6_at_codec"
  # 锚点偏离：网页全屏视频时由 MediaCodec 直接解码到独立 SurfaceView 的 BufferQueue（同 S12 video overlay）。
  # CrRendererMain 主要管视频外壳 UI（控制条/字幕/手势）。
  related_pipeline: "全屏视频部分等价于 VIDEO_OVERLAY_HWC（S12），与之配合使用"
  subvariants_note: "文章 S09 列出的 5 种 WebView 路径之一（参 webview_gl_functor 注释）。"

detection:
  scoring_signals:
    - signal: has_webview
      slice_pattern: "*WebView*"
      weight: 30
    - signal: has_webview_core
      thread_pattern: "WebViewCore*"
      weight: 10
    - signal: has_cr_renderer
      thread_pattern: "CrRendererMain*"
      weight: 10
    - signal: has_surfaceview
      slice_pattern: "*SurfaceView*"
      weight: 25
    - signal: has_video
      slice_pattern: "*Video*"
      weight: 12
    - signal: has_mediacodec
      slice_pattern: "*MediaCodec*"
      weight: 13

  exclude_if:
    - thread: "1.ui"           # Flutter engine present → use Flutter pipeline

teaching:
  source: "rendering_pipelines/S09_webview_type.md"
auto_pin:
  instructions:
    # Time-ordered pinning (production -> transfer -> consume -> display)
    - pattern: "^VSYNC-app$"
      match_by: name
      priority: 1
      reason: "VSync (WebView/视频开始生产帧)"

    - pattern: "^main(\\s+\\d+)?$"
      match_by: name
      priority: 2
      reason: "App 控制 (生产)"
      expand: true  # 展开显示 Running 状态和 callstack
      smart_filter:
        enabled: true
        description: "仅 Pin 活跃渲染进程的宿主主线程"

    - pattern: "CrRendererMain"
      match_by: name
      priority: 3
      reason: "Chromium 渲染 (生产/传输)"
      smart_filter:
        enabled: true
        description: "仅 Pin 属于当前 app 的 Chromium 渲染进程"

    - pattern: "MediaCodec"
      match_by: name
      priority: 4
      reason: "视频解码 (生产/传输)"

    - pattern: "^VSYNC-sf$"
      match_by: name
      priority: 5.5
      reason: "VSync (SurfaceFlinger 消费/合成)"

    - pattern: "^BufferTX"
      match_by: name
      priority: 6
      reason: "BufferTX (SurfaceFlinger 事务)"

    - pattern: "^[sS]urface[fF]linger"
      match_by: name
      priority: 7
      reason: "SurfaceFlinger (最终合成/显示)"
      main_thread_only: true

analysis:
  common_issues:
    # ----- Article-grounded issues (S09 + S12) -----
    - id: codec_underflow
      name: "MediaCodec output buffer 不足"
      description: |
        MediaCodec releaseOutputBuffer 频率与显示节奏不匹配——pool 用完时下一次 dequeueOutputBuffer 阻塞。
        触发原因：HWC 消费慢 / SurfaceView consumer back-pressure / decoder 解码慢。
      detection_skill: gpu_render_in_range

    - id: hwc_overlay_decision_for_video
      name: "HWC overlay 决策对视频敏感"
      description: |
        视频 buffer 通常 YUV NV12/P010 格式，HWC 倾向 device composition；但 DRM/HDCP 受保护内容必须走 secure overlay；
        旋转、缩放比例超 HWC scaler 能力或 HDR 元数据不支持 → 回退 client composition 增加 GPU 负担。
      detection_skill: sf_layer_count_in_range

    - id: webview_video_chrome_decoupling
      name: "网页视频与外壳 UI 解耦"
      description: |
        视频 layer 走 MediaCodec → 独立 Surface 路径，CrRendererMain 仅管理外壳。
        若网页外壳 UI（控制条、字幕）渲染卡，但视频流畅，要分别归因。
      detection_skill: sf_frame_consumption

  recommended_skills:
    - sf_frame_consumption
    - cpu_analysis