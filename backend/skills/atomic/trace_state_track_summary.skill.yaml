name: trace_state_track_summary
version: "1.0"
type: atomic
category: system
tier: B

meta:
  display_name: "Trace State Track Summary"
  description: "Summarize Perfetto v57 state table intervals by track, category, and symbolic value"
  icon: "view_timeline"
  tags: [state, track, timeline, upstream_v57, atomic]

triggers:
  keywords:
    zh: [state track, 状态轨, 状态表, 符号状态]
    en: [state track, state table, symbolic state, track state]
  patterns:
    - ".*state.*track.*"
    - ".*状态.*轨.*"

prerequisites:
  modules:
    - viz.summary.track_event

inputs:
  - name: start_ts
    type: timestamp
    required: false
    description: "Start timestamp in ns"
  - name: end_ts
    type: timestamp
    required: false
    description: "End timestamp in ns"
  - name: track_name
    type: string
    required: false
    description: "Optional track name substring"
  - name: category
    type: string
    required: false
    description: "Optional state category substring"
  - name: max_rows
    type: integer
    required: false
    default: 80
    description: "Maximum rows to return"

display:
  level: summary
  layer: list
  title: "State Track Summary"
  columns:
    - name: track_name
      label: "Track"
      type: string
    - name: category
      label: "Category"
      type: string
    - name: state_value
      label: "State"
      type: string
    - name: event_count
      label: "Count"
      type: number
    - name: total_dur_ms
      label: "Total(ms)"
      type: number
    - name: avg_dur_ms
      label: "Avg(ms)"
      type: number
    - name: max_dur_ms
      label: "Max(ms)"
      type: number
    - name: first_ts
      label: "First"
      type: timestamp
      unit: ns
    - name: last_ts
      label: "Last"
      type: timestamp
      unit: ns
    - name: share_pct
      label: "Share"
      type: percentage
      format: percentage

sql: |
  WITH input AS (
    SELECT MIN(MAX(COALESCE(${max_rows|80}, 80), 1), 500) AS max_rows
  ),
  filtered AS (
    SELECT
      s.ts,
      s.dur,
      COALESCE(t.name, printf('track:%d', s.track_id)) AS track_name,
      COALESCE(s.category, '') AS category,
      COALESCE(s.value, '') AS state_value
    FROM state AS s
    LEFT JOIN track AS t
      ON t.id = s.track_id
    WHERE s.dur > 0
      AND (${start_ts} IS NULL OR s.ts >= ${start_ts})
      AND (${end_ts} IS NULL OR s.ts < ${end_ts})
      AND ('${track_name|}' = '' OR LOWER(COALESCE(t.name, '')) GLOB '*' || LOWER('${track_name|}') || '*')
      AND ('${category|}' = '' OR LOWER(COALESCE(s.category, '')) GLOB '*' || LOWER('${category|}') || '*')
  ),
  totals AS (
    SELECT SUM(dur) AS total_dur
    FROM filtered
  ),
  grouped AS (
    SELECT
      track_name,
      category,
      state_value,
      COUNT(*) AS event_count,
      ROUND(SUM(dur) / 1e6, 2) AS total_dur_ms,
      ROUND(AVG(dur) / 1e6, 2) AS avg_dur_ms,
      ROUND(MAX(dur) / 1e6, 2) AS max_dur_ms,
      printf('%d', MIN(ts)) AS first_ts,
      printf('%d', MAX(ts)) AS last_ts,
      ROUND(100.0 * SUM(dur) / NULLIF((SELECT total_dur FROM totals), 0), 2) AS share_pct
    FROM filtered
    GROUP BY track_name, category, state_value
    ORDER BY SUM(dur) DESC
    LIMIT (SELECT max_rows FROM input)
  )
  SELECT *
  FROM grouped
  UNION ALL
  SELECT
    'state' AS track_name,
    '' AS category,
    'no_state_rows' AS state_value,
    0 AS event_count,
    0 AS total_dur_ms,
    0 AS avg_dur_ms,
    0 AS max_dur_ms,
    '0' AS first_ts,
    '0' AS last_ts,
    0 AS share_pct
  WHERE NOT EXISTS (SELECT 1 FROM filtered)

output:
  format: structured
  fields:
    - name: total_dur_ms
      description: "Total duration for each symbolic state value on a track"
    - name: share_pct
      description: "Share of all filtered state duration represented by this grouped row"
