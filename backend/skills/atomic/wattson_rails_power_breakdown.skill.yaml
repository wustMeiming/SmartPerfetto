# =============================================================================
# Wattson Power Rails 聚合分析（B 级 atomic）
# =============================================================================
# 使用 Perfetto stdlib 的 wattson.aggregation 模块，从 trace 中提取 Wattson
# 估算的 CPU/GPU/TPU 子系统能耗（mWs）和平均功率（mW）。
#
# 数据前置：trace 必须开启 power_rails 数据源 + battery counters。否则
# wattson_rails_aggregation! macro 可能无可用估算（capability detection 在
# traceCompletenessProber 的 `power_rails` / `cpu_freq_idle` capability 中处理）。

name: wattson_rails_power_breakdown
version: "1.0"
type: atomic
category: power
tier: B

meta:
  display_name: "Power Rails 能耗分解"
  description: "按 Wattson 子系统统计估算能耗（mWs）和平均功率（mW）"
  icon: "battery_full"
  tags: [power, wattson, rails, energy, atomic]

prerequisites:
  modules:
    - wattson.aggregation

inputs:
  - name: start_ts
    type: timestamp
    required: false
    description: "分析起始时间戳(ns)"
  - name: end_ts
    type: timestamp
    required: false
    description: "分析结束时间戳(ns)"
  - name: top_n
    type: number
    required: false
    default: 20
    description: "返回前 N 条 rail（按能耗排序）"

steps:
  - id: rails_aggregation
    type: atomic
    name: "Power Rails 能耗聚合"
    display:
      level: detail
      layer: list
      title: "按 Rail 的能耗与峰值功率"
      columns:
        - name: subsystem
          label: "子系统"
          type: string
        - name: breakdown_type
          label: "分解类型"
          type: string
        - name: component_id
          label: "组件"
          type: string
        - name: total_energy_mws
          label: "总能耗(mWs)"
          type: number
          format: compact
        - name: energy_mwh
          label: "能耗(mWh)"
          type: number
          format: compact
        - name: avg_power_mw
          label: "平均功率(mW)"
          type: number
          format: compact
        - name: source_level
          label: "数据来源"
          type: string
    sql: |
      SELECT
        subsystem,
        breakdown_type,
        COALESCE(CAST(component_id AS STRING), '') AS component_id,
        ROUND(SUM(estimated_mws), 2) AS total_energy_mws,
        ROUND(SUM(estimated_mws) / 3600.0, 6) AS energy_mwh,
        ROUND(SUM(estimated_mws) * 1e9 / NULLIF(SUM(period_dur), 0), 2) AS avg_power_mw,
        'wattson_estimate' AS source_level
      FROM wattson_rails_aggregation!((
        SELECT
          COALESCE(${start_ts}, trace_start()) AS ts,
          MAX(COALESCE(${end_ts}, trace_end()) - COALESCE(${start_ts}, trace_start()), 0) AS dur,
          0 AS period_id
      ))
      GROUP BY subsystem, breakdown_type, component_id
      ORDER BY total_energy_mws DESC
      LIMIT ${top_n|20}
