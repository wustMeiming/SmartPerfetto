# =============================================================================
# 主线程切片热点（原子 Skill）
# =============================================================================
# 分析指定时间区间内主线程切片耗时 TopN。

name: main_thread_slices_in_range
version: "1.0"
type: atomic
category: app_lifecycle
tier: B

meta:
  display_name: "主线程切片热点 (区间)"
  description: "统计区间内主线程切片耗时分布"
  icon: "view_timeline"
  tags: [main_thread, slice, startup, atomic]

inputs:
  - name: start_ts
    type: timestamp
    required: true
    description: "分析起始时间戳(ns)"
  - name: end_ts
    type: timestamp
    required: true
    description: "分析结束时间戳(ns)"
  - name: package
    type: string
    required: false
    description: "目标应用进程名；匹配精确进程或 name:* 子进程"
  - name: upid
    type: integer
    required: false
    default: 0
    description: "Trace 内唯一进程 ID；优先用于精确进程隔离"
  - name: pid
    type: integer
    required: false
    default: 0
    description: "进程 ID；无 upid 时作为降级匹配"
  - name: min_dur_ns
    type: integer
    required: false
    description: "最小切片时长阈值(ns)，默认 1ms"
  - name: top_k
    type: integer
    required: false
    description: "返回 TopK 条目，默认 10"

display:
  level: key
  layer: deep
  title: "主线程耗时操作 Top10"
  columns:
    - name: slice_name
      label: "切片名"
      type: string
    - name: count
      label: "次数"
      type: number
      format: compact
    - name: total_ms
      label: "总耗时(wall)"
      type: duration
      format: duration_ms
    - name: self_ms
      label: "自身耗时"
      type: duration
      format: duration_ms
    - name: avg_ms
      label: "平均耗时"
      type: duration
      format: duration_ms
    - name: max_ms
      label: "最大耗时"
      type: duration
      format: duration_ms
    - name: percent
      label: "区间占比(wall)"
      type: percentage
      format: percentage
    - name: self_percent
      label: "区间占比(self)"
      type: percentage
      format: percentage

sql: |
  WITH main_thread AS (
    SELECT t.utid
    FROM thread t
    JOIN process p ON t.upid = p.upid
    WHERE (
        (${upid|0} > 0 AND p.upid = ${upid|0})
        OR (${upid|0} <= 0 AND ${pid|0} > 0 AND p.pid = ${pid|0}
            AND ('${package|}' = '' OR p.name = '${package|}' OR p.name GLOB '${package|}:*'))
        OR (${upid|0} <= 0 AND ${pid|0} <= 0
            AND ('${package|}' = '' OR p.name = '${package|}' OR p.name GLOB '${package|}:*'))
      )
      AND t.tid = p.pid
  ),
  -- Compute per-slice self_dur (exclusive time = wall time - direct children time)
  slice_with_self AS (
    SELECT
      s.id,
      s.name as slice_name,
      MIN(CASE WHEN s.dur < 0 THEN ${end_ts} ELSE s.ts + s.dur END, ${end_ts}) - MAX(s.ts, ${start_ts}) as clipped_dur,
      -- Self dur = clipped wall time minus clipped children time
      (MIN(CASE WHEN s.dur < 0 THEN ${end_ts} ELSE s.ts + s.dur END, ${end_ts}) - MAX(s.ts, ${start_ts}))
        - COALESCE((
            SELECT SUM(
              MIN(
                CASE WHEN c.dur < 0 THEN ${end_ts} ELSE c.ts + c.dur END,
                MIN(CASE WHEN s.dur < 0 THEN ${end_ts} ELSE s.ts + s.dur END, ${end_ts})
              )
              - MAX(c.ts, MAX(s.ts, ${start_ts}))
            )
            FROM slice c
            WHERE c.parent_id = s.id
              AND c.ts < ${end_ts}
              AND (CASE WHEN c.dur < 0 THEN ${end_ts} ELSE c.ts + c.dur END) > ${start_ts}
          ), 0) as self_dur
    FROM slice s
    JOIN thread_track tt ON s.track_id = tt.id
    JOIN main_thread mt ON tt.utid = mt.utid
    WHERE s.ts < ${end_ts}
      AND (CASE WHEN s.dur < 0 THEN ${end_ts} ELSE s.ts + s.dur END) > ${start_ts}
  )
  SELECT
    slice_name,
    COUNT(*) as count,
    ROUND(SUM(clipped_dur) / 1e6, 2) as total_ms,
    ROUND(SUM(self_dur) / 1e6, 2) as self_ms,
    ROUND(AVG(clipped_dur) / 1e6, 2) as avg_ms,
    ROUND(MAX(clipped_dur) / 1e6, 2) as max_ms,
    ROUND(100.0 * SUM(clipped_dur) / NULLIF(${end_ts} - ${start_ts}, 0), 1) as percent,
    ROUND(100.0 * SUM(self_dur) / NULLIF(${end_ts} - ${start_ts}, 0), 1) as self_percent
  FROM slice_with_self
  WHERE clipped_dur >= ${min_dur_ns|1000000}
  GROUP BY slice_name
  ORDER BY total_ms DESC
  LIMIT ${top_k|10}

output:
  format: structured
