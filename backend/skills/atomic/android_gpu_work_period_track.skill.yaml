# =============================================================================
# GPU Work Period（B 级 atomic）
# =============================================================================
# 使用 android.gpu.work_period 模块的 android_gpu_work_period_track 视图，
# 提取 GPU 实际工作区间（与功耗模型联动 — wattson.gpu 依赖此数据）。

name: android_gpu_work_period_track
version: "1.0"
type: atomic
category: gpu
tier: B

meta:
  display_name: "GPU Work Period"
  description: "GPU 实际工作区间（功耗模型前置数据）"
  icon: "memory"
  tags: [gpu, work_period, power, wattson, atomic]

prerequisites:
  modules:
    - android.gpu.work_period

inputs:
  - name: package
    type: string
    required: false
  - name: start_ts
    type: timestamp
    required: false
  - name: end_ts
    type: timestamp
    required: false

steps:
  - id: gpu_work
    type: atomic
    name: "GPU 工作区间"
    display:
      level: detail
      layer: list
      title: "GPU Work Period 区间"
      columns:
        - name: ts
          label: "起始"
          type: timestamp
        - name: dur_ms
          label: "时长(ms)"
          type: duration
          format: duration_ms
        - name: uid
          label: "UID"
          type: number
    sql: |
      SELECT
        s.ts,
        ROUND(s.dur / 1e6, 2) AS dur_ms,
        t.uid,
        t.gpu_id
      FROM android_gpu_work_period_track t
      JOIN slice s ON s.track_id = t.id
      WHERE s.dur > 0
        AND (${start_ts} IS NULL OR s.ts >= ${start_ts})
        AND (${end_ts} IS NULL OR s.ts < ${end_ts})
        AND (
          '${package}' = ''
          OR EXISTS (
            SELECT 1
            FROM package_list p
            WHERE p.uid = t.uid
              AND p.package_name GLOB '${package}*'
          )
        )
      ORDER BY s.ts ASC
      LIMIT 100
