# =============================================================================
# Kernel Wakelock 汇总（B 级 atomic）
# =============================================================================
# 使用 android.kernel_wakelocks 模块统计每个 wakelock 的总持有时长。
# 内核 wakelock 持有时间长 → 阻止设备进入 suspend → 后台耗电主因。

name: android_kernel_wakelock_summary
version: "1.0"
type: atomic
category: power
tier: B

meta:
  display_name: "Kernel Wakelock 汇总"
  description: "kernel wakelock 持有时长（阻止 suspend 的源头）"
  icon: "lock_open"
  tags: [wakelock, kernel, suspend, power, atomic]

prerequisites:
  modules:
    - android.kernel_wakelocks

inputs:
  - name: start_ts
    type: timestamp
    required: false
    description: "分析起始时间戳(ns)"
  - name: end_ts
    type: timestamp
    required: false
    description: "分析结束时间戳(ns)"

steps:
  - id: wakelock_summary
    type: atomic
    name: "Wakelock 汇总"
    display:
      level: detail
      layer: list
      title: "Kernel Wakelock 持有时长"
      columns:
        - name: name
          label: "Wakelock"
          type: string
        - name: total_held_sec
          label: "总持有(秒)"
          type: duration
          format: compact
        - name: count
          label: "次数"
          type: number
          format: compact
        - name: held_ratio_pct
          label: "唤醒期占比(%)"
          type: percentage
        - name: observed_window_hours
          label: "观测窗口(小时)"
          type: number
          format: compact
        - name: evidence_scope
          label: "证据范围"
          type: string
        - name: vitals_hint
          label: "Vitals 参考"
          type: string
    sql: |
      WITH window_bounds AS (
        SELECT
          COALESCE(${start_ts}, trace_start()) AS win_start,
          COALESCE(${end_ts}, trace_end()) AS win_end,
          COALESCE(${end_ts}, trace_end()) - COALESCE(${start_ts}, trace_start()) AS observed_window_ns
      ),
      clipped AS (
        SELECT
          akw.name,
          akw.type,
          wb.observed_window_ns,
          CASE
            WHEN akw.dur > 0 THEN akw.held_dur * (
              MIN(akw.ts + akw.dur, wb.win_end) -
              MAX(akw.ts, wb.win_start)
            ) / akw.dur
            ELSE akw.held_dur
          END AS clipped_held_dur,
          CASE
            WHEN akw.dur > 0 THEN akw.awake_dur * (
              MIN(akw.ts + akw.dur, wb.win_end) -
              MAX(akw.ts, wb.win_start)
            ) / akw.dur
            ELSE akw.awake_dur
          END AS clipped_awake_dur
        FROM android_kernel_wakelocks akw
        CROSS JOIN window_bounds wb
        WHERE akw.ts < wb.win_end
          AND akw.ts + akw.dur > wb.win_start
      )
      SELECT
        name,
        ROUND(SUM(clipped_held_dur) / 1e9, 1) AS total_held_sec,
        COUNT(*) AS count,
        ROUND(SUM(clipped_held_dur) * 100.0 / NULLIF(SUM(clipped_awake_dur), 0), 2) AS held_ratio_pct,
        ROUND(MAX(observed_window_ns) / 3600000000000.0, 2) AS observed_window_hours,
        CASE
          WHEN MAX(observed_window_ns) >= 86400000000000 THEN 'full_24h_or_longer_window'
          ELSE 'partial_trace_window'
        END AS evidence_scope,
        CASE
          WHEN MAX(observed_window_ns) >= 86400000000000
               AND SUM(clipped_held_dur) >= 7200000000000 THEN 'excessive_24h_reference'
          WHEN SUM(clipped_held_dur) >= 3600000000000 THEN 'stuck_candidate_local_window'
          WHEN MAX(observed_window_ns) < 86400000000000 THEN 'partial_window_not_vitals_judgment'
          ELSE 'below_local_reference'
        END AS vitals_hint
      FROM clipped
      GROUP BY name
      ORDER BY total_held_sec DESC
      LIMIT 30
