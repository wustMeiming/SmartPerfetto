# =============================================================================
# 帧 Overrun 汇总（B 级 atomic）
# =============================================================================
# 使用 android.frames.per_frame_metrics 模块的 android_frames_overrun 视图列出每个 overrun 帧。
# Overrun 是 SurfaceFlinger frame timeline 的核心 jank 信号。

name: frame_overrun_summary
version: "1.0"
type: atomic
category: rendering
tier: B

meta:
  display_name: "Frame Overrun 汇总"
  description: "超 budget 的帧（jank 候选）"
  icon: "warning"
  tags: [frame, overrun, jank, atomic]

triggers:
  keywords:
    zh: [frame overrun, 帧超时, 超预算, 掉帧汇总]
    en: [frame overrun, frame budget, overrun summary, dropped frame]
  patterns:
    - ".*(overrun|budget).*frame.*"
    - ".*(帧|掉帧).*(超时|超预算).*"

prerequisites:
  modules:
    - android.frames.per_frame_metrics

inputs: []

steps:
  - id: overrun_frames
    type: atomic
    name: "Overrun 帧列表"
    display:
      level: detail
      layer: list
      title: "超 budget 帧列表"
      columns:
        - name: frame_id
          label: "Frame ID"
          type: number
        - name: ts
          label: "时间"
          type: timestamp
        - name: dur_ms
          label: "实际时长(ms)"
          type: duration
          format: duration_ms
        - name: overrun_ms
          label: "超额(ms)"
          type: duration
          format: duration_ms
    sql: |
      SELECT
        o.frame_id,
        MIN(a.ts) AS ts,
        ROUND(MAX(a.dur) / 1e6, 2) AS dur_ms,
        ROUND(o.overrun / 1e6, 2) AS overrun_ms
      FROM android_frames_overrun o
      LEFT JOIN actual_frame_timeline_slice a
        ON CAST(a.name AS INTEGER) = o.frame_id
      GROUP BY o.frame_id, o.overrun
      ORDER BY o.overrun DESC
      LIMIT 100
