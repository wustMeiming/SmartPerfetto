# =============================================================================
# 进程级 CPU 利用率周期（B 级 atomic）
# =============================================================================
# 使用 linux.cpu.utilization.process 的 cpu_process_utilization_per_period 视图。
# 比 thread 粒度更高（按进程聚合），适合 哪个进程吃 CPU 最多 的快速排序。

name: cpu_process_utilization_period
version: "1.0"
type: atomic
category: cpu
tier: B

meta:
  display_name: "进程 CPU 利用率"
  description: "按进程聚合的 CPU 利用率周期采样"
  icon: "leaderboard"
  tags: [cpu, process, utilization, atomic]

prerequisites:
  modules:
    - linux.cpu.utilization.process

inputs:
  - name: process_name
    type: string
    required: false
  - name: start_ts
    type: timestamp
    required: false
  - name: end_ts
    type: timestamp
    required: false

steps:
  - id: process_util
    type: atomic
    name: "进程 CPU 利用率"
    display:
      level: detail
      layer: list
      title: "Top CPU 占用进程"
      columns:
        - name: process_name
          label: "进程"
          type: string
        - name: utilization
          label: "利用率"
          type: number
          format: compact
    sql: |
      WITH target_processes AS (
        SELECT upid, name AS process_name
        FROM process
        WHERE upid IS NOT NULL
          AND name IS NOT NULL
          AND (name GLOB '${process_name}*' OR '${process_name}' = '')
      ), samples AS (
        SELECT
          p.process_name,
          u.ts,
          u.utilization
        FROM target_processes p
        CROSS JOIN cpu_process_utilization_per_period(time_from_ms(100), p.upid) u
        WHERE (${start_ts} IS NULL OR u.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR u.ts < ${end_ts})
      )
      SELECT process_name, ts, ROUND(utilization, 4) AS utilization
      FROM samples
      ORDER BY utilization DESC
      LIMIT 30
