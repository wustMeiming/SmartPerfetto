  - id: determine_pipeline
    type: atomic
    name: 确定主管线 (YAML 驱动)
    display:
      level: summary
      title: 渲染管线识别结果
    sql: |2-

            WITH
            pipeline_scores AS (
              SELECT * FROM ${pipeline_scores}
            ),
            pipeline_metadata(
              pipeline_id,
              rendering_type_id,
              primary_eligible,
              feature_visible,
