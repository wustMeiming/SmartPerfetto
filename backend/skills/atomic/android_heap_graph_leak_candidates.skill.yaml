# =============================================================================
# Android Heap Graph Leak Candidates（原子 Skill）
# =============================================================================
# 面向 trace 内嵌 ART heap graph 的泄漏候选筛查。该 Skill 直接基于
# heap_graph_object / heap_graph_class / heap_graph_reference：
# - reachable=1 才进入候选，避免把待回收对象误报为泄漏
# - 生命周期只在可按 graph_sample_ts 对齐到组件切片时给高置信结论
# - 引用链以 suspect object ids 为入口，避免全量三表 JOIN

name: android_heap_graph_leak_candidates
version: "1.0"
type: atomic
category: memory
tier: A

meta:
  display_name: "Android Heap Graph Leak Candidates"
  description: "基于 Java heap graph、生命周期切片和引用关系识别 Activity/Fragment 泄漏候选"
  icon: "memory"
  tags: [memory, heap_graph, leak, activity, fragment, reference_chain, lifecycle]

triggers:
  keywords:
    zh: [Heap Graph 泄漏, Java 泄漏, Activity 泄漏, Fragment 泄漏, 引用链, 生命周期泄漏]
    en: [heap graph leak, java leak, activity leak, fragment leak, reference chain, lifecycle leak]
  patterns:
    - ".*(heap graph|Java heap).*(leak|泄漏|reference).*"
    - ".*(Activity|Fragment).*(leak|泄漏).*"

prerequisites:
  modules:
    - android.memory.heap_graph.excluded_refs
  required_tables:
    - heap_graph_object
    - heap_graph_class
    - heap_graph_reference

inputs:
  - name: package
    type: string
    required: false
    description: "目标进程名（支持前缀/GLOB）；process_name 为空时使用"
  - name: process_name
    type: string
    required: false
    description: "目标进程名别名；为空则分析所有 heap graph 进程"
  - name: graph_sample_ts
    type: timestamp
    required: false
    description: "指定 heap graph sample 时间戳；为空分析全部 sample"
  - name: class_name_glob
    type: string
    required: false
    description: "额外目标 class GLOB；为空时只检查 Activity/Fragment 命名类"
  - name: lifecycle_slice_prefix
    type: string
    required: false
    default: "SI$"
    description: "生命周期切片前缀，默认匹配 SI$<class>.<method>；传空字符串可用任意前缀 FQN 匹配"
  - name: max_candidates
    type: integer
    required: false
    default: 50
    description: "候选 class 返回行数"
  - name: max_reference_edges
    type: integer
    required: false
    default: 100
    description: "引用边返回行数"

steps:
  - id: leak_candidates
    type: atomic
    name: "Heap Graph 泄漏候选"
    display:
      level: key
      layer: list
      title: "Heap Graph 泄漏候选"
      columns:
        - name: process_name
          label: "进程"
          type: string
        - name: upid
          label: "UPID"
          type: number
        - name: graph_sample_ts
          label: "Sample 时间"
          type: timestamp
          unit: ns
        - name: class_name
          label: "Class"
          type: string
        - name: component_type
          label: "组件"
          type: string
        - name: reachable_obj_count
          label: "Reachable 实例"
          type: number
        - name: self_size_mb
          label: "Java Self(MB)"
          type: number
        - name: native_size_mb
          label: "Native(MB)"
          type: number
        - name: lifecycle_phase_at_sample
          label: "Sample 前生命周期"
          type: string
        - name: leak_state
          label: "判定"
          type: string
        - name: confidence
          label: "置信度"
          type: string
    sql: |
      WITH
      input AS (
        SELECT
          COALESCE(NULLIF('${process_name|}', ''), NULLIF('${package|}', ''), '') AS target_process,
          NULLIF('${class_name_glob|}', '') AS class_name_glob,
          COALESCE(NULLIF('${lifecycle_slice_prefix|SI$}', ''), '') AS lifecycle_prefix,
          MIN(MAX(COALESCE(${max_candidates|50}, 50), 1), 200) AS max_candidates
      ),
      heap_objects AS (
        SELECT
          o.id AS object_id,
          o.upid,
          o.graph_sample_ts,
          COALESCE(p.name, printf('upid:%d', o.upid)) AS process_name,
          COALESCE(c.deobfuscated_name, c.name) AS class_name,
          o.self_size,
          COALESCE(o.native_size, 0) AS native_size
        FROM heap_graph_object o
        JOIN heap_graph_class c ON o.type_id = c.id
        LEFT JOIN process p ON p.upid = o.upid
        CROSS JOIN input
        WHERE o.reachable = 1
          AND (input.target_process = '' OR p.name GLOB input.target_process || '*')
          AND (${graph_sample_ts} IS NULL OR o.graph_sample_ts = ${graph_sample_ts})
          AND COALESCE(c.deobfuscated_name, c.name) NOT IN (
            'android.app.Activity',
            'android.app.Fragment',
            'androidx.fragment.app.Fragment',
            'androidx.activity.ComponentActivity',
            'androidx.appcompat.app.AppCompatActivity'
          )
          AND (
            COALESCE(c.deobfuscated_name, c.name) GLOB '*Activity'
            OR COALESCE(c.deobfuscated_name, c.name) GLOB '*Activity$*'
            OR COALESCE(c.deobfuscated_name, c.name) GLOB '*Activity_*'
            OR COALESCE(c.deobfuscated_name, c.name) GLOB '*Fragment'
            OR COALESCE(c.deobfuscated_name, c.name) GLOB '*Fragment$*'
            OR COALESCE(c.deobfuscated_name, c.name) GLOB '*Fragment_*'
            OR (input.class_name_glob IS NOT NULL AND COALESCE(c.deobfuscated_name, c.name) GLOB input.class_name_glob)
          )
      ),
      class_candidates AS (
        SELECT
          upid,
          graph_sample_ts,
          process_name,
          class_name,
          CASE
            WHEN class_name GLOB '*Fragment' OR class_name GLOB '*Fragment$*' OR class_name GLOB '*Fragment_*' THEN 'Fragment'
            WHEN class_name GLOB '*Activity' OR class_name GLOB '*Activity$*' OR class_name GLOB '*Activity_*' THEN 'Activity'
            ELSE 'custom'
          END AS component_type,
          COUNT(*) AS reachable_obj_count,
          SUM(self_size) AS self_size_bytes,
          SUM(native_size) AS native_size_bytes,
          GROUP_CONCAT(object_id) AS object_ids
        FROM heap_objects
        GROUP BY upid, graph_sample_ts, process_name, class_name
      ),
      candidates_with_lifecycle AS (
        SELECT
          c.*,
          (
            SELECT
              CASE
                WHEN s.name GLOB '*onDestroyView*' THEN 'destroyed'
                WHEN s.name GLOB '*onDestroy*' THEN 'destroyed'
                WHEN s.name GLOB '*onPause*' THEN 'inactive'
                WHEN s.name GLOB '*onStop*' THEN 'inactive'
                WHEN s.name GLOB '*onResume*' THEN 'active'
                WHEN s.name GLOB '*onStart*' THEN 'active'
                WHEN s.name GLOB '*onCreate*' THEN 'active'
                ELSE 'unknown'
              END
            FROM slice s
            JOIN thread_track tt ON s.track_id = tt.id
            JOIN thread t ON tt.utid = t.utid
            JOIN process p ON t.upid = p.upid
            CROSS JOIN input
            WHERE p.upid = c.upid
              AND s.dur >= 0
              AND s.ts + s.dur <= c.graph_sample_ts
              AND (
                (input.lifecycle_prefix = '' AND s.name GLOB '*' || c.class_name || '.*')
                OR (input.lifecycle_prefix != '' AND s.name GLOB input.lifecycle_prefix || c.class_name || '.*')
              )
              AND (
                s.name GLOB '*onCreate*' OR s.name GLOB '*onStart*' OR s.name GLOB '*onResume*'
                OR s.name GLOB '*onPause*' OR s.name GLOB '*onStop*'
                OR s.name GLOB '*onDestroy*' OR s.name GLOB '*onDestroyView*'
              )
            ORDER BY s.ts DESC
            LIMIT 1
          ) AS lifecycle_phase_at_sample
        FROM class_candidates c
      )
      SELECT
        process_name,
        upid,
        printf('%d', graph_sample_ts) AS graph_sample_ts,
        class_name,
        component_type,
        reachable_obj_count,
        ROUND(self_size_bytes / 1048576.0, 2) AS self_size_mb,
        ROUND(native_size_bytes / 1048576.0, 2) AS native_size_mb,
        COALESCE(lifecycle_phase_at_sample, 'unknown') AS lifecycle_phase_at_sample,
        CASE
          WHEN lifecycle_phase_at_sample = 'destroyed' THEN 'destroyed_reachable'
          WHEN reachable_obj_count > 1 THEN 'multi_instance_reachable'
          WHEN lifecycle_phase_at_sample IN ('active', 'inactive') THEN 'lifecycle_reachable'
          ELSE 'unknown_reachable'
        END AS leak_state,
        CASE
          WHEN lifecycle_phase_at_sample = 'destroyed' THEN 'high'
          WHEN reachable_obj_count > 1 THEN 'low'
          ELSE 'info'
        END AS confidence,
        object_ids
      FROM candidates_with_lifecycle
      ORDER BY
        CASE
          WHEN lifecycle_phase_at_sample = 'destroyed' THEN 0
          WHEN reachable_obj_count > 1 THEN 1
          ELSE 2
        END,
        self_size_bytes DESC,
        reachable_obj_count DESC
      LIMIT (SELECT max_candidates FROM input)
    save_as: leak_candidates

  - id: reference_holders
    type: atomic
    name: "候选对象保留引用来源"
    optional: true
    display:
      level: detail
      layer: list
      title: "候选对象保留引用来源"
      columns:
        - name: process_name
          label: "进程"
          type: string
        - name: graph_sample_ts
          label: "Sample 时间"
          type: timestamp
          unit: ns
        - name: candidate_class
          label: "候选 Class"
          type: string
        - name: owned_object_id
          label: "对象 ID"
          type: number
        - name: owner_class
          label: "保留引用来源 Class"
          type: string
        - name: field_display
          label: "字段"
          type: string
        - name: field_type_name
          label: "字段类型"
          type: string
        - name: leak_state
          label: "候选判定"
          type: string
    sql: |
      WITH
      input AS (
        SELECT
          COALESCE(NULLIF('${process_name|}', ''), NULLIF('${package|}', ''), '') AS target_process,
          NULLIF('${class_name_glob|}', '') AS class_name_glob,
          COALESCE(NULLIF('${lifecycle_slice_prefix|SI$}', ''), '') AS lifecycle_prefix,
          MIN(MAX(COALESCE(${max_candidates|50}, 50), 1), 200) AS max_candidates,
          MIN(MAX(COALESCE(${max_reference_edges|100}, 100), 1), 500) AS max_reference_edges
      ),
      heap_objects AS (
        SELECT
          o.id AS object_id,
          o.upid,
          o.graph_sample_ts,
          COALESCE(p.name, printf('upid:%d', o.upid)) AS process_name,
          COALESCE(c.deobfuscated_name, c.name) AS class_name,
          o.self_size,
          COALESCE(o.native_size, 0) AS native_size
        FROM heap_graph_object o
        JOIN heap_graph_class c ON o.type_id = c.id
        LEFT JOIN process p ON p.upid = o.upid
        CROSS JOIN input
        WHERE o.reachable = 1
          AND (input.target_process = '' OR p.name GLOB input.target_process || '*')
          AND (${graph_sample_ts} IS NULL OR o.graph_sample_ts = ${graph_sample_ts})
          AND COALESCE(c.deobfuscated_name, c.name) NOT IN (
            'android.app.Activity',
            'android.app.Fragment',
            'androidx.fragment.app.Fragment',
            'androidx.activity.ComponentActivity',
            'androidx.appcompat.app.AppCompatActivity'
          )
          AND (
            COALESCE(c.deobfuscated_name, c.name) GLOB '*Activity'
            OR COALESCE(c.deobfuscated_name, c.name) GLOB '*Activity$*'
            OR COALESCE(c.deobfuscated_name, c.name) GLOB '*Activity_*'
            OR COALESCE(c.deobfuscated_name, c.name) GLOB '*Fragment'
            OR COALESCE(c.deobfuscated_name, c.name) GLOB '*Fragment$*'
            OR COALESCE(c.deobfuscated_name, c.name) GLOB '*Fragment_*'
            OR (input.class_name_glob IS NOT NULL AND COALESCE(c.deobfuscated_name, c.name) GLOB input.class_name_glob)
          )
      ),
      class_candidates AS (
        SELECT
          upid,
          graph_sample_ts,
          process_name,
          class_name,
          COUNT(*) AS reachable_obj_count,
          SUM(self_size) AS self_size_bytes
        FROM heap_objects
        GROUP BY upid, graph_sample_ts, process_name, class_name
      ),
      candidate_states AS (
        SELECT
          c.*,
          (
            SELECT
              CASE
                WHEN s.name GLOB '*onDestroyView*' THEN 'destroyed'
                WHEN s.name GLOB '*onDestroy*' THEN 'destroyed'
                WHEN s.name GLOB '*onPause*' THEN 'inactive'
                WHEN s.name GLOB '*onStop*' THEN 'inactive'
                WHEN s.name GLOB '*onResume*' THEN 'active'
                WHEN s.name GLOB '*onStart*' THEN 'active'
                WHEN s.name GLOB '*onCreate*' THEN 'active'
                ELSE 'unknown'
              END
            FROM slice s
            JOIN thread_track tt ON s.track_id = tt.id
            JOIN thread t ON tt.utid = t.utid
            JOIN process p ON t.upid = p.upid
            CROSS JOIN input
            WHERE p.upid = c.upid
              AND s.dur >= 0
              AND s.ts + s.dur <= c.graph_sample_ts
              AND (
                (input.lifecycle_prefix = '' AND s.name GLOB '*' || c.class_name || '.*')
                OR (input.lifecycle_prefix != '' AND s.name GLOB input.lifecycle_prefix || c.class_name || '.*')
              )
              AND (
                s.name GLOB '*onCreate*' OR s.name GLOB '*onStart*' OR s.name GLOB '*onResume*'
                OR s.name GLOB '*onPause*' OR s.name GLOB '*onStop*'
                OR s.name GLOB '*onDestroy*' OR s.name GLOB '*onDestroyView*'
              )
            ORDER BY s.ts DESC
            LIMIT 1
          ) AS lifecycle_phase_at_sample
        FROM class_candidates c
      ),
      suspect_classes AS (
        SELECT
          *,
          CASE
            WHEN lifecycle_phase_at_sample = 'destroyed' THEN 'destroyed_reachable'
            WHEN reachable_obj_count > 1 THEN 'multi_instance_reachable'
            ELSE 'not_suspect'
          END AS leak_state
        FROM candidate_states
        WHERE lifecycle_phase_at_sample = 'destroyed'
          OR reachable_obj_count > 1
        ORDER BY
          CASE WHEN lifecycle_phase_at_sample = 'destroyed' THEN 0 ELSE 1 END,
          self_size_bytes DESC,
          reachable_obj_count DESC
        LIMIT (SELECT max_candidates FROM input)
      ),
      suspect_objects AS (
        SELECT
          h.*,
          sc.leak_state
        FROM heap_objects h
        JOIN suspect_classes sc
          ON sc.upid = h.upid
          AND sc.graph_sample_ts = h.graph_sample_ts
          AND sc.class_name = h.class_name
      )
      SELECT
        so.process_name,
        printf('%d', so.graph_sample_ts) AS graph_sample_ts,
        so.class_name AS candidate_class,
        so.object_id AS owned_object_id,
        COALESCE(owner_class.deobfuscated_name, owner_class.name, printf('owner:%d', ref.owner_id)) AS owner_class,
        COALESCE(CASE
          WHEN ref.deobfuscated_field_name IS NOT NULL AND ref.deobfuscated_field_name != ref.field_name THEN ref.deobfuscated_field_name
          ELSE ref.field_name
        END, '<unknown>') AS field_display,
        ref.field_type_name,
        so.leak_state
      FROM suspect_objects so
      JOIN heap_graph_reference ref
        ON ref.owned_id = so.object_id
        AND ref.id NOT IN _excluded_refs
      JOIN heap_graph_object owner_obj
        ON owner_obj.id = ref.owner_id
        AND owner_obj.reachable = 1
      LEFT JOIN heap_graph_class owner_class ON owner_obj.type_id = owner_class.id
      WHERE ref.owner_id IS NOT NULL
      ORDER BY
        CASE so.leak_state WHEN 'destroyed_reachable' THEN 0 ELSE 1 END,
        so.class_name,
        so.object_id
      LIMIT (SELECT max_reference_edges FROM input)
    save_as: reference_holders

output:
  format: structured
  fields:
    - name: leak_candidates
      description: "Reachable Activity/Fragment heap objects classified against sample-time lifecycle evidence"
    - name: reference_holders
      description: "Small-scope incoming retaining references for suspect heap objects, excluding Perfetto _excluded_refs referent edges (weak/phantom/finalizer in v56; soft reference edges are not filtered by this stdlib helper)"
