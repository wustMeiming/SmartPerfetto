# =============================================================================
# Power Consumption Overview
# =============================================================================
# Composite entrypoint for power investigations. It keeps rail-level Wattson
# attribution separate from fallback state/event evidence, so reports can label
# confidence correctly when trace power data is incomplete.

name: power_consumption_overview
version: "1.0"
type: composite
category: power
tier: S

meta:
  display_name: "功耗总览分析"
  description: "组合 Wattson rail/thread、battery、wakelock、DVFS、GPU work period 等证据，输出功耗问题总览"
  icon: "battery_charging_full"
  tags: [power, wattson, battery, wakelock, dvfs, overview, composite]

triggers:
  keywords:
    zh: [功耗总览, 耗电总览, 电池分析, rail 归因, wattson, 待机耗电]
    en: [power overview, battery drain overview, wattson, rail attribution, energy analysis]
  patterns:
    - ".*(功耗|耗电|电池).*(总览|归因|分析).*"
    - ".*(power|battery|energy).*(overview|attribution|analysis).*"

prerequisites:
  modules:
    - android.power_rails
    - wattson.aggregation
    - android.battery
    - android.kernel_wakelocks
    - android.wakeups
    - android.screen_state
    - android.network_packets
    - linux.cpu.idle

inputs:
  - name: package
    type: string
    required: false
    description: "目标进程名（可选）"
  - name: process_name
    type: string
    required: false
    description: "目标进程名别名；当 package 为空时使用"
  - name: start_ts
    type: timestamp
    required: false
    description: "分析起始时间戳(ns)"
  - name: end_ts
    type: timestamp
    required: false
    description: "分析结束时间戳(ns)"

steps:
  - id: hardware_rails
    type: skill
    name: "Power Rails 实测能耗"
    skill: power_rails_energy_breakdown
    params:
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    display:
      level: summary
    save_as: hardware_rails
    optional: true

  - id: wattson_rails
    type: skill
    name: "Wattson 子系统能耗估算"
    skill: wattson_rails_power_breakdown
    params:
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    display:
      level: summary
    save_as: wattson_rails
    optional: true

  - id: battery_drain_rate
    type: skill
    name: "掉电速率摘要"
    skill: battery_drain_rate_summary
    params:
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    display:
      level: summary
    save_as: battery_drain_rate
    optional: true

  - id: suspend_wakeup
    type: skill
    name: "Suspend / Wakeup 链路"
    skill: suspend_wakeup_analysis
    params:
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    display:
      level: summary
    save_as: suspend_wakeup
    optional: true

  - id: wakeup_frequency
    type: skill
    name: "唤醒频率摘要"
    skill: wakeup_frequency_summary
    params:
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    display:
      level: summary
    save_as: wakeup_frequency
    optional: true

  - id: wakelocks
    type: skill
    name: "Kernel Wakelock 汇总"
    skill: android_kernel_wakelock_summary
    params:
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    display:
      level: detail
    save_as: wakelocks
    optional: true

  - id: screen_off_cpu
    type: skill
    name: "熄屏后台 CPU 归因"
    skill: screen_off_background_cpu_attribution
    params:
      package: "${package}"
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    display:
      level: detail
    save_as: screen_off_cpu
    optional: true

  - id: modem_network
    type: skill
    name: "Modem / 网络相关性"
    skill: modem_network_correlation_summary
    params:
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    display:
      level: detail
    save_as: modem_network
    optional: true

  - id: cpu_freq_residency
    type: skill
    name: "CPU 高频驻留"
    skill: cpu_freq_residency_summary
    params:
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    display:
      level: detail
    save_as: cpu_freq_residency
    optional: true

  - id: wattson_threads
    type: skill
    name: "Wattson 线程能耗归因"
    skill: wattson_thread_power_attribution
    params:
      package: "${package}"
      process_name: "${process_name}"
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    display:
      level: detail
    save_as: wattson_threads
    optional: true

  - id: battery_charge
    type: skill
    name: "电池电量/电流时间线"
    skill: battery_charge_timeline
    params:
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    display:
      level: detail
    save_as: battery_charge
    optional: true

  - id: dvfs
    type: skill
    name: "DVFS 频率统计"
    skill: android_dvfs_counter_stats
    params:
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    display:
      level: detail
    save_as: dvfs
    optional: true

  - id: gpu_work_period
    type: skill
    name: "GPU Work Period"
    skill: android_gpu_work_period_track
    params:
      package: "${package || process_name || ''}"
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    display:
      level: detail
    save_as: gpu_work_period
    optional: true

output:
  format: structured
