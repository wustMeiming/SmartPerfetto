        ) THEN 1 ELSE 0 END AS has_android_logs
    save_as: logcat_availability
    optional: true

  - id: anr_logcat_evidence_gap
    type: atomic
    name: "当前 ANR 日志证据缺口"
    optional: true
    condition: "logcat_availability.data[0]?.has_android_logs !== 1"
    display:
      level: detail
      layer: deep
      title: "当前 ANR 日志上下文"
      columns:
        - name: error_id
          label: "Error ID"
          type: string
        - name: signal_type
