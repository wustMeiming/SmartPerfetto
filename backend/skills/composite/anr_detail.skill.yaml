    params:
      start_ts: "${anr_ts - timeout_ns}"
      end_ts: "${anr_ts}"
      upid: "${upid}"
      pid: "${pid}"
      package: "${process_name}"
      min_dur_ns: 1000000
      top_k: 15
    save_as: main_slices
    optional: true

  # ============================================================================
  # 直接阻塞点候选分类（候选，不等于最终根因）
  # ============================================================================
  - id: thread_evidence_availability
    type: atomic
    name: "线程证据可用性"
    optional: true
    display:
      level: hidden
    sql: |
      SELECT
        CASE WHEN EXISTS (
          SELECT 1 FROM sqlite_master
          WHERE type IN ('table', 'view') AND name = 'thread_state'
        ) THEN 1 ELSE 0 END AS has_thread_state,
        CASE WHEN EXISTS (
          SELECT 1 FROM sqlite_master
          WHERE type IN ('table', 'view') AND name = 'thread_track'
        ) THEN 1 ELSE 0 END AS has_thread_track,
        CASE WHEN EXISTS (
          SELECT 1 FROM sqlite_master
          WHERE type IN ('table', 'view') AND name = 'slice'
        ) THEN 1 ELSE 0 END AS has_slice
    save_as: thread_evidence_availability

  - id: direct_blocker_evidence_gap
    type: atomic
    name: "直接阻塞点证据缺口"
    optional: true
    display:
      level: key
      layer: deep
      title: "直接阻塞点候选"
      columns:
        - name: direct_blocker_type
          label: "直接阻塞类型"
          type: string
        - name: evidence_ms
          label: "证据时长"
          type: duration
          format: duration_ms
          unit: ms
        - name: pct_of_timeout
          label: "超时占比"
          type: percentage
          format: percentage
        - name: evidence_source
          label: "证据来源"
          type: string
        - name: confidence
          label: "置信度"
          type: string
        - name: root_cause_boundary
          label: "责任边界"
          type: string
        - name: next_evidence_needed
          label: "下一步证据"
          type: string
    condition: "thread_evidence_availability.data[0]?.has_thread_state !== 1"
    sql: |
      SELECT
        'evidence_unavailable' AS direct_blocker_type,
        0 AS evidence_ms,
        0 AS pct_of_timeout,
        'missing_thread_state' AS evidence_source,
        'low' AS confidence,
        'missing_thread_state_evidence' AS root_cause_boundary,
        'Trace 缺少 thread_state，无法从主线程状态判断直接阻塞点；只能保留 trigger/logcat 为上下文证据' AS next_evidence_needed
    save_as: direct_blocker_gap

  - id: direct_blocker_classification
    type: atomic
    name: "直接阻塞点候选"
    optional: true
    display:
      level: key
      layer: deep
      title: "直接阻塞点候选"
      columns:
        - name: direct_blocker_type
          label: "直接阻塞类型"
          type: string
        - name: evidence_ms
          label: "证据时长"
          type: duration
          format: duration_ms
          unit: ms
        - name: pct_of_timeout
          label: "超时占比"
          type: percentage
          format: percentage
        - name: evidence_source
          label: "证据来源"
          type: string
        - name: confidence
          label: "置信度"
          type: string
        - name: root_cause_boundary
          label: "责任边界"
          type: string
        - name: next_evidence_needed
          label: "下一步证据"
          type: string
    condition: "thread_evidence_availability.data[0]?.has_thread_state === 1"
    sql: |
      WITH
      anr_window AS (
        SELECT
          ${anr_ts} - ${timeout_ns} AS start_ts,
          ${anr_ts} AS end_ts,
          ${timeout_ns} AS window_ns
      ),
      main_thread AS (
        SELECT t.utid
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE (
            (${upid} > 0 AND p.upid = ${upid})
            OR (${upid} <= 0 AND ${pid} > 0 AND p.pid = ${pid}
                AND ('${process_name}' = '' OR p.name = '${process_name}' OR p.name GLOB '${process_name}:*'))
            OR (${upid} <= 0 AND ${pid} <= 0
                AND (p.name = '${process_name}' OR p.name GLOB '${process_name}:*'))
          )
          AND t.tid = p.pid
        LIMIT 1
      ),
      main_states AS (
        SELECT
          ts.state,
          LOWER(COALESCE(ts.blocked_function, '')) AS blocked_function,
          MIN(CASE WHEN ts.dur < 0 THEN aw.end_ts ELSE ts.ts + ts.dur END, aw.end_ts) - MAX(ts.ts, aw.start_ts) AS clipped_ns
        FROM thread_state ts
        JOIN main_thread mt ON ts.utid = mt.utid
        CROSS JOIN anr_window aw
        WHERE ts.ts < aw.end_ts
          AND (CASE WHEN ts.dur < 0 THEN aw.end_ts ELSE ts.ts + ts.dur END) > aw.start_ts
      ),
      metrics AS (
        SELECT
          COALESCE((SELECT SUM(clipped_ns) FROM main_states
            WHERE state IN ('S', 'D', 'I')
              AND (blocked_function GLOB '*binder*' OR blocked_function GLOB '*ipc*')), 0) AS binder_wait_ns,
          COALESCE((SELECT SUM(clipped_ns) FROM main_states
            WHERE state IN ('S', 'D', 'I')
              AND (blocked_function GLOB '*futex*' OR blocked_function GLOB '*mutex*'
                   OR blocked_function GLOB '*monitor*' OR blocked_function GLOB '*rwsem*'
                   OR blocked_function GLOB '*rwlock*')), 0) AS lock_wait_ns,
          COALESCE((SELECT SUM(clipped_ns) FROM main_states
            WHERE blocked_function GLOB '*io_schedule*'
              OR blocked_function GLOB '*filemap_fault*'
              OR blocked_function GLOB '*do_page_fault*'
              OR blocked_function GLOB '*fsync*'
              OR blocked_function GLOB '*blk*'
              OR blocked_function GLOB '*ext4*'
              OR blocked_function GLOB '*f2fs*'), 0) AS disk_wait_ns,
          COALESCE((SELECT SUM(clipped_ns) FROM main_states
            WHERE state = 'D'
              AND NOT (
                blocked_function GLOB '*io_schedule*'
                OR blocked_function GLOB '*filemap_fault*'
                OR blocked_function GLOB '*do_page_fault*'
                OR blocked_function GLOB '*fsync*'
                OR blocked_function GLOB '*blk*'
                OR blocked_function GLOB '*ext4*'
                OR blocked_function GLOB '*f2fs*'
              )), 0) AS uninterruptible_wait_ns,
          COALESCE((SELECT SUM(clipped_ns) FROM main_states
            WHERE state IN ('S', 'D', 'I')
              AND (blocked_function GLOB '*epoll*'
                   OR blocked_function GLOB '*poll*'
                   OR blocked_function GLOB '*do_epoll_wait*')), 0) AS poll_wait_ns,
          COALESCE((SELECT SUM(clipped_ns) FROM main_states
            WHERE state IN ('S', 'D', 'I')
              AND (blocked_function GLOB '*nanosleep*'
                   OR blocked_function GLOB '*hrtimer*'
                   OR blocked_function GLOB '*sleep*')), 0) AS sleep_wait_ns,
          COALESCE((SELECT SUM(clipped_ns) FROM main_states
            WHERE state IN ('R', 'R+')), 0) AS runnable_ns,
          COALESCE((SELECT SUM(clipped_ns) FROM main_states
            WHERE state = 'Running'), 0) AS running_ns,
          0 AS reserved_ns
      ),
      candidates AS (
        SELECT 'binder_wait' AS direct_blocker_type, binder_wait_ns AS evidence_ns,
          'thread_state.blocked_function' AS evidence_source,
          CASE WHEN binder_wait_ns > 500000000 THEN 'high' ELSE 'medium' END AS confidence,
          'needs_peer_evidence' AS root_cause_boundary,
          '需要 Binder 对端进程/线程、server_dur 或 system_server 证据；不能只凭客户端等待定责' AS next_evidence_needed
        FROM metrics WHERE binder_wait_ns > 0
        UNION ALL
        SELECT 'lock_or_futex_wait', lock_wait_ns, 'thread_state.blocked_function',
          CASE WHEN lock_wait_ns > 500000000 THEN 'high' ELSE 'medium' END,
          'needs_lock_owner_evidence',
          '需要 monitor_contention/owner thread/锁链证据；普通 futex wait 只能说明候选锁等待'
        FROM metrics WHERE lock_wait_ns > 0
        UNION ALL
        SELECT 'disk_or_page_fault_io', disk_wait_ns, 'thread_state.io_blocked_function',
          CASE WHEN disk_wait_ns > 500000000 THEN 'high' ELSE 'medium' END,
          'needs_io_system_context',
          '需要 iowait、blk/mmc、文件/DB slice 或系统 IO 压力交叉验证'
        FROM metrics WHERE disk_wait_ns > 0
        UNION ALL
        SELECT 'uninterruptible_wait', uninterruptible_wait_ns, 'thread_state.D_without_io_function',
          'low',
          'needs_kernel_wait_context',
          'D-state 只能说明不可中断等待；缺少 IO blocked_function 或 slice 证据时不能归因为磁盘/页缺失'
        FROM metrics WHERE uninterruptible_wait_ns > 0
        UNION ALL
        SELECT 'scheduler_pressure', runnable_ns, 'thread_state.R_or_R_plus',
          CASE WHEN runnable_ns * 100.0 / NULLIF((SELECT window_ns FROM anr_window), 0) > 30 THEN 'medium' ELSE 'low' END,
          'needs_system_load_context',
          '需要 CPU health、Top CPU process、sched latency 交叉验证'
        FROM metrics WHERE runnable_ns > 0
        UNION ALL
        SELECT 'cpu_busy_main_thread', running_ns, 'thread_state.Running',
          CASE WHEN running_ns * 100.0 / NULLIF((SELECT window_ns FROM anr_window), 0) > 70 THEN 'medium' ELSE 'low' END,
          'needs_hot_slice_context',
          '需要主线程热点 slice/调用栈确认是否业务计算，不能只凭 Running 定责'
        FROM metrics WHERE running_ns > 0
        UNION ALL
        SELECT 'native_poll_idle_or_ambiguous', poll_wait_ns, 'thread_state.blocked_function',
          'low',
          'not_root_cause_by_itself',
          'nativePoll/epoll 只说明当前快照等待消息；需 EventLog/Logcat/窗口焦点或系统压力补证'
        FROM metrics WHERE poll_wait_ns > 0
        UNION ALL
        SELECT 'main_thread_sleep', sleep_wait_ns, 'thread_state.blocked_function',
          CASE WHEN sleep_wait_ns > 500000000 THEN 'medium' ELSE 'low' END,
          'app_candidate_needs_stack_context',
          '需要 Thread.sleep/wait 调用栈确认是否业务设计问题'
        FROM metrics WHERE sleep_wait_ns > 0
        UNION ALL
        SELECT 'unknown', (SELECT window_ns FROM anr_window), 'no_direct_thread_state_or_slice_signal',
          'low',
          'unknown',
          '当前 Perfetto 表未给出直接阻塞点；需要 ANR trace/logcat/EventLog 或更完整采集'
        WHERE NOT EXISTS (
          SELECT 1 FROM metrics
          WHERE binder_wait_ns + lock_wait_ns + disk_wait_ns + uninterruptible_wait_ns
            + runnable_ns + running_ns + poll_wait_ns + sleep_wait_ns > 0
        )
      )
      SELECT
        direct_blocker_type,
        ROUND(evidence_ns / 1e6, 2) AS evidence_ms,
        ROUND(100.0 * evidence_ns / NULLIF((SELECT window_ns FROM anr_window), 0), 1) AS pct_of_timeout,
        evidence_source,
        confidence,
        root_cause_boundary,
        next_evidence_needed
      FROM candidates
      ORDER BY
        CASE confidence WHEN 'high' THEN 1 WHEN 'medium' THEN 2 ELSE 3 END,
        evidence_ns DESC
      LIMIT 5
    save_as: direct_blocker_candidates

  - id: direct_blocker_slice_evidence_gap
    type: atomic
    name: "Slice 直接阻塞点证据缺口"
    optional: true
    display:
      level: detail
      layer: deep
      title: "Slice 直接阻塞点候选"
      columns:
        - name: direct_blocker_type
          label: "直接阻塞类型"
          type: string
        - name: evidence_ms
          label: "证据时长"
          type: duration
          format: duration_ms
          unit: ms
        - name: pct_of_timeout
          label: "超时占比"
          type: percentage
          format: percentage
        - name: evidence_source
          label: "证据来源"
          type: string
        - name: confidence
          label: "置信度"
          type: string
        - name: root_cause_boundary
          label: "责任边界"
          type: string
        - name: next_evidence_needed
          label: "下一步证据"
          type: string
    condition: "thread_evidence_availability.data[0]?.has_thread_state === 1 && (thread_evidence_availability.data[0]?.has_thread_track !== 1 || thread_evidence_availability.data[0]?.has_slice !== 1)"
    sql: |
      SELECT
        'slice_evidence_unavailable' AS direct_blocker_type,
        0 AS evidence_ms,
        0 AS pct_of_timeout,
        'missing_thread_track_or_slice' AS evidence_source,
        'low' AS confidence,
        'missing_slice_evidence' AS root_cause_boundary,
        'Trace 缺少 thread_track/slice，无法从主线程或 RenderThread slice 判断 IO/GC/渲染候选；thread_state 直接阻塞点仍可使用' AS next_evidence_needed
    save_as: direct_blocker_slice_gap

  - id: direct_blocker_slice_classification
    type: atomic
    name: "Slice 直接阻塞点候选"
    optional: true
    condition: "thread_evidence_availability.data[0]?.has_thread_track === 1 && thread_evidence_availability.data[0]?.has_slice === 1"
    display:
      level: detail
      layer: deep
      title: "Slice 直接阻塞点候选"
      columns:
        - name: direct_blocker_type
          label: "直接阻塞类型"
          type: string
        - name: evidence_ms
          label: "证据时长"
          type: duration
          format: duration_ms
          unit: ms
        - name: pct_of_timeout
          label: "超时占比"
          type: percentage
          format: percentage
        - name: evidence_source
          label: "证据来源"
          type: string
        - name: confidence
          label: "置信度"
          type: string
        - name: root_cause_boundary
          label: "责任边界"
          type: string
        - name: next_evidence_needed
          label: "下一步证据"
          type: string
    sql: |
      WITH
      anr_window AS (
        SELECT
          ${anr_ts} - ${timeout_ns} AS start_ts,
          ${anr_ts} AS end_ts,
          ${timeout_ns} AS window_ns
      ),
      main_thread AS (
        SELECT t.utid
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE (
            (${upid} > 0 AND p.upid = ${upid})
            OR (${upid} <= 0 AND ${pid} > 0 AND p.pid = ${pid}
                AND ('${process_name}' = '' OR p.name = '${process_name}' OR p.name GLOB '${process_name}:*'))
            OR (${upid} <= 0 AND ${pid} <= 0
                AND (p.name = '${process_name}' OR p.name GLOB '${process_name}:*'))
          )
          AND t.tid = p.pid
        LIMIT 1
      ),
      render_thread AS (
        SELECT t.utid
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE (
            (${upid} > 0 AND p.upid = ${upid})
            OR (${upid} <= 0 AND ${pid} > 0 AND p.pid = ${pid}
                AND ('${process_name}' = '' OR p.name = '${process_name}' OR p.name GLOB '${process_name}:*'))
            OR (${upid} <= 0 AND ${pid} <= 0
                AND (p.name = '${process_name}' OR p.name GLOB '${process_name}:*'))
          )
          AND t.name = 'RenderThread'
        LIMIT 1
      ),
      main_slices AS (
        SELECT
          LOWER(s.name) AS slice_name,
          MIN(CASE WHEN s.dur < 0 THEN aw.end_ts ELSE s.ts + s.dur END, aw.end_ts) - MAX(s.ts, aw.start_ts) AS clipped_ns
        FROM slice s
        JOIN thread_track tt ON s.track_id = tt.id
        JOIN main_thread mt ON tt.utid = mt.utid
        CROSS JOIN anr_window aw
        WHERE s.ts < aw.end_ts
          AND (CASE WHEN s.dur < 0 THEN aw.end_ts ELSE s.ts + s.dur END) > aw.start_ts
      ),
      render_slices AS (
        SELECT
          LOWER(s.name) AS slice_name,
          MIN(CASE WHEN s.dur < 0 THEN aw.end_ts ELSE s.ts + s.dur END, aw.end_ts) - MAX(s.ts, aw.start_ts) AS clipped_ns
        FROM slice s
        JOIN thread_track tt ON s.track_id = tt.id
        JOIN render_thread rt ON tt.utid = rt.utid
        CROSS JOIN anr_window aw
        WHERE s.ts < aw.end_ts
          AND (CASE WHEN s.dur < 0 THEN aw.end_ts ELSE s.ts + s.dur END) > aw.start_ts
      ),
      metrics AS (
        SELECT
          COALESCE((SELECT SUM(clipped_ns) FROM main_slices
            WHERE slice_name GLOB '*sqlite*'
              OR slice_name GLOB '*database*'
              OR slice_name GLOB '*fsync*'
              OR slice_name GLOB '*fileio*'
              OR slice_name GLOB '*file_io*'
              OR slice_name GLOB '*disk*'
              OR slice_name GLOB '*sharedpreferences*'
              OR slice_name GLOB '*queuedwork*'), 0) AS main_io_slice_ns,
          COALESCE((SELECT SUM(clipped_ns) FROM main_slices
            WHERE slice_name GLOB '*gc*'
              OR slice_name GLOB '*garbage*'
              OR slice_name GLOB '*waitforgctocomplete*'
              OR slice_name GLOB '*suspend*'), 0) AS gc_wait_ns,
          COALESCE((SELECT SUM(clipped_ns) FROM main_slices
            WHERE slice_name GLOB '*syncanddraw*'
              OR slice_name GLOB '*waitforfence*'
              OR slice_name GLOB '*dequeuebuffer*'
              OR slice_name GLOB '*egl*'), 0) +
          COALESCE((SELECT SUM(clipped_ns) FROM render_slices
            WHERE slice_name GLOB '*syncanddraw*'
              OR slice_name GLOB '*waitforfence*'
              OR slice_name GLOB '*dequeuebuffer*'
              OR slice_name GLOB '*drawframe*'
              OR slice_name GLOB '*syncframestate*'), 0) AS render_wait_ns
      ),
      candidates AS (
        SELECT 'db_or_file_io_slice' AS direct_blocker_type, main_io_slice_ns AS evidence_ns,
          'main_thread_slice' AS evidence_source,
          CASE WHEN main_io_slice_ns > 500000000 THEN 'medium' ELSE 'low' END AS confidence,
          'app_candidate_needs_window_context' AS root_cause_boundary,
          '需要确认该 IO slice 与 ANR 前窗口重叠，并结合系统 IO 压力判断是否被放大' AS next_evidence_needed
        FROM metrics WHERE main_io_slice_ns > 0
        UNION ALL
        SELECT 'render_or_fence_wait', render_wait_ns, 'main_or_render_thread_slice',
          CASE WHEN render_wait_ns > 500000000 THEN 'medium' ELSE 'low' END,
          'needs_render_sf_evidence',
          '需要 RenderThread、SurfaceFlinger、fence/buffer queue 证据闭环'
        FROM metrics WHERE render_wait_ns > 0
        UNION ALL
        SELECT 'gc_or_stw_wait', gc_wait_ns, 'main_thread_slice',
          CASE WHEN gc_wait_ns > 500000000 THEN 'medium' ELSE 'low' END,
          'needs_memory_gc_evidence',
          '需要 GC/logcat、PSI memory、LMK/OOM 或多线程暂停证据确认'
        FROM metrics WHERE gc_wait_ns > 0
      )
      SELECT
        direct_blocker_type,
        ROUND(evidence_ns / 1e6, 2) AS evidence_ms,
        ROUND(100.0 * evidence_ns / NULLIF((SELECT window_ns FROM anr_window), 0), 1) AS pct_of_timeout,
        evidence_source,
        confidence,
        root_cause_boundary,
        next_evidence_needed
      FROM candidates
      ORDER BY
        CASE confidence WHEN 'medium' THEN 1 ELSE 2 END,
        evidence_ns DESC
      LIMIT 5
    save_as: direct_blocker_slice_candidates

  # ============================================================================
  # 当前 ANR 附近 Logcat / AnrManager 上下文（逐 ANR，避免多事件串台）
  # ============================================================================
