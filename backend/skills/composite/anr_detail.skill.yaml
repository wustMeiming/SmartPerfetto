        'Trace 缺少 android_logs，无法用 Logcat/AnrManager 校验当前 ANR 触发上下文' AS msg_preview
    save_as: logcat_context_gap

  - id: anr_logcat_context
    type: atomic
    name: "当前 ANR 日志上下文"
    optional: true
    condition: "logcat_availability.data[0]?.has_android_logs === 1"
    display:
      level: detail
      layer: deep
      title: "当前 ANR 日志上下文"
      columns:
        - name: error_id
          label: "Error ID"
          type: string
        - name: relation_to_anr_ms
          label: "相对 ANR"
          type: duration
          format: duration_ms
          unit: ms
        - name: phase
          label: "阶段"
          type: string
        - name: signal_type
          label: "信号类型"
          type: string
        - name: evidence_scope
          label: "证据范围"
          type: string
        - name: root_cause_eligible
          label: "可作根因证据"
          type: boolean
        - name: prio
          label: "级别"
          type: string
        - name: tag
          label: "Tag"
          type: string
        - name: msg_preview
          label: "消息"
          type: string
    sql: |
      WITH anr_window AS (
        SELECT
          ${anr_ts} - ${timeout_ns} AS start_ts,
          ${anr_ts} AS anr_ts,
          ${anr_ts} + 5000000000 AS end_ts
      ),
      tagged AS (
        SELECT
          l.*,
          CASE
            WHEN LOWER(COALESCE(l.tag, '')) GLOB '*inputdispatcher*' OR LOWER(COALESCE(l.msg, '')) GLOB '*input dispatch*' THEN 'input_dispatch'
            WHEN LOWER(COALESCE(l.msg, '')) GLOB '*no focused window*' OR LOWER(COALESCE(l.msg, '')) GLOB '*no focus window*' THEN 'no_focus_window'
            WHEN LOWER(COALESCE(l.tag, '')) GLOB '*anrmanager*' THEN 'anrmanager'
            WHEN LOWER(COALESCE(l.tag, '')) GLOB '*activitymanager*' OR LOWER(COALESCE(l.tag, '')) GLOB '*activitytaskmanager*' THEN 'activity_manager'
            WHEN LOWER(COALESCE(l.tag, '')) GLOB '*windowmanager*' THEN 'window_manager'
            WHEN LOWER(COALESCE(l.tag, '')) GLOB '*broadcastqueue*' OR LOWER(COALESCE(l.msg, '')) GLOB '*broadcast*timeout*' THEN 'broadcast_timeout'
            WHEN LOWER(COALESCE(l.msg, '')) GLOB '*executing service*' OR LOWER(COALESCE(l.msg, '')) GLOB '*foreground service*' THEN 'service_timeout'
            WHEN LOWER(COALESCE(l.msg, '')) GLOB '*contentprovider*' OR LOWER(COALESCE(l.msg, '')) GLOB '*provider not responding*' THEN 'provider_timeout'
            WHEN LOWER(COALESCE(l.tag, '')) GLOB '*jobscheduler*' OR LOWER(COALESCE(l.msg, '')) GLOB '*jobservice*' THEN 'job_scheduler'
            WHEN LOWER(COALESCE(l.tag, '')) GLOB '*watchdog*' OR LOWER(COALESCE(l.msg, '')) GLOB '*system_server*watchdog*' THEN 'watchdog'
            WHEN LOWER(COALESCE(l.tag, '')) GLOB '*lmkd*' OR LOWER(COALESCE(l.tag, '')) GLOB '*lowmemorykiller*' OR LOWER(COALESCE(l.msg, '')) GLOB '*lowmemory*' THEN 'memory_pressure'
            WHEN LOWER(COALESCE(l.tag, '')) GLOB '*art*' OR LOWER(COALESCE(l.msg, '')) GLOB '*gc*' THEN 'gc_or_art'
            WHEN LOWER(COALESCE(l.tag, '')) GLOB '*strictmode*'
              OR LOWER(COALESCE(l.tag, '')) GLOB '*binder*'
              OR LOWER(COALESCE(l.msg, '')) GLOB '*anr*'
              OR LOWER(COALESCE(l.msg, '')) GLOB '*not responding*'
              THEN 'anr_related'
            ELSE 'other'
          END AS signal_type
        FROM android_logs l
      ),
      scoped AS (
        SELECT
          l.*,
          CASE
            WHEN '${process_name}' <> ''
              AND LOWER(COALESCE(l.msg, '')) LIKE '%' || LOWER('${process_name}') || '%'
              THEN 1 ELSE 0
          END AS process_match,
          CASE
            WHEN '${component}' <> ''
              AND LOWER(COALESCE(l.msg, '')) LIKE '%' || LOWER('${component}') || '%'
              THEN 1 ELSE 0
          END AS component_match,
          CASE
            WHEN '${intent}' <> ''
              AND LOWER(COALESCE(l.msg, '')) LIKE '%' || LOWER('${intent}') || '%'
              THEN 1 ELSE 0
          END AS intent_match,
          CASE
            WHEN '${error_id}' <> ''
              AND LOWER(COALESCE(l.msg, '')) LIKE '%' || LOWER('${error_id}') || '%'
              THEN 1 ELSE 0
          END AS error_match,
          CASE
            WHEN l.signal_type IN (
              'input_dispatch',
              'no_focus_window',
              'anrmanager',
              'activity_manager',
              'window_manager',
              'broadcast_timeout',
              'service_timeout',
              'provider_timeout',
              'job_scheduler',
              'watchdog',
              'memory_pressure',
              'gc_or_art',
              'anr_related'
            ) THEN 1 ELSE 0
          END AS global_signal_match
        FROM tagged l
      )
      SELECT
        '${error_id}' AS error_id,
        ROUND((l.ts - aw.anr_ts) / 1e6, 2) AS relation_to_anr_ms,
        CASE
          WHEN l.ts < aw.anr_ts THEN 'pre_anr'
          WHEN l.ts <= aw.anr_ts + 1000000000 THEN 'dump_or_trigger'
          ELSE 'post_anr'
        END AS phase,
        CASE
          WHEN l.ts <= aw.anr_ts
            AND (l.error_match = 1 OR l.component_match = 1 OR l.intent_match = 1)
            AND (
              l.global_signal_match = 1
              OR (l.prio >= 5 AND l.signal_type <> 'other')
            )
            THEN 1
          ELSE 0
        END AS root_cause_eligible,
        l.signal_type,
        CASE
          WHEN l.error_match = 1 OR l.component_match = 1 OR l.intent_match = 1 THEN 'event_scoped'
          WHEN l.process_match = 1 THEN 'target_process_context'
          ELSE 'global_context'
        END AS evidence_scope,
        CASE l.prio
          WHEN 4 THEN 'INFO'
          WHEN 5 THEN 'WARN'
          WHEN 6 THEN 'ERROR'
          WHEN 7 THEN 'FATAL'
          ELSE CAST(l.prio AS TEXT)
        END AS prio,
        l.tag,
        SUBSTR(l.msg, 1, 220) AS msg_preview
      FROM scoped l
      CROSS JOIN anr_window aw
      WHERE l.ts >= aw.start_ts
        AND l.ts <= aw.end_ts
        AND l.prio >= 4
        AND (
          l.process_match = 1
          OR l.component_match = 1
          OR l.intent_match = 1
          OR l.error_match = 1
          OR (
            l.ts <= aw.anr_ts
            AND l.global_signal_match = 1
          )
        )
      ORDER BY root_cause_eligible DESC, ABS(l.ts - aw.anr_ts), l.ts
      LIMIT 40
    save_as: logcat_event_context

  # ============================================================================
  # 诊断规则
  # ============================================================================
  - id: anr_event_diagnosis
    type: diagnostic
    name: "ANR 事件诊断"
    display:
      level: key
      layer: deep
      title: "诊断结果"
    inputs: [anr_basic, quadrant, render_thread, lock_contention, app_freeze_check, wakeup, main_slices, direct_blocker_gap, direct_blocker_candidates, direct_blocker_slice_gap, direct_blocker_slice_candidates, logcat_context_gap, logcat_event_context]
    rules:
      # === 证据可用性 ===

      - condition: "direct_blocker_gap.data?.find(r => r.direct_blocker_type === 'evidence_unavailable')"
        severity: info
        diagnosis: "当前 trace 缺少 thread_state，直接阻塞点不可判定"
        confidence: low
        suggestions:
          - "不要仅凭 trigger 或 logcat 作为最终根因"
          - "需要包含 thread_state 的 trace 才能判断主线程直接阻塞形态"

      - condition: "direct_blocker_slice_gap.data?.find(r => r.direct_blocker_type === 'slice_evidence_unavailable')"
        severity: info
        diagnosis: "当前 trace 缺少 thread_track/slice，无法用 slice 判断 IO/GC/渲染候选"
        confidence: low
        suggestions:
          - "thread_state 直接阻塞点仍可使用"
          - "不要把缺失 slice 解释为没有 IO/GC/渲染等待"

      - condition: "logcat_context_gap.data?.find(r => r.signal_type === 'evidence_unavailable')"
        severity: info
        diagnosis: "当前 trace 缺少 android_logs，无法用 Logcat/AnrManager 校验触发上下文"
        confidence: low
        suggestions:
          - "保留该缺口，不要把缺失日志解释为没有系统/窗口/Binder 信号"
          - "结合 Perfetto ANR 类型和线程状态继续分析"

      # === 主线程状态诊断 ===

      # 主线程长时间阻塞（Sleeping > 80%，必须有逐事件 direct_blocker 支撑）
      - condition: "(quadrant.data[0]?.sleeping_pct || 0) > 80 && (direct_blocker_candidates.data?.find(r => ['binder_wait','lock_or_futex_wait','disk_or_page_fault_io','main_thread_sleep'].includes(r.direct_blocker_type) && r.confidence !== 'low') || direct_blocker_slice_candidates.data?.find(r => ['db_or_file_io_slice','render_or_fence_wait','gc_or_stw_wait'].includes(r.direct_blocker_type) && r.confidence !== 'low'))"
        severity: warning
        diagnosis: "主线程 Sleeping/Blocked 占比 ${quadrant.data[0].sleeping_pct}%，存在逐事件 direct_blocker 候选；仍需对应的对端/owner/系统上下文闭环"
        confidence: medium
        suggestions:
          - "以 direct_blocker_classification 为准，不使用包名级 blocking 结果单独定因"
          - "Binder wait 需要对端线程证据；锁等待需要 owner/monitor chain；IO/GC/Render 需要同窗口上下文"
          - "nativePoll/epoll 等待不满足该规则，不能单独作为根因"

      # 主线程 CPU 饥饿（Runnable > 30%，需逐事件 scheduler_pressure 候选）
      - condition: "(quadrant.data[0]?.runnable_pct || 0) > 30 && direct_blocker_candidates.data?.find(r => r.direct_blocker_type === 'scheduler_pressure' && r.confidence !== 'low')"
        severity: warning
        diagnosis: "主线程等待调度 ${quadrant.data[0].runnable_pct}%，direct_blocker 标记 scheduler_pressure；需要系统负载/拓扑/调度证据闭环"
        confidence: medium
        suggestions:
          - "主线程想运行但拿不到 CPU"
          - "检查同一 ANR 窗口的 CPU health、Top CPU process 和调度延迟"
          - "不要只凭包名级 sched_latency 结果定因"

      # 主线程活跃但大核占比偏低（需调度佐证）
      - condition: "quadrant.data[0]?.running_pct > 50 && quadrant.data[0]?.q1_big_running_ms < quadrant.data[0]?.q2_little_running_ms * 0.3 && quadrant.data[0]?.runnable_pct > 10 && direct_blocker_candidates.data?.find(r => r.direct_blocker_type === 'scheduler_pressure' && r.confidence !== 'low')"
        severity: warning
        diagnosis: "主线程大核占比偏低且存在调度等待（Runnable ${quadrant.data[0].runnable_pct}%），可能有 CPU 供给不足"
        confidence: medium
        suggestions:
          - "检查高优先级线程是否占用大核"
          - "检查是否有高优先级任务抢占大核"
          - "可能触发温控策略"

      # === Binder 阻塞诊断 ===

      # Binder 直接阻塞候选（需要对端证据才可定责）
      - condition: "direct_blocker_candidates.data?.find(r => r.direct_blocker_type === 'binder_wait')"
        severity: warning
        diagnosis: "主线程存在 Binder 等待候选，但该证据只能说明客户端等待，不能直接定责对端"
        confidence: medium
        suggestions:
          - "补查 Binder 对端进程、server_dur 或 system_server 线程状态"
          - "将 Binder wait 作为 direct blocker candidate，而不是最终根因"

      # === 锁竞争诊断 ===

      # Futex/锁等待候选（没有 owner 时降级）
      - condition: "direct_blocker_candidates.data?.find(r => r.direct_blocker_type === 'lock_or_futex_wait') && !(lock_contention.data?.find(r => r.blocked_type === 'MainThread'))"
        severity: warning
        diagnosis: "主线程存在 futex/lock 等待候选，但缺少持锁线程/锁链证据"
        confidence: medium
        suggestions:
          - "需要 android_monitor_contention、owner thread 或锁链证据确认"
          - "不要把普通 futex_wait 直接写成死锁"

      # 严重锁竞争（需主线程阻塞态佐证）
      - condition: "direct_blocker_candidates.data?.find(r => r.direct_blocker_type === 'lock_or_futex_wait') && lock_contention.data?.find(r => r.blocked_type === 'MainThread' && r.severity === 'critical') && (quadrant.data[0]?.sleeping_pct || 0) > 50"
        severity: critical
        diagnosis: "主线程严重锁竞争：等待 ${lock_contention.data.find(r => r.blocked_type === 'MainThread' && r.severity === 'critical')?.blocking_thread_name} ${lock_contention.data.find(r => r.blocked_type === 'MainThread' && r.severity === 'critical')?.wait_ms}ms"
        confidence: high
        suggestions:
          - "存在当前 ANR 进程主线程严重锁竞争"
          - "持锁线程：${lock_contention.data.find(r => r.blocked_type === 'MainThread' && r.severity === 'critical')?.blocking_thread_name}"
          - "阻塞方法：${lock_contention.data.find(r => r.blocked_type === 'MainThread' && r.severity === 'critical')?.blocking_method}"

      # 主线程被锁阻塞（需阻塞态佐证）
      - condition: "direct_blocker_candidates.data?.find(r => r.direct_blocker_type === 'lock_or_futex_wait') && lock_contention.data?.find(r => r.blocked_type === 'MainThread') && (quadrant.data[0]?.sleeping_pct || 0) > 30"
        severity: warning
        diagnosis: "主线程被锁阻塞"
        confidence: high
        suggestions:
          - "主线程在等待获取锁"
          - "避免主线程持有长时间锁"
          - "考虑使用异步操作或减少锁粒度"

      # === RenderThread 诊断 ===

      # nativePoll/epoll 只作为降级证据
      - condition: "direct_blocker_candidates.data?.find(r => r.direct_blocker_type === 'native_poll_idle_or_ambiguous') && !direct_blocker_candidates.data?.find(r => ['binder_wait','lock_or_futex_wait','disk_or_page_fault_io'].includes(r.direct_blocker_type)) && !direct_blocker_slice_candidates.data?.find(r => ['db_or_file_io_slice','render_or_fence_wait'].includes(r.direct_blocker_type))"
        severity: info
        diagnosis: "主线程主要表现为 native poll/epoll 等待；这是 idle-or-ambiguous 证据，不能单独作为 ANR 根因"
        confidence: low
        suggestions:
          - "结合 EventLog/Logcat 的 input/no-focus/window 时间线判断真实触发链"
          - "检查系统负载、焦点窗口、对端 Binder 或渲染链路是否是上游原因"

      # nSyncDraw 阻塞（仅在主线程阻塞态明显时作为次要证据）
      - condition: "render_thread.data?.find(r => r.name?.includes('nSyncDraw') && r.dur_ms > 50) && (quadrant.data[0]?.sleeping_pct || 0) > 30"
        severity: warning
        diagnosis: "RenderThread nSyncDraw 阻塞 ${render_thread.data.find(r => r.name?.includes('nSyncDraw'))?.dur_ms}ms"
        confidence: high
        suggestions:
          - "渲染同步点阻塞"
          - "可能与主线程有同步等待"
          - "检查是否有复杂绘制操作"

      # dequeueBuffer 阻塞（仅在主线程阻塞态明显时作为次要证据）
      - condition: "render_thread.data?.find(r => r.name?.includes('dequeueBuffer') && r.dur_ms > 50) && (quadrant.data[0]?.sleeping_pct || 0) > 30"
        severity: warning
        diagnosis: "RenderThread dequeueBuffer 阻塞 ${render_thread.data.find(r => r.name?.includes('dequeueBuffer'))?.dur_ms}ms"
        confidence: medium
        suggestions:
          - "等待 SurfaceFlinger 分配 Buffer"
          - "可能是显示系统繁忙"
          - "检查是否有大量图形渲染"

      # === 应用冻结诊断 ===

      # 应用完全冻结（MainThread、RenderThread、Binder 都冻结）
      - condition: "app_freeze_check.data?.find(r => r.thread_type === 'MainThread')?.status === 'frozen' && app_freeze_check.data?.find(r => r.thread_type === 'RenderThread')?.status === 'frozen' && app_freeze_check.data?.find(r => r.thread_type === 'Binder')?.status === 'frozen' && (quadrant.data[0]?.sleeping_pct || 0) > 80"
        severity: critical
        diagnosis: "应用完全冻结，主线程活动率仅 ${app_freeze_check.data.find(r => r.thread_type === 'MainThread')?.activity_pct}%"
        confidence: high
        suggestions:
          - "MainThread、RenderThread、Binder 均几乎没有活动"
          - "可能是死锁或严重阻塞"
          - "检查 direct_blocker、锁 owner、Binder 对端或系统上下文"

      # 主线程冻结但其他线程未全部冻结
      - condition: "app_freeze_check.data?.find(r => r.thread_type === 'MainThread')?.status === 'frozen' && (quadrant.data[0]?.sleeping_pct || 0) > 80 && !(app_freeze_check.data?.find(r => r.thread_type === 'RenderThread')?.status === 'frozen' && app_freeze_check.data?.find(r => r.thread_type === 'Binder')?.status === 'frozen')"
        severity: warning
        diagnosis: "主线程冻结/低活动，不能直接等同应用完全冻结"
        confidence: medium
        suggestions:
          - "检查 RenderThread、Binder 线程是否仍活跃"
          - "按 direct_blocker、锁 owner、Binder 对端或系统上下文继续定因"
          - "只有 MainThread、RenderThread、Binder 均冻结时才报告应用完全冻结"

output:
  display:
    level: key
    format: summary
