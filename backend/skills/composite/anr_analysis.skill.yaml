# =============================================================================
# ANR 分析 v3.0（组合 Skill）- 基于三篇专业文章重构
# =============================================================================
# 核心原则：
# 1. 先定性再定量 - 首先判断是系统问题还是应用问题
# 2. 分类处理 - 不同 ANR 类型使用不同分析路径
# 3. 优雅降级 - 数据缺失时仍能完成部分分析
#
# ANR 类型：
# - INPUT_DISPATCHING_TIMEOUT: 输入超时（5s 无响应）
# - INPUT_DISPATCHING_TIMEOUT_NO_FOCUSED_WINDOW: 无焦点窗口输入超时（5s）
# - BROADCAST_OF_INTENT: 广播超时（前台10s/后台60s）
# - EXECUTING_SERVICE: 服务执行超时（前台20s/后台200s）
# - CONTENT_PROVIDER_NOT_RESPONDING: ContentProvider 超时
#
# 分析流程：
# 1. 系统健康检查 → 判断系统 vs 应用问题
# 2. ANR 概览 → 分类统计
# 3. 逐个 ANR 详细分析 → 主线程状态/Binder/死锁
# 4. 诊断规则 → 自动识别问题模式
# 5. AI 总结 → 专业根因分析

name: anr_analysis
version: "1.0"
type: composite
category: app_lifecycle
tier: S

meta:
  display_name: "ANR 分析"
  description: "检测和分析应用程序无响应 (ANR) 事件"
  icon: "error"
  tags: [anr, freeze, composite]

triggers:
  keywords:
    zh: [ANR, 无响应, 卡死, 超时, 广播超时, 输入超时, 服务超时, 应用无响应]
    en: [ANR, not responding, timeout, broadcast timeout, input timeout, application hang]
  patterns:
    - ".*ANR.*"
    - ".*无响应.*"
    - ".*timeout.*"
    - ".*卡死.*"

prerequisites:
  modules:
    - android.anrs
    - android.binder
    - android.memory.lmk

inputs:
  - name: process_name
    type: string
    required: false
    description: "目标进程名，留空分析所有 ANR"
  - name: package
    type: string
    required: false
    description: "应用包名（process_name 的别名）"
  - name: anr_type
    type: string
    required: false
    description: "ANR 类型过滤"
  - name: multi_anr_threshold
    type: number
    required: false
    default: 3
    description: "多 ANR 系统级问题阈值"
  - name: multi_anr_span_seconds
    type: number
    required: false
    default: 10
    description: "多 ANR 时间窗口（秒）"
  - name: io_wait_threshold_ms
    type: number
    required: false
    default: 500
    description: "兼容旧调用的 D-state 不可中断等待告警阈值（ms）；不能单独作为 IO 根因"
  - name: uninterruptible_wait_threshold_ms
    type: number
    required: false
    default: 500
    description: "D-state 不可中断等待告警阈值（ms）；需要 blocked_function/slice/系统 IO 证据才能升级为 IO"
  - name: enable_lock_probe
    type: boolean
    required: false
    default: true
    description: "是否启用锁等待探针（futex/mutex）"
  - name: lock_contention_futex_p95_critical_ms
    type: number
    required: false
    default: 20
    description: "Futex P95 严重锁竞争阈值（ms）"
  - name: lock_contention_mutex_p95_warning_ms
    type: number
    required: false
    default: 10
    description: "Mutex P95 锁等待告警阈值（ms）"
  - name: enable_detail_analysis
    type: boolean
    required: false
    default: true
    description: "是否执行逐 ANR 深度分析；测试或快速预览可设为 false"

steps:
  # ============================================================================
  # 第零阶段：提取 ANR 上下文（供后续步骤复用）
  # ============================================================================

  - id: init_cpu_topology
    type: skill
    name: "初始化 CPU 拓扑"
    skill: cpu_topology_view
    display:
      level: hidden
    optional: true

  - id: get_anr_context
    type: skill
    name: "提取 ANR 上下文"
    skill: anr_context_in_range
    params:
      process_name: "${process_name}"
      package: "${package}"
      anr_type: "${anr_type}"
    save_as: anr_ctx
    display:
      level: hidden
    optional: true

  # ============================================================================
  # 第一阶段：系统健康检查（先定性）
  # ============================================================================

  # Step 1.1: 检测 ANR 是否存在
  - id: anr_detection
    type: atomic
    name: "ANR 检测"
    display:
      level: key
      layer: overview
      title: "ANR 检测"
      columns:
        - name: total_anr_count
          label: "ANR 总数"
          type: number
        - name: affected_process_count
          label: "受影响进程数"
          type: number
        - name: first_anr_ts
          label: "首次 ANR"
          type: timestamp
          clickAction: navigate_timeline
        - name: last_anr_ts
          label: "末次 ANR"
          type: timestamp
          clickAction: navigate_timeline
        - name: anr_span_seconds
          label: "时间跨度(秒)"
          type: number
          format: compact
    synthesize:
      role: overview
      fields:
        - key: total_anr_count
          label: ANR 总数
        - key: affected_process_count
          label: 受影响进程数
        - key: anr_span_seconds
          label: ANR 时间跨度
          format: "{{value}} 秒"
      insights:
        - condition: "total_anr_count === 0"
          template: "未检测到 ANR 事件"
        - condition: "total_anr_count > 0 && total_anr_count <= 3"
          template: "检测到 {{total_anr_count}} 个 ANR 事件，影响 {{affected_process_count}} 个进程"
        - condition: "total_anr_count > 3"
          template: "⚠️ 检测到 {{total_anr_count}} 个 ANR，可能是系统级问题"
    sql: |
      SELECT
        COUNT(*) as total_anr_count,
        COUNT(DISTINCT process_name) as affected_process_count,
        MIN(ts) as first_anr_ts,
        MAX(ts) as last_anr_ts,
        ROUND((MAX(ts) - MIN(ts)) / 1e9, 2) as anr_span_seconds
      FROM android_anrs
      WHERE (
          ('${process_name}' <> '' AND (process_name = '${process_name}' OR process_name GLOB '${process_name}:*'))
          OR ('${package}' <> '' AND (process_name = '${package}' OR process_name GLOB '${package}:*'))
          OR ('${process_name}' = '' AND '${package}' = '')
        )
        AND (anr_type = '${anr_type}' OR '${anr_type}' = '')
    save_as: detection
    optional: true
    on_empty: "未检测到 ANR 事件。请确认 Trace 包含 ANR 数据。"

  # Step 1.1b: 触发类型分类（触发机制，不等于最终根因）
  - id: trigger_classification
    type: atomic
    name: "ANR 触发类型分类"
    display:
      level: key
      layer: overview
      title: "ANR 触发类型"
      columns:
        - name: source_anr_type
          label: "Perfetto 类型"
          type: string
        - name: trigger_type
          label: "触发类型"
          type: string
        - name: event_count
          label: "事件数"
          type: number
        - name: type_confidence
          label: "类型置信度"
          type: string
        - name: root_cause_pattern_hints
          label: "候选根因提示"
          type: string
        - name: not_final
          label: "非最终根因"
          type: boolean
        - name: analysis_focus
          label: "分析重点"
          type: string
    synthesize:
      role: overview
      fields:
        - key: trigger_type
          label: 触发类型
        - key: event_count
          label: 事件数
        - key: root_cause_pattern_hints
          label: 候选提示
      insights:
        - template: "ANR 触发类型 {{trigger_type}}（{{event_count}} 次）；候选根因提示只作为排查入口，不是最终结论"
    sql: |
      WITH classified AS (
        SELECT
          anr_type AS source_anr_type,
          CASE
            WHEN anr_type = 'INPUT_DISPATCHING_TIMEOUT_NO_FOCUSED_WINDOW' THEN 'no_focus_window'
            WHEN anr_type = 'INPUT_DISPATCHING_TIMEOUT' THEN 'input_dispatching_timeout'
            WHEN anr_type = 'BROADCAST_OF_INTENT' THEN 'broadcast_timeout'
            WHEN anr_type IN ('EXECUTING_SERVICE', 'START_FOREGROUND_SERVICE', 'FOREGROUND_SERVICE_TIMEOUT', 'FOREGROUND_SHORT_SERVICE_TIMEOUT') THEN 'service_timeout'
            WHEN anr_type = 'CONTENT_PROVIDER_NOT_RESPONDING' THEN 'content_provider_timeout'
            WHEN anr_type IN ('JOB_SERVICE_START', 'JOB_SERVICE_STOP', 'JOB_SERVICE_BIND', 'JOB_SERVICE_NOTIFICATION_NOT_PROVIDED') THEN 'job_scheduler_timeout'
            WHEN anr_type = 'SYSTEM_SERVER_WATCHDOG_TIMEOUT' THEN 'system_watchdog_swt'
            WHEN anr_type = 'BIND_APPLICATION' THEN 'bind_application_timeout'
            WHEN anr_type = 'GPU_HANG' THEN 'gpu_hang'
            WHEN anr_type = 'APP_TRIGGERED' THEN 'app_triggered_anr'
            ELSE 'unknown'
          END AS trigger_type,
          CASE
            WHEN anr_type = 'UNKNOWN_ANR_TYPE' THEN 'low'
            WHEN anr_type IS NULL THEN 'low'
            ELSE 'high'
          END AS type_confidence,
          TRIM(
            (CASE
              WHEN LOWER(COALESCE(subject, '')) GLOB '*deadlock*'
                OR LOWER(COALESCE(subject, '')) GLOB '*waiting to lock*'
                OR LOWER(COALESCE(subject, '')) GLOB '*monitor contention*'
                OR LOWER(COALESCE(subject, '')) GLOB '*futex*'
                THEN 'deadlock,' ELSE '' END) ||
            (CASE
              WHEN LOWER(COALESCE(subject, '')) GLOB '*oom*'
                OR LOWER(COALESCE(subject, '')) GLOB '*lmk*'
                OR LOWER(COALESCE(subject, '')) GLOB '*memory*'
                OR LOWER(COALESCE(subject, '')) GLOB '*gc*'
                THEN 'memory_leak_oom_pressure,' ELSE '' END) ||
            (CASE
              WHEN LOWER(COALESCE(subject, '')) GLOB '*cpu*'
                OR LOWER(COALESCE(subject, '')) GLOB '*iowait*'
                OR LOWER(COALESCE(subject, '')) GLOB '*load*'
                OR LOWER(COALESCE(subject, '')) GLOB '*sched*'
                THEN 'high_load_anr,' ELSE '' END),
            ','
          ) AS root_cause_pattern_hint
        FROM android_anrs
        WHERE (
            ('${process_name}' <> '' AND (process_name = '${process_name}' OR process_name GLOB '${process_name}:*'))
            OR ('${package}' <> '' AND (process_name = '${package}' OR process_name GLOB '${package}:*'))
            OR ('${process_name}' = '' AND '${package}' = '')
          )
          AND (anr_type = '${anr_type}' OR '${anr_type}' = '')
      )
      SELECT
        source_anr_type,
        trigger_type,
        COUNT(*) AS event_count,
        MIN(type_confidence) AS type_confidence,
        COALESCE(NULLIF(GROUP_CONCAT(DISTINCT NULLIF(root_cause_pattern_hint, '')), ''), 'none') AS root_cause_pattern_hints,
        1 AS not_final,
        CASE trigger_type
          WHEN 'input_dispatching_timeout' THEN '主线程是否 5s 内未处理输入；重点看 direct blocker、Binder/锁/IO/调度压力'
          WHEN 'no_focus_window' THEN '按 resume → relayout → draw/focus 三步检查窗口焦点链，主线程 nativePoll 不单独定因'
          WHEN 'broadcast_timeout' THEN '检查 onReceive/goAsync/finish 与工作线程，区分前台 10s 和后台 60s'
          WHEN 'service_timeout' THEN '检查 Service 生命周期、前台服务启动和冷启动链路'
          WHEN 'content_provider_timeout' THEN '区分 provider publish 与 query/CRUD not responding；看 provider main 或 Binder 线程'
          WHEN 'job_scheduler_timeout' THEN '检查 JobService onStartJob/onStopJob/bind 与 JobScheduler 调度链路'
          WHEN 'system_watchdog_swt' THEN 'system_server Watchdog/SWT，优先系统服务 Handler/锁/Binder 线程'
          WHEN 'gpu_hang' THEN 'GPU/fence/buffer 方向候选，必须和 RenderThread/SF 证据闭环'
          ELSE '未知/厂商扩展 ANR，保留 baseline evidence，先确认触发类型'
        END AS analysis_focus
      FROM classified
      GROUP BY source_anr_type, trigger_type
      ORDER BY event_count DESC
    save_as: trigger_classification
    condition: detection.data[0]?.total_anr_count > 0

  # Step 1.2: 系统 CPU 负载（判断系统繁忙程度）
  - id: system_cpu_health
    type: atomic
    name: "系统 CPU 健康状况"
    display:
      level: key
      layer: overview
      title: "首个 ANR 窗口系统 CPU 状况"
      columns:
        - name: core_type
          label: "核心类型"
          type: string
        - name: core_count
          label: "核心数"
          type: number
        - name: total_active_ms
          label: "活跃时间"
          type: duration
          format: duration_ms
          unit: ms
        - name: avg_util_pct
          label: "平均利用率"
          type: percentage
          format: percentage
        - name: status
          label: "状态"
          type: string
    synthesize:
      role: overview
      fields:
        - key: core_type
          label: 核心类型
        - key: avg_util_pct
          label: 平均利用率
          format: "{{value}}%"
        - key: status
          label: 状态
      insights:
        - condition: "status === 'overloaded'"
          template: "⚠️ {{core_type}} 核心过载 ({{avg_util_pct}}%)，系统繁忙"
        - condition: "status === 'busy'"
          template: "{{core_type}} 核心较忙 ({{avg_util_pct}}%)"
        - condition: "status === 'normal'"
          template: "{{core_type}} 核心负载正常 ({{avg_util_pct}}%)"
    sql: |
      WITH anr_window AS (
        SELECT
          ${anr_ctx.data[0].anr_ts} - ${anr_ctx.data[0].timeout_ns} AS start_ts,
          ${anr_ctx.data[0].anr_ts} AS end_ts,
          ${anr_ctx.data[0].timeout_ns} AS window_ns
      ),
      cpu_info AS (
        SELECT cpu_id as cpu, core_type
        FROM _cpu_topology
      ),
      cpu_time AS (
        SELECT
          ss.cpu,
          COALESCE(c.core_type, 'unknown') as core_type,
          SUM(
            MIN(CASE WHEN ss.dur < 0 THEN aw.end_ts ELSE ss.ts + ss.dur END, aw.end_ts)
              - MAX(ss.ts, aw.start_ts)
          ) as active_ns
        FROM sched_slice ss
        CROSS JOIN anr_window aw
        LEFT JOIN cpu_info c ON ss.cpu = c.cpu
        WHERE ss.ts < aw.end_ts
          AND (CASE WHEN ss.dur < 0 THEN aw.end_ts ELSE ss.ts + ss.dur END) > aw.start_ts
        GROUP BY ss.cpu
      ),
      totals AS (
        SELECT
          core_type,
          COUNT(*) as core_count,
          SUM(active_ns) as total_active_ns,
          (SELECT window_ns FROM anr_window) as window_ns
        FROM cpu_time
        GROUP BY core_type
      )
      SELECT
        core_type,
        core_count,
        ROUND(total_active_ns / 1e6, 2) as total_active_ms,
        ROUND(100.0 * total_active_ns / (window_ns * core_count), 1) as avg_util_pct,
        CASE
          WHEN 100.0 * total_active_ns / (window_ns * core_count) > 90 THEN 'overloaded'
          WHEN 100.0 * total_active_ns / (window_ns * core_count) > 70 THEN 'busy'
          ELSE 'normal'
        END as status
      FROM totals
      ORDER BY core_type DESC
    save_as: cpu_health
    condition: detection.data[0]?.total_anr_count > 0
    optional: true

  # Step 1.3: 系统内存压力检测（LMK 事件）
  - id: memory_pressure
    type: atomic
    name: "内存压力检测"
    display:
      level: detail
      layer: list
      title: "首个 ANR 窗口内存压力"
      columns:
        - name: oom_score_adj
          label: "OOM Score"
          type: number
        - name: kill_count
          label: "Kill 次数"
          type: number
          format: compact
        - name: killed_processes
          label: "被杀进程"
          type: string
    sql: |
      SELECT
        oom_score_adj,
        COUNT(*) as kill_count,
        GROUP_CONCAT(DISTINCT process_name) as killed_processes
      FROM android_lmk_events
      WHERE ts >= ${anr_ctx.data[0].anr_ts} - ${anr_ctx.data[0].timeout_ns}
        AND ts <= ${anr_ctx.data[0].anr_ts}
      GROUP BY oom_score_adj
      ORDER BY kill_count DESC
    save_as: memory_pressure
    condition: detection.data[0]?.total_anr_count > 0
    optional: true

  # Step 1.4: D-state 不可中断等待基线
  - id: io_load
    type: atomic
    name: "不可中断等待基线"
    display:
      level: detail
      layer: list
      title: "首个 ANR 窗口 D-state 不可中断等待"
      columns:
        - name: process_name
          label: "进程名"
          type: string
        - name: uninterruptible_wait_ms
          label: "不可中断等待"
          type: duration
          format: duration_ms
          unit: ms
        - name: uninterruptible_wait_count
          label: "等待次数"
          type: number
          format: compact
    sql: |
      WITH anr_window AS (
        SELECT
          ${anr_ctx.data[0].anr_ts} - ${anr_ctx.data[0].timeout_ns} AS start_ts,
          ${anr_ctx.data[0].anr_ts} AS end_ts
      ),
      uninterruptible_states AS (
        SELECT
          p.name as process_name,
          SUM(
            MIN(CASE WHEN ts.dur < 0 THEN aw.end_ts ELSE ts.ts + ts.dur END, aw.end_ts)
              - MAX(ts.ts, aw.start_ts)
          ) as uninterruptible_wait_ns,
          COUNT(*) as uninterruptible_wait_count
        FROM thread_state ts
        CROSS JOIN anr_window aw
        JOIN thread t ON ts.utid = t.utid
        JOIN process p ON t.upid = p.upid
        WHERE ts.state = 'D'
          AND ts.ts < aw.end_ts
          AND (CASE WHEN ts.dur < 0 THEN aw.end_ts ELSE ts.ts + ts.dur END) > aw.start_ts
        GROUP BY p.name
      )
      SELECT
        process_name,
        ROUND(uninterruptible_wait_ns / 1e6, 2) as uninterruptible_wait_ms,
        uninterruptible_wait_count
      FROM uninterruptible_states
      WHERE uninterruptible_wait_ns > 10000000  -- > 10ms
      ORDER BY uninterruptible_wait_ns DESC
      LIMIT 10
    save_as: io_load
    condition: detection.data[0]?.total_anr_count > 0
    optional: true

  # Step 1.4b: 锁等待分布（性能专家探针）
  # 使用 ANR 前 timeout 窗口，定位 futex/mutex 竞争是否是主因。
  - id: futex_wait_probe
    type: skill
    name: "ANR 锁等待探针"
    skill: futex_wait_distribution
    params:
      package: "${package || process_name || anr_ctx.data?.[0]?.process_name || ''}"
      start_ts: "${anr_ctx.data?.[0]?.anr_ts != null && anr_ctx.data?.[0]?.timeout_ns != null ? (Number(anr_ctx.data[0].anr_ts) - Number(anr_ctx.data[0].timeout_ns)) : null}"
      end_ts: "${anr_ctx.data?.[0]?.anr_ts ?? null}"
    display:
      level: detail
      layer: list
      title: "首个 ANR 窗口锁等待分布（专家探针）"
      columns:
        - name: wait_type
          label: "等待类型"
          type: string
        - name: events
          label: "事件数"
          type: number
        - name: avg_wait_ms
          label: "平均等待"
          type: duration
          format: duration_ms
          unit: ms
        - name: p95_wait_ms
          label: "P95 等待"
          type: duration
          format: duration_ms
          unit: ms
        - name: max_wait_ms
          label: "最大等待"
          type: duration
          format: duration_ms
          unit: ms
    save_as: lock_waits
    condition: "detection.data[0]?.total_anr_count > 0 && enable_lock_probe !== false"
    optional: true

  # Step 1.5: 系统冻结检测（所有应用都卡住）
  - id: system_freeze_check
    type: atomic
    name: "系统冻结检测"
    display:
      level: key
      layer: overview
      title: "首个 ANR 窗口系统冻结检测"
      columns:
        - name: total_apps
          label: "检测应用数"
          type: number
        - name: frozen_apps
          label: "冻结应用数"
          type: number
        - name: frozen_pct
          label: "冻结占比"
          type: percentage
          format: percentage
        - name: freeze_verdict
          label: "判定"
          type: string
        - name: system_server_running_pct
          label: "system_server 运行占比"
          type: percentage
          format: percentage
        - name: system_server_frozen
          label: "system_server 冻结"
          type: boolean
    sql: |
      WITH anr_window AS (
        SELECT
          ${anr_ctx.data[0].anr_ts} - ${anr_ctx.data[0].timeout_ns} AS start_ts,
          ${anr_ctx.data[0].anr_ts} AS end_ts
      ),
      app_activity AS (
        SELECT
          p.name as process_name,
          SUM(CASE WHEN ts.state = 'Running' THEN
            MIN(CASE WHEN ts.dur < 0 THEN aw.end_ts ELSE ts.ts + ts.dur END, aw.end_ts)
              - MAX(ts.ts, aw.start_ts)
          ELSE 0 END) as running_ns,
          SUM(
            MIN(CASE WHEN ts.dur < 0 THEN aw.end_ts ELSE ts.ts + ts.dur END, aw.end_ts)
              - MAX(ts.ts, aw.start_ts)
          ) as total_ns
        FROM thread_state ts
        CROSS JOIN anr_window aw
        JOIN thread t ON ts.utid = t.utid
        JOIN process p ON t.upid = p.upid
        WHERE ts.ts < aw.end_ts
          AND (CASE WHEN ts.dur < 0 THEN aw.end_ts ELSE ts.ts + ts.dur END) > aw.start_ts
          AND t.tid = p.pid  -- 主线程
          AND (
            COALESCE(p.uid, 0) >= 10000
            OR p.name = 'system_server'
            OR p.name = 'com.android.systemui'
          )
        GROUP BY p.name
      ),
      freeze_eval AS (
        SELECT
          process_name,
          100.0 * running_ns / NULLIF(total_ns, 0) as running_pct
        FROM app_activity
      )
      SELECT
        COUNT(*) as total_apps,
        SUM(CASE WHEN running_pct < 5 THEN 1 ELSE 0 END) as frozen_apps,
        ROUND(100.0 * SUM(CASE WHEN running_pct < 5 THEN 1 ELSE 0 END) /
              NULLIF(COUNT(*), 0), 1) as frozen_pct,
        MAX(CASE WHEN process_name = 'system_server' THEN ROUND(running_pct, 1) END) as system_server_running_pct,
        MAX(CASE WHEN process_name = 'system_server' AND running_pct < 5 THEN 1 ELSE 0 END) as system_server_frozen,
        CASE
          WHEN MAX(CASE WHEN process_name = 'system_server' AND running_pct < 5 THEN 1 ELSE 0 END) = 1
            THEN 'system_server_freeze'
          WHEN 100.0 * SUM(CASE WHEN running_pct < 5 THEN 1 ELSE 0 END) /
               NULLIF(COUNT(*), 0) > 50 THEN 'system_freeze'
          ELSE 'app_specific'
        END as freeze_verdict
      FROM freeze_eval
    save_as: freeze_check
    condition: detection.data[0]?.total_anr_count > 0
    optional: true

  # ============================================================================
  # 第二阶段：ANR 分类统计
  # ============================================================================

  # Step 2.1: ANR 概览统计（按类型分组）
  - id: anr_overview
    type: atomic
    name: "ANR 概览统计"
    display:
      level: key
      layer: overview
      title: "ANR 概览"
      columns:
        - name: anr_type
          label: "ANR 类型"
          type: string
        - name: trigger_type
          label: "触发类型"
          type: string
        - name: anr_count
          label: "数量"
          type: number
          format: compact
        - name: affected_processes
          label: "受影响进程"
          type: string
        - name: avg_anr_dur_ms
          label: "平均超时时长"
          type: duration
          format: duration_ms
          unit: ms
        - name: default_timeout_ms
          label: "默认超时"
          type: duration
          format: duration_ms
          unit: ms
        - name: type_display
          label: "类型说明"
          type: string
        - name: quick_hint
          label: "快速提示"
          type: string
        - name: root_cause_pattern_hints
          label: "候选根因提示"
          type: string
        - name: not_final
          label: "非最终根因"
          type: boolean
    synthesize:
      role: overview
      fields:
        - key: anr_type
          label: ANR 类型
        - key: trigger_type
          label: 触发类型
        - key: anr_count
          label: 数量
        - key: type_display
          label: 类型说明
        - key: avg_anr_dur_ms
          label: 平均超时时长
          format: "{{value}} ms"
      insights:
        - condition: "anr_type === 'INPUT_DISPATCHING_TIMEOUT'"
          template: "输入超时 {{anr_count}} 次：主线程 5 秒未响应"
        - condition: "anr_type === 'BROADCAST_OF_INTENT'"
          template: "广播超时 {{anr_count}} 次：BroadcastReceiver 处理超时"
        - condition: "anr_type === 'EXECUTING_SERVICE'"
          template: "服务超时 {{anr_count}} 次：Service 生命周期方法超时"
    sql: |
      WITH classified AS (
        SELECT
          *,
          CASE
            WHEN anr_type = 'INPUT_DISPATCHING_TIMEOUT_NO_FOCUSED_WINDOW' THEN 'no_focus_window'
            WHEN anr_type = 'INPUT_DISPATCHING_TIMEOUT' THEN 'input_dispatching_timeout'
            WHEN anr_type = 'BROADCAST_OF_INTENT' THEN 'broadcast_timeout'
            WHEN anr_type IN ('EXECUTING_SERVICE', 'START_FOREGROUND_SERVICE', 'FOREGROUND_SERVICE_TIMEOUT', 'FOREGROUND_SHORT_SERVICE_TIMEOUT') THEN 'service_timeout'
            WHEN anr_type = 'CONTENT_PROVIDER_NOT_RESPONDING' THEN 'content_provider_timeout'
            WHEN anr_type IN ('JOB_SERVICE_START', 'JOB_SERVICE_STOP', 'JOB_SERVICE_BIND', 'JOB_SERVICE_NOTIFICATION_NOT_PROVIDED') THEN 'job_scheduler_timeout'
            WHEN anr_type = 'SYSTEM_SERVER_WATCHDOG_TIMEOUT' THEN 'system_watchdog_swt'
            WHEN anr_type = 'BIND_APPLICATION' THEN 'bind_application_timeout'
            WHEN anr_type = 'GPU_HANG' THEN 'gpu_hang'
            WHEN anr_type = 'APP_TRIGGERED' THEN 'app_triggered_anr'
            ELSE 'unknown'
          END AS trigger_type,
          TRIM(
            (CASE
              WHEN LOWER(COALESCE(subject, '')) GLOB '*deadlock*'
                OR LOWER(COALESCE(subject, '')) GLOB '*waiting to lock*'
                OR LOWER(COALESCE(subject, '')) GLOB '*monitor contention*'
                OR LOWER(COALESCE(subject, '')) GLOB '*futex*'
                THEN 'deadlock,' ELSE '' END) ||
            (CASE
              WHEN LOWER(COALESCE(subject, '')) GLOB '*oom*'
                OR LOWER(COALESCE(subject, '')) GLOB '*lmk*'
                OR LOWER(COALESCE(subject, '')) GLOB '*memory*'
                OR LOWER(COALESCE(subject, '')) GLOB '*gc*'
                THEN 'memory_leak_oom_pressure,' ELSE '' END) ||
            (CASE
              WHEN LOWER(COALESCE(subject, '')) GLOB '*cpu*'
                OR LOWER(COALESCE(subject, '')) GLOB '*iowait*'
                OR LOWER(COALESCE(subject, '')) GLOB '*load*'
                OR LOWER(COALESCE(subject, '')) GLOB '*sched*'
                THEN 'high_load_anr,' ELSE '' END),
            ','
          ) AS root_cause_pattern_hint
        FROM android_anrs
        WHERE (
            ('${process_name}' <> '' AND (process_name = '${process_name}' OR process_name GLOB '${process_name}:*'))
            OR ('${package}' <> '' AND (process_name = '${package}' OR process_name GLOB '${package}:*'))
            OR ('${process_name}' = '' AND '${package}' = '')
          )
          AND (anr_type = '${anr_type}' OR '${anr_type}' = '')
      )
      SELECT
        anr_type,
        trigger_type,
        COUNT(*) AS anr_count,
        GROUP_CONCAT(DISTINCT process_name) AS affected_processes,
        ROUND(AVG(anr_dur_ms), 2) AS avg_anr_dur_ms,
        ROUND(AVG(default_anr_dur_ms), 2) AS default_timeout_ms,
        CASE anr_type
          WHEN 'INPUT_DISPATCHING_TIMEOUT' THEN '输入超时 (5s无响应)'
          WHEN 'INPUT_DISPATCHING_TIMEOUT_NO_FOCUSED_WINDOW' THEN '无焦点窗口输入超时 (5s)'
          WHEN 'BROADCAST_OF_INTENT' THEN '广播超时 (前台10s/后台60s)'
          WHEN 'START_FOREGROUND_SERVICE' THEN '前台服务启动超时'
          WHEN 'EXECUTING_SERVICE' THEN '服务执行超时 (前台20s/后台200s)'
          WHEN 'CONTENT_PROVIDER_NOT_RESPONDING' THEN 'ContentProvider 超时'
          WHEN 'JOB_SERVICE_START' THEN 'JobService onStartJob 超时'
          WHEN 'JOB_SERVICE_STOP' THEN 'JobService onStopJob 超时'
          WHEN 'JOB_SERVICE_BIND' THEN 'JobService bind 超时'
          WHEN 'SYSTEM_SERVER_WATCHDOG_TIMEOUT' THEN 'system_server Watchdog 超时'
          WHEN 'GPU_HANG' THEN 'GPU Hang'
          ELSE anr_type
        END as type_display,
        CASE trigger_type
          WHEN 'input_dispatching_timeout' THEN '检查主线程 direct blocker、Binder/锁/IO/调度压力'
          WHEN 'no_focus_window' THEN '检查 resume/relayout/draw/focus 链，不把 nativePoll 单独定因'
          WHEN 'broadcast_timeout' THEN '检查 BroadcastReceiver.onReceive()/goAsync()/finish()'
          WHEN 'service_timeout' THEN '检查 Service 生命周期方法、前台服务启动和冷启动链'
          WHEN 'content_provider_timeout' THEN '区分 provider publish 与 query/CRUD not responding'
          WHEN 'job_scheduler_timeout' THEN '检查 JobService 回调和 JobScheduler bind/start 链'
          WHEN 'system_watchdog_swt' THEN '按 system_server Watchdog/SWT 排查系统服务线程'
          WHEN 'gpu_hang' THEN '检查 GPU/fence/buffer 与 RenderThread/SF 旁证'
          ELSE '先确认触发类型，再检查主线程阻塞原因'
        END as quick_hint,
        COALESCE(NULLIF(GROUP_CONCAT(DISTINCT NULLIF(root_cause_pattern_hint, '')), ''), 'none') AS root_cause_pattern_hints,
        1 AS not_final
      FROM classified
      GROUP BY anr_type, trigger_type
      ORDER BY anr_count DESC
    save_as: overview
    condition: detection.data[0]?.total_anr_count > 0

  # Step 2.2: ANR 事件列表（用于迭代分析）
  - id: get_anr_events
    type: atomic
    name: "获取 ANR 事件列表"
    display:
      level: key
      layer: list
      title: "ANR 事件列表"
      columns:
        - name: error_id
          label: "Error ID"
          type: number
        - name: process_name
          label: "进程名"
          type: string
        - name: pid
          label: "PID"
          type: number
        - name: anr_type
          label: "ANR 类型"
          type: string
        - name: trigger_type
          label: "触发类型"
          type: string
        - name: anr_dur_ms
          label: "超时时长"
          type: duration
          format: duration_ms
          unit: ms
        - name: anr_ts
          label: "ANR 时间"
          type: timestamp
          clickAction: navigate_timeline
        - name: perfetto_start
          label: "区间开始"
          type: timestamp
          clickAction: navigate_range
          durationColumn: timeout_ns
        - name: type_display
          label: "类型"
          type: string
        - name: timeout_source
          label: "窗口来源"
          type: string
        - name: analysis_focus
          label: "分析重点"
          type: string
        - name: subject_preview
          label: "摘要"
          type: string
        - name: root_cause_pattern_hints
          label: "候选提示"
          type: string
    synthesize:
      role: list
      groupBy:
        field: anr_type
        label: ANR 类型
        aggregations:
          - type: count
            label: 数量
          - type: avg
            field: anr_dur_ms
            label: 平均耗时
      fields:
        - key: process_name
          label: 进程名
        - key: type_display
          label: 类型
        - key: trigger_type
          label: 触发类型
        - key: anr_dur_ms
          label: 超时时长
          format: "{{value}} ms"
    sql: |
      WITH normalized AS (
        SELECT
          *,
          CASE
            WHEN anr_type = 'INPUT_DISPATCHING_TIMEOUT_NO_FOCUSED_WINDOW' THEN 'no_focus_window'
            WHEN anr_type = 'INPUT_DISPATCHING_TIMEOUT' THEN 'input_dispatching_timeout'
            WHEN anr_type = 'BROADCAST_OF_INTENT' THEN 'broadcast_timeout'
            WHEN anr_type IN ('EXECUTING_SERVICE', 'START_FOREGROUND_SERVICE', 'FOREGROUND_SERVICE_TIMEOUT', 'FOREGROUND_SHORT_SERVICE_TIMEOUT') THEN 'service_timeout'
            WHEN anr_type = 'CONTENT_PROVIDER_NOT_RESPONDING' THEN 'content_provider_timeout'
            WHEN anr_type IN ('JOB_SERVICE_START', 'JOB_SERVICE_STOP', 'JOB_SERVICE_BIND', 'JOB_SERVICE_NOTIFICATION_NOT_PROVIDED') THEN 'job_scheduler_timeout'
            WHEN anr_type = 'SYSTEM_SERVER_WATCHDOG_TIMEOUT' THEN 'system_watchdog_swt'
            WHEN anr_type = 'BIND_APPLICATION' THEN 'bind_application_timeout'
            WHEN anr_type = 'GPU_HANG' THEN 'gpu_hang'
            WHEN anr_type = 'APP_TRIGGERED' THEN 'app_triggered_anr'
            ELSE 'unknown'
          END AS trigger_type,
          COALESCE(
            NULLIF(anr_dur_ms, 0),
            default_anr_dur_ms,
            CASE
              WHEN anr_type IN ('INPUT_DISPATCHING_TIMEOUT', 'INPUT_DISPATCHING_TIMEOUT_NO_FOCUSED_WINDOW') THEN 5000
              WHEN anr_type = 'BROADCAST_OF_INTENT' THEN 10000
              WHEN anr_type = 'EXECUTING_SERVICE' THEN 20000
              WHEN anr_type IN ('START_FOREGROUND_SERVICE', 'FOREGROUND_SERVICE_TIMEOUT') THEN 30000
              WHEN anr_type = 'FOREGROUND_SHORT_SERVICE_TIMEOUT' THEN 180000
              WHEN anr_type IN ('JOB_SERVICE_START', 'JOB_SERVICE_STOP', 'JOB_SERVICE_BIND', 'JOB_SERVICE_NOTIFICATION_NOT_PROVIDED') THEN 8000
              WHEN anr_type = 'BIND_APPLICATION' THEN 15000
              WHEN anr_type IN ('CONTENT_PROVIDER_NOT_RESPONDING', 'GPU_HANG', 'APP_TRIGGERED', 'UNKNOWN_ANR_TYPE') THEN 5000
              ELSE 5000
            END
          ) AS analysis_timeout_ms,
          CASE
            WHEN NULLIF(anr_dur_ms, 0) IS NOT NULL THEN 'actual_anr_duration'
            WHEN default_anr_dur_ms IS NOT NULL THEN 'perfetto_default'
            ELSE 'heuristic_fallback'
          END AS timeout_source,
          COALESCE(NULLIF(TRIM(
            (CASE
              WHEN LOWER(COALESCE(subject, '')) GLOB '*deadlock*'
                OR LOWER(COALESCE(subject, '')) GLOB '*waiting to lock*'
                OR LOWER(COALESCE(subject, '')) GLOB '*monitor contention*'
                OR LOWER(COALESCE(subject, '')) GLOB '*futex*'
                THEN 'deadlock,' ELSE '' END) ||
            (CASE
              WHEN LOWER(COALESCE(subject, '')) GLOB '*oom*'
                OR LOWER(COALESCE(subject, '')) GLOB '*lmk*'
                OR LOWER(COALESCE(subject, '')) GLOB '*memory*'
                OR LOWER(COALESCE(subject, '')) GLOB '*gc*'
                THEN 'memory_leak_oom_pressure,' ELSE '' END) ||
            (CASE
              WHEN LOWER(COALESCE(subject, '')) GLOB '*cpu*'
                OR LOWER(COALESCE(subject, '')) GLOB '*iowait*'
                OR LOWER(COALESCE(subject, '')) GLOB '*load*'
                OR LOWER(COALESCE(subject, '')) GLOB '*sched*'
                THEN 'high_load_anr,' ELSE '' END),
            ','
          ), ''), 'none') AS root_cause_pattern_hints
        FROM android_anrs
        WHERE (
            ('${process_name}' <> '' AND (process_name = '${process_name}' OR process_name GLOB '${process_name}:*'))
            OR ('${package}' <> '' AND (process_name = '${package}' OR process_name GLOB '${package}:*'))
            OR ('${process_name}' = '' AND '${package}' = '')
          )
          AND (anr_type = '${anr_type}' OR '${anr_type}' = '')
      )
      SELECT
        error_id,
        process_name,
        pid,
        upid,
        anr_type,
        trigger_type,
        ROUND(anr_dur_ms, 2) as anr_dur_ms,
        ROUND(analysis_timeout_ms, 2) as timeout_ms,
        printf('%d', ts) as anr_ts,
        printf('%d', CAST(analysis_timeout_ms * 1e6 AS INTEGER)) as timeout_ns,
        intent,
        component,
        SUBSTR(subject, 1, 150) AS subject_preview,
        printf('%d', CAST(ts - analysis_timeout_ms * 1e6 AS INTEGER)) as perfetto_start,
        printf('%d', ts) as perfetto_end,
        CASE anr_type
          WHEN 'INPUT_DISPATCHING_TIMEOUT' THEN '输入超时'
          WHEN 'INPUT_DISPATCHING_TIMEOUT_NO_FOCUSED_WINDOW' THEN '无焦点窗口输入超时'
          WHEN 'BROADCAST_OF_INTENT' THEN '广播超时'
          WHEN 'START_FOREGROUND_SERVICE' THEN '前台服务启动超时'
          WHEN 'EXECUTING_SERVICE' THEN '服务超时'
          WHEN 'CONTENT_PROVIDER_NOT_RESPONDING' THEN 'CP超时'
          WHEN 'JOB_SERVICE_START' THEN 'JobService start 超时'
          WHEN 'JOB_SERVICE_STOP' THEN 'JobService stop 超时'
          WHEN 'JOB_SERVICE_BIND' THEN 'JobService bind 超时'
          WHEN 'SYSTEM_SERVER_WATCHDOG_TIMEOUT' THEN 'system_server Watchdog'
          WHEN 'GPU_HANG' THEN 'GPU Hang'
          ELSE anr_type
        END as type_display,
        timeout_source,
        CASE trigger_type
          WHEN 'input_dispatching_timeout' THEN '主线程 direct blocker、Binder/锁/IO/调度压力'
          WHEN 'no_focus_window' THEN 'resume → relayout → draw/focus 链'
          WHEN 'broadcast_timeout' THEN 'onReceive/goAsync/finish 与工作线程'
          WHEN 'service_timeout' THEN 'Service 生命周期和前台服务启动'
          WHEN 'content_provider_timeout' THEN 'provider publish/query 与 Binder 线程'
          WHEN 'job_scheduler_timeout' THEN 'JobService 回调和 JobScheduler bind/start'
          WHEN 'system_watchdog_swt' THEN 'system_server Watchdog/SWT 系统服务线程'
          WHEN 'gpu_hang' THEN 'RenderThread/SF/fence 旁证'
          ELSE '确认触发类型后再定根因边界'
        END AS analysis_focus,
        root_cause_pattern_hints
      FROM normalized
      ORDER BY ts ASC
    save_as: anr_events
    condition: detection.data[0]?.total_anr_count > 0

  # Step 2.3: Top CPU 进程（ANR 期间）
  - id: top_cpu_processes
    type: atomic
    name: "Top CPU 进程"
    display:
      level: detail
      layer: list
      title: "首个 ANR 窗口 Top CPU 进程"
      columns:
        - name: process_name
          label: "进程名"
          type: string
        - name: cpu_ms
          label: "CPU 时间"
          type: duration
          format: duration_ms
          unit: ms
        - name: cpu_pct
          label: "CPU 占比"
          type: percentage
          format: percentage
    sql: |
      WITH anr_window AS (
        SELECT
          ${anr_ctx.data[0].anr_ts} - ${anr_ctx.data[0].timeout_ns} AS start_ts,
          ${anr_ctx.data[0].anr_ts} AS end_ts,
          ${anr_ctx.data[0].timeout_ns} AS window_ns
      ),
      clipped AS (
        SELECT
          p.name AS process_name,
          MIN(CASE WHEN ss.dur < 0 THEN aw.end_ts ELSE ss.ts + ss.dur END, aw.end_ts)
            - MAX(ss.ts, aw.start_ts) AS clipped_ns
        FROM sched_slice ss
        JOIN thread t ON ss.utid = t.utid
        JOIN process p ON t.upid = p.upid
        CROSS JOIN anr_window aw
        WHERE ss.ts < aw.end_ts
          AND (CASE WHEN ss.dur < 0 THEN aw.end_ts ELSE ss.ts + ss.dur END) > aw.start_ts
      )
      SELECT
        process_name,
        ROUND(SUM(clipped_ns) / 1e6, 2) AS cpu_ms,
        ROUND(100.0 * SUM(clipped_ns) / NULLIF((SELECT window_ns FROM anr_window), 0), 1) AS cpu_pct
      FROM clipped
      GROUP BY process_name
      ORDER BY cpu_ms DESC
      LIMIT 15
    save_as: top_processes
    condition: detection.data[0]?.total_anr_count > 0
    optional: true

  # ============================================================================
  # 第三阶段：逐个 ANR 详细分析
  # ============================================================================

  - id: analyze_anr_events
    type: iterator
    name: "ANR 事件详细分析"
    display:
      level: key
      layer: deep
      title: "ANR 深度分析"
    synthesize:
      role: clusters
      clusterBy:
        field: anr_type
        label: ANR 类型
      fields:
        - key: process_name
          label: 进程名
        - key: anr_type
          label: 类型
        - key: main_thread_state
          label: 主线程状态
        - key: blocking_reason
          label: 阻塞原因
      insights:
        - template: "ANR 事件详细分析，按类型分组"
    source: anr_events
    item_skill: anr_detail
    item_params:
      anr_ts: anr_ts
      timeout_ns: timeout_ns
      process_name: process_name
      pid: pid
      upid: upid
      anr_type: anr_type
      error_id: error_id
      intent: intent
      component: component
      anr_dur_ms: anr_dur_ms
      perfetto_start: perfetto_start
      perfetto_end: perfetto_end
    condition: "detection.data[0]?.total_anr_count > 0 && enable_detail_analysis !== false"

  # ============================================================================
  # 第四阶段：诊断规则
  # ============================================================================

  - id: anr_diagnosis
    type: diagnostic
    name: "ANR 诊断"
    display:
      level: key
      layer: overview
      title: "问题诊断"
    synthesize:
      role: conclusion
      fields:
        - key: diagnosis
          label: 诊断结论
        - key: severity
          label: 严重程度
        - key: confidence
          label: 置信度
      insights:
        - condition: "severity === 'critical'"
          template: "🔴 严重问题：{{diagnosis}}"
        - condition: "severity === 'warning'"
          template: "🟡 警告：{{diagnosis}}"
        - template: "ANR 诊断：{{diagnosis}}"
    inputs: [detection, trigger_classification, cpu_health, memory_pressure, io_load, lock_waits, freeze_check, overview, anr_events, top_processes]
    rules:
      # === 系统级问题判定 ===

      # system_server 冻结（系统服务自身无调度）
      - condition: "(detection.data[0]?.total_anr_count || 0) === 1 && freeze_check.data[0]?.freeze_verdict === 'system_server_freeze'"
        severity: critical
        diagnosis: "system_server 运行占比仅 ${freeze_check.data[0].system_server_running_pct}%（疑似系统服务冻结）"
        confidence: high
        suggestions:
          - "这是系统级问题，优先排查 system_server 调度阻塞"
          - "检查 Binder 死锁、IO 堵塞和内核锁等待"
          - "结合内核调度与系统服务线程栈定位阻塞点"

      # 系统冻结（多个应用同时卡住）
      - condition: "(detection.data[0]?.total_anr_count || 0) === 1 && freeze_check.data[0]?.freeze_verdict === 'system_freeze'"
        severity: critical
        diagnosis: "系统级冻结：${freeze_check.data[0].frozen_apps}/${freeze_check.data[0].total_apps} 个应用主线程几乎无运行"
        confidence: high
        suggestions:
          - "这是系统级问题，非单个应用问题"
          - "检查系统服务是否正常"
          - "检查是否有内核级阻塞（内存/IO/锁）"

      # 多 ANR 场景下，首个窗口系统冻结只能作为 baseline context
      - condition: "(detection.data[0]?.total_anr_count || 0) > 1 && freeze_check.data[0]?.freeze_verdict === 'system_server_freeze'"
        severity: warning
        diagnosis: "首个 ANR 窗口 baseline 显示 system_server 运行占比仅 ${freeze_check.data[0].system_server_running_pct}%，需逐 ANR 复核后才能升级为系统根因"
        confidence: medium
        suggestions:
          - "该 freeze_check 只覆盖首个 ANR 窗口"
          - "多 ANR 必须逐事件检查 direct_blocker、日志和系统线程证据"
          - "不要把首个窗口 system_server_freeze 直接推广到所有 ANR"

      - condition: "(detection.data[0]?.total_anr_count || 0) > 1 && freeze_check.data[0]?.freeze_verdict === 'system_freeze'"
        severity: warning
        diagnosis: "首个 ANR 窗口 baseline 显示 ${freeze_check.data[0].frozen_apps}/${freeze_check.data[0].total_apps} 个应用主线程低活动，需逐 ANR 复核后才能升级为系统根因"
        confidence: medium
        suggestions:
          - "该 freeze_check 只覆盖首个 ANR 窗口"
          - "多 ANR 必须逐事件检查 direct_blocker、日志和系统上下文"
          - "若后续 ANR 窗口没有系统冻结证据，只能作为候选背景"

      # 多个 ANR 同时发生
      - condition: "detection.data[0]?.total_anr_count > (multi_anr_threshold || 3) && detection.data[0]?.anr_span_seconds < (multi_anr_span_seconds || 10)"
        severity: critical
        diagnosis: "短时间内发生 ${detection.data[0].total_anr_count} 个 ANR，间隔仅 ${detection.data[0].anr_span_seconds}s"
        confidence: high
        suggestions:
          - "多个 ANR 集中发生通常指向系统级问题"
          - "检查系统是否过载或有资源争抢"

      # 内存压力导致
      - condition: "(detection.data[0]?.total_anr_count || 0) === 1 && memory_pressure.data?.length > 0"
        severity: critical
        diagnosis: "ANR 期间发生 LMK 杀进程，系统内存压力大"
        confidence: high
        suggestions:
          - "内存不足导致系统繁忙，影响应用响应"
          - "检查内存占用大户"
          - "考虑减少内存使用"

      # CPU 过载
      - condition: "(detection.data[0]?.total_anr_count || 0) === 1 && cpu_health.data?.find(r => r.status === 'overloaded')"
        severity: critical
        diagnosis: "CPU ${cpu_health.data.find(r => r.status === 'overloaded').core_type} 核过载 (${cpu_health.data.find(r => r.status === 'overloaded').avg_util_pct}%)"
        confidence: high
        suggestions:
          - "CPU 资源严重不足"
          - "检查后台进程 CPU 占用"
          - "top_processes 显示的进程可能是罪魁祸首"

      # D-state 不可中断等待：只能作为低置信系统/内核等待候选，不能直接等同磁盘 IO
      - condition: "(detection.data[0]?.total_anr_count || 0) === 1 && io_load.data[0]?.uninterruptible_wait_ms > (uninterruptible_wait_threshold_ms || io_wait_threshold_ms || 500)"
        severity: warning
        diagnosis: "进程 ${io_load.data[0].process_name} D-state 不可中断等待 ${io_load.data[0].uninterruptible_wait_ms}ms"
        confidence: low
        suggestions:
          - "D-state 只能说明不可中断等待，不能单独证明磁盘 IO"
          - "只有 blocked_function、slice 或 block IO 证据命中 io_schedule/fsync/blk/ext4/f2fs/filemap_fault 等路径时，才升级为 IO 根因"

      # Futex/Mutex 锁竞争
      - condition: "(detection.data[0]?.total_anr_count || 0) === 1 && (lock_waits?.data?.find(r => r.wait_type === 'futex')?.p95_wait_ms || 0) > (lock_contention_futex_p95_critical_ms || 20)"
        severity: warning
        diagnosis: "ANR 窗口 Futex P95 等待 ${lock_waits.data.find(r => r.wait_type === 'futex').p95_wait_ms}ms，存在锁等待候选信号"
        confidence: medium
        suggestions:
          - "这是包名级专家探针，不能作为最终根因"
          - "必须结合逐 ANR direct_blocker_classification 和当前进程 MainThread lock_contention 再判断"
          - "若确认主线程锁等待，再排查持锁线程、锁顺序和锁内 Binder/IO/数据库操作"

      - condition: "(detection.data[0]?.total_anr_count || 0) === 1 && (lock_waits?.data?.find(r => r.wait_type === 'mutex')?.p95_wait_ms || 0) > (lock_contention_mutex_p95_warning_ms || 10)"
        severity: warning
        diagnosis: "ANR 窗口 Mutex P95 等待 ${lock_waits.data.find(r => r.wait_type === 'mutex').p95_wait_ms}ms，锁等待偏高"
        confidence: medium
        suggestions:
          - "按热点函数重构锁粒度，降低串行化路径"
          - "评估是否可用无锁队列或分段锁替换"

      # === 应用级问题判定 ===

      # 无焦点窗口输入超时：触发链不同于普通主线程 busy，不能只看 nativePoll/idle
      - condition: "(detection.data[0]?.total_anr_count || 0) === 1 && trigger_classification.data?.find(r => r.trigger_type === 'no_focus_window')"
        severity: warning
        diagnosis: "触发类型分流：无焦点窗口输入超时，需要窗口焦点链证据闭环"
        confidence: medium
        suggestions:
          - "按 Activity resume → relayout → draw/focus 顺序检查窗口建立链路"
          - "若主线程只呈现 nativePoll/epoll，不要单独归因为 Looper 空闲"
          - "结合 WindowManager/InputDispatcher/AnrManager 日志确认焦点丢失阶段"

      # JobScheduler 超时：Android 14+ 常见细分触发类型
      - condition: "(detection.data[0]?.total_anr_count || 0) === 1 && trigger_classification.data?.find(r => r.trigger_type === 'job_scheduler_timeout')"
        severity: warning
        diagnosis: "触发类型分流：JobScheduler 相关 ANR，需要 JobService 回调或绑定链路证据"
        confidence: medium
        suggestions:
          - "检查 onStartJob/onStopJob/onBind 是否在主线程执行耗时操作"
          - "检查 JobScheduler 与应用进程之间的 Binder 调用是否有对端等待"
          - "不要只按普通 Service 超时处理，需保留 JobService 回调语义"

      # system_server Watchdog/SWT：系统级触发，不默认归因到 App
      - condition: "(detection.data[0]?.total_anr_count || 0) === 1 && trigger_classification.data?.find(r => r.trigger_type === 'system_watchdog_swt')"
        severity: warning
        diagnosis: "触发类型分流：system_server Watchdog/SWT，需要系统服务线程证据闭环"
        confidence: medium
        suggestions:
          - "优先排查 system_server Handler、锁和 Binder 线程池"
          - "除非有明确同步 Binder 反向证据，否则不要归因为目标 App"
          - "结合 system_server 线程状态、monitor contention 与系统日志闭环"

      # 目标进程 CPU 占用高：候选 high-load 证据，不等同最终根因
      - condition: "(detection.data[0]?.total_anr_count || 0) === 1 && top_processes.data?.find(p => p.process_name === anr_events.data?.[0]?.process_name && p.cpu_pct > 85)"
        severity: warning
        diagnosis: "目标进程在 ANR 窗口 CPU 占比 ${top_processes.data.find(p => p.process_name === anr_events.data?.[0]?.process_name && p.cpu_pct > 85).cpu_pct}%"
        confidence: medium
        suggestions:
          - "这是 high_load_anr 候选证据，需要和主线程热点、调度延迟或 GC/内存压力交叉验证"
          - "优先检查主线程 Running 热点和后台线程是否抢占关键核心"
          - "不要仅凭 CPU 占比高给出最终根因"

      # 输入超时触发类型（非最终根因）
      - condition: "(detection.data[0]?.total_anr_count || 0) === 1 && trigger_classification.data?.find(r => r.trigger_type === 'input_dispatching_timeout')"
        severity: warning
        diagnosis: "触发类型分流：输入事件超时，需要 direct_blocker/线程状态/日志证据闭环"
        confidence: medium
        suggestions:
          - "主线程 5 秒未处理输入是触发机制，不是最终根因"
          - "检查逐 ANR direct_blocker_classification 中的 Binder/锁/IO/调度候选"
          - "只有线程状态、对端或日志证据闭环后才能升级为根因"

      # 广播超时触发类型（非最终根因）
      - condition: "(detection.data[0]?.total_anr_count || 0) === 1 && trigger_classification.data?.find(r => r.trigger_type === 'broadcast_timeout')"
        severity: warning
        diagnosis: "触发类型分流：广播处理超时，需要 onReceive/goAsync/finish 链路证据"
        confidence: medium
        suggestions:
          - "广播超时只说明超时入口，不能直接等同业务代码根因"
          - "区分前台/后台广播窗口，并检查工作线程或 Binder 对端"
          - "需要当前 ANR 的线程状态、日志或组件证据闭环"

      # 服务超时触发类型（非最终根因）
      - condition: "(detection.data[0]?.total_anr_count || 0) === 1 && trigger_classification.data?.find(r => r.trigger_type === 'service_timeout')"
        severity: warning
        diagnosis: "触发类型分流：服务生命周期超时，需要 Service/FGS 链路证据"
        confidence: medium
        suggestions:
          - "Service/FGS 超时是触发类型，不能单独作为最终根因"
          - "检查 onCreate/onStartCommand/onBind/startForeground 调用链"
          - "结合 direct_blocker 与日志证据确认是主线程、对端还是系统资源问题"

      # ContentProvider 超时触发类型（非最终根因）
      - condition: "(detection.data[0]?.total_anr_count || 0) === 1 && trigger_classification.data?.find(r => r.trigger_type === 'content_provider_timeout')"
        severity: warning
        diagnosis: "触发类型分流：ContentProvider 超时，需要 provider 发布/查询链路证据"
        confidence: medium
        suggestions:
          - "ContentProvider not responding 只说明触发入口"
          - "检查 provider 主线程、Binder 线程、数据库/文件 IO 和调用方等待"
          - "没有逐事件阻塞证据时不要写成最终根因"

output:
  format: structured
