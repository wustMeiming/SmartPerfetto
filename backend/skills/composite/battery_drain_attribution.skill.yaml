# =============================================================================
# Battery Drain Attribution
# =============================================================================
# Fallback-oriented battery drain chain. This is intentionally not a rail-level
# estimator unless Wattson data exists; it explains state/event causes.

name: battery_drain_attribution
version: "1.0"
type: composite
category: power
tier: S

meta:
  display_name: "掉电归因分析"
  description: "组合 battery、Doze、wakelock、job、network、suspend/wakeup 证据，分析掉电和待机耗电原因"
  icon: "battery_alert"
  tags: [battery, drain, wakelock, doze, network, job, composite]

triggers:
  keywords:
    zh: [掉电, 待机耗电, 电池掉, wakelock, Doze, 后台耗电]
    en: [battery drain, standby drain, wakelock, doze, background power]
  patterns:
    - ".*(掉电|待机耗电|后台耗电).*"
    - ".*battery.*drain.*"
    - ".*standby.*drain.*"

prerequisites:
  modules:
    - android.battery
    - android.battery.doze
    - android.kernel_wakelocks
    - android.wakeups
    - android.screen_state
    - android.job_scheduler
    - android.network_packets
    - linux.cpu.idle

inputs:
  - name: package
    type: string
    required: false
    description: "目标进程名（可选）"
  - name: process_name
    type: string
    required: false
    description: "目标进程名别名；当 package 为空时使用"
  - name: start_ts
    type: timestamp
    required: false
    description: "分析起始时间戳(ns)"
  - name: end_ts
    type: timestamp
    required: false
    description: "分析结束时间戳(ns)"

steps:
  - id: battery_drain_rate
    type: skill
    name: "掉电速率摘要"
    skill: battery_drain_rate_summary
    params:
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    display:
      level: summary
    save_as: battery_drain_rate
    optional: true

  - id: battery_charge
    type: skill
    name: "电池采样"
    skill: battery_charge_timeline
    params:
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    display:
      level: summary
    save_as: battery_charge
    optional: true

  - id: doze_state
    type: skill
    name: "Doze 状态"
    skill: battery_doze_state_timeline
    params:
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    display:
      level: detail
    save_as: doze_state
    optional: true

  - id: wakelock_summary
    type: skill
    name: "Wakelock 汇总"
    skill: android_kernel_wakelock_summary
    params:
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    display:
      level: detail
    save_as: wakelock_summary
    optional: true

  - id: wakeup_frequency
    type: skill
    name: "唤醒频率摘要"
    skill: wakeup_frequency_summary
    params:
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    display:
      level: summary
    save_as: wakeup_frequency
    optional: true

  - id: screen_off_cpu
    type: skill
    name: "熄屏后台 CPU"
    skill: screen_off_background_cpu_attribution
    params:
      package: "${package}"
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    display:
      level: detail
    save_as: screen_off_cpu
    optional: true

  - id: suspend_wakeup
    type: skill
    name: "Suspend/Wakeup 链路"
    skill: suspend_wakeup_analysis
    params:
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    display:
      level: detail
    save_as: suspend_wakeup
    optional: true

  - id: job_scheduler
    type: skill
    name: "JobScheduler 事件"
    skill: android_job_scheduler_events
    params:
      package: "${package || process_name || ''}"
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    display:
      level: detail
    save_as: job_scheduler
    optional: true

  - id: network_activity
    type: skill
    name: "网络活动"
    skill: network_analysis
    params:
      package: "${package}"
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    display:
      level: detail
    save_as: network_activity
    optional: true

  - id: modem_network
    type: skill
    name: "Modem / 蜂窝网络相关性"
    skill: modem_network_correlation_summary
    params:
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    display:
      level: detail
    save_as: modem_network
    optional: true

output:
  format: structured
