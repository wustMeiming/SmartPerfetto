name: android_heap_dominator_path_extract
version: "1.0"
type: composite
category: memory
tier: B

meta:
  display_name: "Android Heap Dominator Path Extract"
  description: "Extract bounded per-dump dominator class paths with propagated root identity and retained size"
  icon: "memory"
  tags: [memory, heap_graph, dominator, retained_size, batch, upstream]

triggers:
  keywords:
    zh: [heap dominator path, 堆支配路径, 跨 trace 内存聚类, 保留路径]
    en: [heap dominator path, heap path clustering, retained path, cross trace heap]
  patterns:
    - ".*(dominator|retained).*(path|cluster).*"
    - ".*(支配|保留).*(路径|聚类).*"

prerequisites:
  modules:
    - android.memory.heap_graph.dominator_class_tree
    - graphs.scan
    - graphs.hierarchy

batch_analysis:
  operation: heap_path_cluster
  source_step: dominator_paths
  output_contract: HeapPathClusterAnalysisV1
  per_trace_row_limit: 500
  total_row_limit: 5000
  required_columns:
    - upid
    - process_name
    - graph_sample_ts
    - path
    - class_name
    - root_type
    - self_count
    - retained_count
    - self_size_bytes
    - retained_size_bytes

inputs:
  - name: upid
    type: integer
    required: false
    description: "Optional stable process identity"
  - name: process_name
    type: string
    required: false
    description: "Optional process name substring"
  - name: graph_sample_ts
    type: timestamp
    required: false
    description: "Optional heap dump sample timestamp"
  - name: max_rows
    type: integer
    required: false
    default: 500
    description: "Maximum dominator rows returned per trace, clamped to 500"

steps:
  - id: data_check
    type: atomic
    name: "Heap graph availability"
    display:
      level: key
      layer: overview
      title: "Heap Graph Availability"
      columns:
        - name: sample_count
          label: "Heap Samples"
          type: number
        - name: object_count
          label: "Heap Objects"
          type: number
        - name: status
          label: "Status"
          type: string
    sql: |
      SELECT
        COUNT(DISTINCT printf('%d:%d', o.upid, o.graph_sample_ts)) AS sample_count,
        COUNT(*) AS object_count,
        CASE WHEN COUNT(*) > 0 THEN 'heap_graph_available' ELSE 'no_heap_graph_data' END AS status
      FROM heap_graph_object AS o
      LEFT JOIN process AS pr ON pr.upid = o.upid
      WHERE (${upid} IS NULL OR o.upid = ${upid})
        AND ('${process_name|}' = '' OR LOWER(COALESCE(pr.name, '')) GLOB '*' || LOWER('${process_name|}') || '*')
        AND (${graph_sample_ts} IS NULL OR o.graph_sample_ts = ${graph_sample_ts})
    save_as: data_check

  - id: dominator_paths
    type: atomic
    name: "Bounded dominator paths"
    optional: true
    display:
      level: detail
      layer: list
      title: "Heap Dominator Paths"
      columns:
        - name: upid
          label: "UPID"
          type: number
        - name: process_name
          label: "Process"
          type: string
        - name: graph_sample_ts
          label: "Heap Sample"
          type: timestamp
          unit: ns
        - name: path
          label: "Dominator Path"
          type: string
        - name: class_name
          label: "Class"
          type: string
        - name: root_type
          label: "Root Type"
          type: string
        - name: self_count
          label: "Self Count"
          type: number
        - name: retained_count
          label: "Retained Count"
          type: number
        - name: self_size_bytes
          label: "Self Size"
          type: bytes
        - name: retained_size_bytes
          label: "Retained Size"
          type: bytes
    sql: |
      CREATE OR REPLACE PERFETTO TABLE __sp_heap_dominator_cumulatives AS
      SELECT *
      FROM _graph_aggregating_scan!(
        (
          SELECT id AS source_node_id, parent_id AS dest_node_id
          FROM _heap_graph_dominator_class_tree
          WHERE parent_id IS NOT NULL
        ),
        (
          SELECT
            parent.id,
            parent.self_count AS cumulative_count,
            parent.self_size AS cumulative_size
          FROM _heap_graph_dominator_class_tree AS parent
          LEFT JOIN _heap_graph_dominator_class_tree AS child
            ON child.parent_id = parent.id
          WHERE child.id IS NULL
        ),
        (cumulative_count, cumulative_size),
        (
          WITH child_totals AS (
            SELECT
              id,
              SUM(cumulative_count) AS cumulative_count,
              SUM(cumulative_size) AS cumulative_size
            FROM $table
            GROUP BY id
          )
          SELECT
            child_totals.id,
            child_totals.cumulative_count + node.self_count AS cumulative_count,
            child_totals.cumulative_size + node.self_size AS cumulative_size
          FROM child_totals
          JOIN _heap_graph_dominator_class_tree AS node USING (id)
        )
      );

      CREATE OR REPLACE PERFETTO TABLE __sp_heap_top_dominator_nodes AS
      SELECT id
      FROM (
        SELECT
          tree.id,
          ROW_NUMBER() OVER (
            PARTITION BY tree.upid, tree.graph_sample_ts
            ORDER BY tree.self_size DESC, cumulative.cumulative_size DESC, tree.id
          ) AS row_number
        FROM _heap_graph_dominator_class_tree AS tree
        JOIN __sp_heap_dominator_cumulatives AS cumulative USING (id)
        LEFT JOIN process AS pr ON pr.upid = tree.upid
        WHERE (${upid} IS NULL OR tree.upid = ${upid})
          AND ('${process_name|}' = '' OR LOWER(COALESCE(pr.name, '')) GLOB '*' || LOWER('${process_name|}') || '*')
          AND (${graph_sample_ts} IS NULL OR tree.graph_sample_ts = ${graph_sample_ts})
      )
      WHERE row_number = 1;

      CREATE OR REPLACE PERFETTO TABLE __sp_heap_dominator_ancestor_ids AS
      SELECT id
      FROM _tree_reachable_ancestors_or_self!((
        SELECT id, parent_id FROM _heap_graph_dominator_class_tree
      ), (SELECT id FROM __sp_heap_top_dominator_nodes));

      CREATE OR REPLACE PERFETTO TABLE __sp_heap_dominator_labels AS
      SELECT
        tree.id,
        tree.parent_id,
        IFNULL(tree.name, '[Unknown]') || ' [' || tree.self_count || ']' AS label,
        tree.root_type
      FROM _heap_graph_dominator_class_tree AS tree
      JOIN __sp_heap_dominator_ancestor_ids AS ancestor USING (id);

      CREATE OR REPLACE PERFETTO TABLE __sp_heap_dominator_paths AS
      WITH RECURSIVE paths(id, path, root_type) AS (
        SELECT
          id,
          '[' || COALESCE(root_type, 'ROOT') || '] ' || label AS path,
          COALESCE(root_type, 'ROOT') AS root_type
        FROM __sp_heap_dominator_labels
        WHERE parent_id IS NULL
        UNION ALL
        SELECT
          child.id,
          parent.path || ' -> ' || child.label AS path,
          parent.root_type
        FROM paths AS parent
        JOIN __sp_heap_dominator_labels AS child ON child.parent_id = parent.id
      )
      SELECT id, path, root_type
      FROM paths;

      WITH input AS (
        SELECT MIN(MAX(COALESCE(${max_rows|500}, 500), 1), 500) AS max_rows
      )
      SELECT
        tree.upid AS upid,
        COALESCE(pr.name, printf('upid:%d', tree.upid)) AS process_name,
        printf('%d', tree.graph_sample_ts) AS graph_sample_ts,
        COALESCE(p.path, '[ROOT] ' || COALESCE(tree.name, '[Unknown]')) AS path,
        COALESCE(tree.name, '[Unknown]') AS class_name,
        COALESCE(p.root_type, 'ROOT') AS root_type,
        tree.self_count AS self_count,
        c.cumulative_count AS retained_count,
        tree.self_size AS self_size_bytes,
        c.cumulative_size AS retained_size_bytes
      FROM __sp_heap_top_dominator_nodes AS top
      JOIN _heap_graph_dominator_class_tree AS tree ON tree.id = top.id
      JOIN __sp_heap_dominator_cumulatives AS c ON c.id = top.id
      LEFT JOIN __sp_heap_dominator_paths AS p ON p.id = top.id
      LEFT JOIN process AS pr ON pr.upid = tree.upid
      ORDER BY c.cumulative_size DESC, tree.self_size DESC, p.path
      LIMIT (SELECT max_rows FROM input)
    save_as: dominator_paths

output:
  format: structured
  fields:
    - name: data_check
      description: "Heap graph sample and object availability; zero means unavailable evidence, not absence of a leak"
    - name: dominator_paths
      description: "Bounded per-(upid, graph_sample_ts) dominator paths with propagated root and cumulative retained size"
