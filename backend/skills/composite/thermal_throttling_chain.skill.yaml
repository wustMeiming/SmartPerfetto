# =============================================================================
# Thermal Throttling Chain
# =============================================================================
# Composite chain for "heat -> DVFS/frequency -> CPU/GPU work -> user-visible
# symptom" analysis. It reuses existing probes and keeps capability gaps visible.

name: thermal_throttling_chain
version: "1.0"
type: composite
category: power
tier: S

meta:
  display_name: "温控降频链路分析"
  description: "组合温度、DVFS、CPU idle/util、GPU work period 和 Mali power state，分析热节流因果链"
  icon: "device_thermostat"
  tags: [thermal, throttling, dvfs, cpu, gpu, power, composite]

triggers:
  keywords:
    zh: [温控链路, 热节流链路, 发热掉帧, 降频原因, 温度导致卡顿]
    en: [thermal throttling chain, heat jank, frequency cap, thermal cause]
  patterns:
    - ".*(温控|热节流|发热).*(链路|原因|卡顿|掉帧).*"
    - ".*thermal.*(chain|cause|jank|throttl).*"

prerequisites:
  modules:
    - android.dvfs
    - linux.cpu.idle
    - linux.cpu.utilization.process
    - linux.cpu.utilization.thread
    - android.gpu.work_period

inputs:
  - name: package
    type: string
    required: false
    description: "目标进程名（可选）"
  - name: process_name
    type: string
    required: false
    description: "目标进程名别名；当 package 为空时使用"
  - name: start_ts
    type: timestamp
    required: false
    description: "分析起始时间戳(ns)"
  - name: end_ts
    type: timestamp
    required: false
    description: "分析结束时间戳(ns)"

steps:
  - id: thermal
    type: skill
    name: "温度/热节流分析"
    skill: thermal_throttling
    params:
      package: "${package || process_name || ''}"
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    display:
      level: summary
    save_as: thermal
    optional: true

  - id: dvfs
    type: skill
    name: "DVFS 频率统计"
    skill: android_dvfs_counter_stats
    params:
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    display:
      level: detail
    save_as: dvfs
    optional: true

  - id: cpu_idle
    type: skill
    name: "CPU Idle Residency"
    skill: cpu_idle_state_residency
    params:
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    display:
      level: detail
    save_as: cpu_idle
    optional: true

  - id: process_util
    type: skill
    name: "进程 CPU 利用率"
    skill: cpu_process_utilization_period
    params:
      process_name: "${package || process_name || ''}"
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    display:
      level: detail
    save_as: process_util
    optional: true

  - id: thread_util
    type: skill
    name: "线程 CPU 利用率"
    skill: cpu_thread_utilization_period
    params:
      process_name: "${package || process_name || ''}"
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    display:
      level: detail
    save_as: thread_util
    optional: true

  - id: gpu_work_period
    type: skill
    name: "GPU Work Period"
    skill: android_gpu_work_period_track
    params:
      package: "${package || process_name || ''}"
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    display:
      level: detail
    save_as: gpu_work_period
    optional: true

  - id: mali_state
    type: skill
    name: "Mali Power State"
    skill: mali_gpu_power_state
    params:
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    display:
      level: detail
    save_as: mali_state
    optional: true

output:
  format: structured
